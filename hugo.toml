baseURL = "https://mi-blog-apologetica.pages.dev/"
languageCode = "es-es"
defaultContentLanguage = "es"
title = "Defendiendo la Fe"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true
summaryLength = 32

[pagination]
  pagerSize = 10

[taxonomies]
  category = "categories"
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Apologetica cristiana, refutaciones y reflexion"
  author = "Defendiendo la Fe"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

