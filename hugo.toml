baseURL = "https://mi-blog-apologetica.pages.dev/"
languageCode = "es-es"
defaultContentLanguage = "es"
title = "Defendiendo la Fe"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true
summaryLength = 32

[pagination]
  pagerSize = 10

[taxonomies]
  category = "categories"
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Apologetica cristiana, refutaciones y reflexion"
  author = "Defendiendo la Fe"
  defaultTheme = "auto"
  mainSections = ["posts", "filosofia", "historia", "biblia", "exegesis", "refutaciones", "doctrina", "respondiendo-al-islam", "colaboradores"]
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

[params.homeInfoParams]
  Title = "Defendiendo la Fe"
  Content = """
✝ Un espacio de apologetica cristiana para pensar con rigor, responder con caridad y fortalecer la fe.

### Navegacion principal

[Filosofia](/filosofia/) · [Historia](/historia/) · [Biblia](/biblia/) · [Exegesis](/exegesis/) · [Refutaciones](/refutaciones/) · [Doctrina](/doctrina/) · [Respondiendo al Islam](/respondiendo-al-islam/) · [Colaboradores](/colaboradores/) · [Busqueda](/busqueda/)

### Dossiers destacados

- [Dilema Mesianico (Dossier)](/historia/dilema-mesianico-dossier/)
- [Canon Biblia vs Quran (Dossier)](/respondiendo-al-islam/canon-biblia-quran-dossier/)
- [Defensa del Apostol Pablo (Dossier)](/respondiendo-al-islam/defensa-apostol-pablo-dossier/)
"""

