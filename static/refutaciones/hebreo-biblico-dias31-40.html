    {t:'<strong>Las raíces débiles pe-nun (נ inicial)</strong> tienen un nun que se asimila a la consonante siguiente en ciertas formas, produciendo un dagesh compensatorio. La raíz נ-פ-ל (caer) da en yiqtol יִפֹּל — la nun desaparece y la pe recibe dagesh. Lo mismo con נ-ת-נ (dar): yiqtol יִתֵּן. Sin conocer esta regla, estas formas son irreconocibles.'},
    {t:'<strong>Las raíces pe-yod (י inicial)</strong> pierden la yod inicial en el yiqtol Qal. הָלַךְ (caminar) → יֵלֵךְ (andará — la he se comporta como yod débil). יָדַע (conocer) → יֵדַע. יָצָא (salir) → יֵצֵא. יָשַׁב (sentarse) → יֵשֵׁב. Estos son los verbos de movimiento más frecuentes del AT.'},
    {t:'<strong>Raíces ayin-vav (ו media)</strong> — la vav media se convierte en vocal larga. קוּם (levantarse) → יָקוּם (se levantará). שׁוּב (volver) → יָשׁוּב. El patrón: raíz biliteral aparente con vocal larga en el medio. Son verbos de estado y movimiento esenciales.'},
    {t:'<strong>Raíces lamed-he (ה final)</strong> — la he final suele caer y ser reemplazada por diferentes vocales según la forma. גָּלָה (revelar, exiliar) → יִגְלֶה. רָאָה (ver) → יִרְאֶה. בָּנָה (construir) → יִבְנֶה. En el qatal femenino y el yiqtol, la he cae y aparece una vocal larga.'},
  ],
  extra:{type:'table', title:'Raíces débiles — paradigma de los más frecuentes del AT',

  verse:{heb:'יהוה יִתֵּן עֹז לְעַמּוֹ יהוה יְבָרֵךְ אֶת עַמּוֹ בַשָּׁלוֹם', esp:'"YHWH dará fuerza a su pueblo; YHWH bendecirá a su pueblo con paz" — Salmo 29:11',

{

  tips:[
    {t:'<strong>El Texto Masorético (TM)</strong> es la base de nuestras Biblias hebreas modernas. Se conserva principalmente en el Códice de Alepo (כֶּתֶר אֲרָם צוֹבָה, c. 930 d.C.) y el Códice de Leningrado (c. 1008 d.C.). La BHS y BHQ se basan en el Códice de Leningrado, el más completo conservado.'},

    {t:'<strong>La Septuaginta (LXX)</strong> — la traducción griega del AT (c. 250-130 a.C.) — a veces refleja un texto hebreo (Vorlage) diferente al TM. En Jeremías, la LXX es un 14% más corta y con un orden diferente de capítulos. ¿Cuál es más original? El debate académico continúa: probablemente coexistieron dos ediciones hebreas del libro de Jeremías.'},

{
  day:34, title:"La narrativa avanzada: los ciclos narrativos del AT", subtitle:"Tipología, quiasmo extendido y la gramática de la repetición",
  tips:[
    {t:'<strong>Los ciclos narrativos del AT</strong> siguen patrones reconocibles. El ciclo de los Jueces (Jc 2:11-19): Israel peca → YHWH entrega a sus enemigos → Israel clama → YHWH levanta un juez → el juez salva → el juez muere → Israel peca de nuevo. Este ciclo se repite siete veces y su repetición creciente en intensidad es la tesis del libro.'},
    {t:'<strong>La tipología</strong> (טִיפּוּס) no es alegoría: no borra el sentido histórico del texto sino que reconoce en él un patrón que se repite a escala mayor. Adán → Israel → el Siervo → Cristo. El Éxodo (מִצְרַיִם → מִדְבָּר → אֶרֶץ) se repite tipológicamente en el regreso del exilio (Is 40-55) y en el bautismo de Jesús (Mt 3-4). El AT mismo practica la tipología: Oseas 11:1 relee el Éxodo como tipo del Israel futuro.'},
    {t:'<strong>El quiasmo extendido</strong> — A-B-C...C\'-B\'-A\' — puede abarcar capítulos enteros o incluso libros. Génesis 1-11 es un quiasmo macro: creación → tabla de naciones → Babel // Babel invertida → table de naciones (Sem) → nueva creación (Abraham). El centro quiástico siempre lleva el peso teológico.'},
    {t:'<strong>La repetición con variación</strong> es una técnica narrativa hebrea: cuando un texto se repite con pequeñas diferencias, esas diferencias son el punto. Gn 1 dice "bueno" (טוֹב) 6 veces; Gn 1:31 dice "muy bueno" (טוֹב מְאֹד). El "muy" al final es la diferencia que contiene la teología del séptimo día.'},
  ],

    words:[['וַיַּרְא אֱלֹהִים','y vio Dios (waw consec. + yiqtol de ראה — lamed-he)'],['אֶת כָּל אֲשֶׁר עָשָׂה','todo lo que había hecho (את + כֹּל + rel. + qatal de עשׂה)'],['וְהִנֵּה','y he aquí (presentativo — la sorpresa del narrador)'],['טוֹב מְאֹד','muy bueno (adjetivo + adverbio de intensidad)']],
    insight:'La séptima evaluación divina (שֵׁשֶׁת יָמִים — seis días) rompe el patrón: no es solo "bueno" (טוֹב) como las seis anteriores sino "muy bueno" (טוֹב מְאֹד). La repetición con variación final revela que el conjunto de la creación, incluyendo al ser humano (אָדָם) creado el día sexto, recibe una valoración cualitativamente superior. Los rabinos debatieron por qué "muy bueno" incluye también la muerte (מָוֶת ← מְאֹד por gematría). Lo que está claro es que el "muy" rompe el patrón establecido — y en la literatura hebrea, romper el patrón es la señal más fuerte de énfasis.'

// ── DÍA 35 ──────────────────────────────────────────────────
{
  day:35, title:"Ezequiel 37: el valle de los huesos secos — exégesis completa", subtitle:"La visión de la resurrección nacional y su gramática",
  tips:[
    {t:'<strong>Ezequiel 37:1-14</strong> es una de las visiones más dramáticas del AT. Su gramática es una sucesión de waw consecutivos que construyen la acción progresiva: los huesos se mueven, se unen, se cubren de tendones y carne, y finalmente reciben el espíritu (רוּחַ). El capítulo recapitula Génesis 2 a escala nacional.'},
    {t:'<strong>La pregunta de YHWH</strong> (v.3): הֲתִחְיֶינָה הָעֲצָמוֹת הָאֵלֶּה — "¿pueden vivir estos huesos?" — es una pregunta en yiqtol con הֲ interrogativo. La respuesta de Ezequiel es la más sabia del AT: "Señor YHWH, tú lo sabes". No afirma ni niega. La fe madura suspende el juicio y devuelve la pregunta al que la puede responder.'},
    {t:'<strong>רוּחַ aparece diez veces</strong> en Ezequiel 37: como viento (v.9), como espíritu/aliento (vv.5,6,8,9,10) y como el Espíritu de YHWH (v.14). El texto juega deliberadamente con los tres significados: la ambigüedad es teológica, no ambigüedad lingüística. El viento que sopla ES el espíritu divino que revive.'},
    {t:'<strong>La interpretación del texto</strong> (vv.11-14) está dentro del texto mismo: los huesos son "toda la casa de Israel" (כָּל בֵּית יִשְׂרָאֵל). La visión es metáfora de la restauración nacional tras el exilio. Pero la resurrección corporal también entra como horizonte más amplio: el NT la aplica a la resurrección general.'},

  tips:[
    {t:'<strong>Levítico</strong> es el libro más ignorado por los lectores modernos y el más citado por Jesús y el NT. Su tema central es la קְדֻשָּׁה (santidad) como la característica esencial de Dios y la vocación de Israel: "Seréis santos porque yo soy santo" (קְדֹשִׁים תִּהְיוּ כִּי קָדוֹשׁ אֲנִי — Lv 19:2).'},
    {t:'<strong>Levítico 19:18</strong> — "amarás a tu prójimo como a ti mismo" (וְאָהַבְתָּ לְרֵעֲךָ כָּמוֹךָ) — es una de las leyes más citadas en el NT (Mc 12:31; Ro 13:9; Ga 5:14; Stg 2:8). El contexto inmediato (Lv 19:9-18) muestra que es una ley práctica: dejar espigas para el pobre, no mentir, no oprimir. El amor al prójimo no es sentimiento sino praxis.'},
    {t:'<strong>La estructura del Levítico</strong> tiene en su centro el Gran Día de la Expiación (יוֹם הַכִּפּוּרִים, cap. 16). Los caps. 1-15 son las leyes de pureza e impureza que llevan al día de la expiación; los caps. 17-27 son la "ley de santidad" que fluye de él. El libro es un quiasmo con Yom Kippur en el centro.'},
    {t:'<strong>El año de jubileo</strong> (יוֹבֵל, Lv 25) es la consecuencia social de la santidad: cada 50 años, todas las tierras vuelven a sus familias originales, todos los esclavos hebreos son liberados, todas las deudas quedan en suspenso. Es la más radical ley social del mundo antiguo. Jesús la proclama cumplida en su ministerio (Lc 4:18-21 citando Is 61).'},

{
  day:37, title:"Los Salmos reales y la teología del Mesías", subtitle:"Salmos 2, 22, 45, 72, 110: la gramática del ungido",
  tips:[
    {t:'<strong>Los Salmos reales</strong> (מַלְכֻיּוֹת) son salmos que hablan del rey de Israel — su coronación (Sal 2), su boda (Sal 45), su reinado justo (Sal 72), su exaltación sacerdotal (Sal 110). En su contexto histórico describen al rey davídico. En su lectura canónica (el Salterio como libro) apuntan al rey ideal que no ha venido aún.'},
    {t:'<strong>Salmo 2:7</strong> — "Tú eres mi hijo; yo te he engendrado hoy" (אַתָּה בְנִי אֲנִי הַיּוֹם יְלִדְתִּיךָ) — es la fórmula de adopción real en el antiguo Oriente. En el contexto israelita: el rey es el "hijo adoptivo" de YHWH en su coronación. El NT aplica esta fórmula al bautismo de Jesús (Mc 1:11) y a su resurrección (Hch 13:33; Hb 1:5).'},
    {t:'<strong>Salmo 110:1</strong> — נְאֻם יהוה לַאדֹנִי — "Oráculo de YHWH a mi señor". La tensión: ¿quién es "mi señor" si lo dice David? Jesús usa esta tensión en Mc 12:35-37 para mostrar que el Mesías es más que hijo de David. La gramática (אֲדֹנִי = mi señor/amo personal) distingue al Mesías de YHWH pero lo sitúa en posición de honor divino.'},
    {t:'<strong>Salmo 22</strong> — de la desesperación ("Dios mío, Dios mío, ¿por qué me has abandonado?") a la alabanza universal. El texto hebreo de los vv.16-17 tiene una variante textual crucial: el TM dice "como un león mis manos y mis pies" (כָּאֲרִי); varios MSS y la LXX dicen "horadaron mis manos y mis pies" (כָּאֲרוּ). La diferencia es una sola letra.'},
  ],

  tips:[
    {t:'<strong>Génesis 1:1-2:3</strong> es la unidad literaria más estudiada del AT. Su estructura es una semana de 6 días de trabajo + 1 día de descanso. Los días 1-3 crean "espacios" (luz/oscuridad, aguas/firmamento, tierra/mar); los días 4-6 crean los "habitantes" que llenan esos espacios en correspondencia perfecta.'},
    {t:'<strong>El versículo 1</strong> — בְּרֵאשִׁית בָּרָא אֱלֹהִים — ha sido debatido durante siglos: ¿es una oración independiente ("en el principio Dios creó...") o una cláusula temporal ("cuando Dios comenzó a crear, la tierra estaba vacía...")? El debate entre la creación ex nihilo y la creación a partir del caos es fundamentalmente gramatical.'},
    {t:'<strong>תֹהוּ וָבֹהוּ</strong> (tohu wavohu, v.2) — "caótica y vacía" — es una aliteración única del AT. תֹהוּ = lo que no tiene forma; בֹהוּ = lo que está vacío. La pareja aparece en Is 34:11 y Jr 4:23 para describir la des-creación como juicio. La creación en Gn 1 es el proceso de dar forma a lo sin forma y llenar lo vacío.'},
    {t:'<strong>El versículo 2:3</strong> — "y santificó el séptimo día" (וַיְקַדֵּשׁ) — usa el Pi\'el de קדשׁ: santificar activamente. Es el único elemento de la creación que Dios no nombra, no separa, no llena y no bendice con progenie. Solo el tiempo puede ser santo por sí mismo. La santidad del tiempo es la idea más radical de la creación hebrea.'},
  ],

  verse:{heb:'בְּרֵאשִׁית בָּרָא אֱלֹהִים אֵת הַשָּׁמַיִם וְאֵת הָאָרֶץ וְהָאָרֶץ הָיְתָה תֹהוּ וָבֹהוּ וְחֹשֶׁךְ עַל פְּנֵי תְהוֹם וְרוּחַ אֱלֹהִים מְרַחֶפֶת עַל פְּנֵי הַמָּיִם', esp:'"En el principio creó Dios los cielos y la tierra. La tierra estaba caótica y vacía, y la oscuridad sobre la faz del abismo, y el espíritu/viento de Dios se cernía sobre la faz de las aguas" — Génesis 1:1-2',
    words:[['בְּרֵאשִׁית בָּרָא אֱלֹהִים','en el principio creó Dios (V-S — verbo antes del sujeto)'],['אֵת הַשָּׁמַיִם וְאֵת הָאָרֶץ','los cielos y la tierra (merismo: la totalidad)'],['וְהָאָרֶץ הָיְתָה','y la tierra estaba (S-V — sujeto enfático: contraste con lo que sigue)'],['תֹהוּ וָבֹהוּ','caótica y vacía (aliteración — el estado pre-ordenado)'],['וְחֹשֶׁךְ עַל פְּנֵי תְהוֹם','y oscuridad sobre la faz del abismo (estado constructo)'],['וְרוּחַ אֱלֹהִים מְרַחֶפֶת','y el espíritu/viento de Dios aleteaba (Pi\'el part. fem.)'],['עַל פְּנֵי הַמָּיִם','sobre la faz de las aguas (estado constructo)']],
    insight:'בְּרֵאשִׁית tiene ב sin artículo: no "en EL principio" (בָּרֵאשִׁית) sino "en principio / al comienzo". La presencia o ausencia del artículo es el centro del debate ex nihilo. La oración de v.2 tiene S-V: "y la tierra (ella)estaba" — el sujeto enfático precede al verbo para marcar el contraste con el v.1. רוּחַ אֱלֹהִים: puede ser "viento de Dios" o "espíritu de Dios" — la ambigüedad es deliberada y la forma Pi\'el de רחף (aletear/cernerse intensamente) sugiere acción viva y generadora. El texto más comentado de la historia humana cabe en dos versículos hebreos.'

// BUILD UI
const lnav = document.getElementById('lnav');
const container = document.getElementById('lessons-container');

LESSONS.forEach((lesson, idx) => {
  const btn = document.createElement('button');
  btn.className = 'lnav-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = `Día ${lesson.day}`;
  btn.onclick = () => showLesson(idx);
  lnav.appendChild(btn);
  const panel = document.createElement('div');
  panel.className = 'lesson-panel' + (idx === 0 ? ' active' : '');
  panel.id = `lesson-${idx}`;
  panel.innerHTML = buildLesson(lesson, idx);
  container.appendChild(panel);
});

function showLesson(idx) {
  document.querySelectorAll('.lnav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.lesson-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  initQuiz(idx);
}
function showInnerTab(lIdx, tabName) {
  const panel = document.getElementById(`lesson-${lIdx}`);
  panel.querySelectorAll('.itab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  panel.querySelectorAll('.itab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
}

function buildLesson(lesson, idx) {
  const tabKeys = ['leccion','vocab','quiz','verse'];
  const tabLabels = ['📖 Lección','📚 Vocabulario','✏️ Práctica','✝️ Texto'];
  const pct = (lesson.day / 40 * 100).toFixed(1);

  let html = `
  <div style="text-align:center;margin-bottom:14px;">
    <div style="font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--crimson);">Día ${lesson.day} — ${lesson.title} <span class="adv-badge">AVANZADO</span></div>
    <div style="font-size:12px;color:#888;margin-top:2px;">${lesson.subtitle}</div>
    <div class="prog-bar" style="max-width:300px;margin:8px auto 3px;"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-lbl">Día ${lesson.day} de 40${lesson.day===40?' — ¡Curso completo! אָמֵן 🏆':''}</div>
  </div>
  <div class="inner-tabs">
    ${tabLabels.map((t,i)=>`<div class="itab${i===0?' active':''}" data-tab="${tabKeys[i]}" onclick="showInnerTab(${idx},'${tabKeys[i]}')">${t}</div>`).join('')}
  </div>`;

  html += `<div class="itab-panel active" data-tab="leccion">`;

  if (lesson.day === 40) {
    html += `<div class="finish-banner">
      <div class="heb-big">אָמֵן וְאָמֵן</div>
      <h2>¡40 días de hebreo bíblico completados!</h2>
      <p>Del alef-bet a la exégesis de Gn 1, Is 53, Ez 37 y Sal 110. El AT habla ahora en su propia voz.</p>
    </div>`;
  }

  if (lesson.tips && lesson.tips.length) {
    html += `<div class="card"><h3><span>💡</span> Claves del día</h3>`;
    lesson.tips.forEach(t => { html += `<div class="tip">${t.t}</div>`; });
    html += `</div>`;
  }

  if (lesson.extra) {
    const e = lesson.extra;
    if (e.type === 'table') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3>
      <table class="gtable"><thead><tr>${e.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
      e.rows.forEach(r => { html += `<tr>${r.map((c,ci)=>`<td${ci===0?' style="font-weight:600"':''}>${c}</td>`).join('')}</tr>`; });
      html += `</tbody></table></div>`;
    } else if (e.type === 'conj') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="conj-grid">`;
      e.cols.forEach(col => {
        html += `<div class="conj-box"><h4>${col.title}</h4>`;
        col.rows.forEach(r => { html += `<div class="conj-line"><span class="conj-heb">${r[0]}</span><span class="conj-esp">${r[1]}</span></div>`; });
        html += `</div>`;
      });
      html += `</div></div>`;
    }
  }
  html += `</div>`;

  html += `<div class="itab-panel" data-tab="vocab"><div class="card"><h3><span>📚</span> Vocabulario del día</h3>
  <p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada palabra para más información.</p><ul class="vlist">`;
  lesson.vocab.forEach(v => {
    html += `<li class="vitem" onclick="toggleVocab(this)">
      <div class="vheb">${v.g}</div>
      <div><div class="vtrans">${v.t}</div>
      <div class="vhint" style="display:none;">${v.h} — <em>${v.f}</em></div>
      <div class="vmore">↓ más info</div></div></li>`;
  });
  html += `</ul></div></div>`;

  html += `<div class="itab-panel" data-tab="quiz"><div class="card"><h3><span>✏️</span> Práctica — Día ${lesson.day}</h3>
  <div id="quiz-${idx}"></div><div id="score-${idx}" class="qscore" style="display:none;"></div></div></div>`;

  const v = lesson.verse;
  html += `<div class="itab-panel" data-tab="verse">
  <div class="vblock">
    <div class="vblock-heb">${v.heb}</div>
    <div class="vblock-trans">${v.esp}</div>
    <div class="vwords">`;
  v.words.forEach(w => { html += `<div class="vrow"><span class="vwh">${w[0]}</span><span class="vwe">${w[1]}</span></div>`; });
  html += `</div></div>
  <div class="card"><h3><span>🔍</span> El detalle que las traducciones pierden</h3><p>${v.insight}</p></div>
  </div>`;

  return html;
}

const quizState = {};
function initQuiz(idx) {
  if (quizState[idx]) return;
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  renderQuiz(idx);
}
function renderQuiz(idx) {
  const el = document.getElementById(`quiz-${idx}`);
  const sc = document.getElementById(`score-${idx}`);
  const s = quizState[idx];
  if (!s) return;
  if (s.pos >= s.data.length) {
    el.style.display='none'; sc.style.display='block';
    const pct = Math.round(s.score/s.data.length*100);
    const isLast = LESSONS[idx].day === 40;
    sc.innerHTML = `${pct>=75?'🎉':'📖'} <strong>${s.score}/${s.data.length}</strong> correctas (${pct}%)<br>
    <span style="font-size:13px;color:#888;">${isLast?'¡40 días de hebreo bíblico completados! אָמֵן וְאָמֵן 🏆':pct>=75?'¡Nivel avanzado superado!':'El hebreo avanzado exige constancia — repasa y vuelve.'}</span>
    <br><button class="qbtn" style="margin-top:10px;" onclick="resetQuiz(${idx})">↺ Repetir</button>`;
    return;
  }
  const q = s.data[s.pos];
  const isHeb = q.q.match(/[\u05D0-\u05FF]/);
  el.innerHTML = `<div class="qcard">
    <div style="font-size:11px;color:#aaa;margin-bottom:6px;">${s.pos+1} / ${s.data.length}</div>
    <div class="${isHeb?'qbig':'qbig-latin'}">${q.q}</div>
    <div class="qgrid">${q.opts.map((o,i)=>`<button class="qbtn" onclick="checkQ(${idx},this,${i},${q.ans})">${o}</button>`).join('')}</div>
    <div class="qfb" id="qfb-${idx}"></div>
  </div>`;
}
function checkQ(idx, btn, chosen, correct) {
  const s = quizState[idx];
  btn.parentElement.querySelectorAll('.qbtn').forEach(b => b.disabled=true);
  const fb = document.getElementById(`qfb-${idx}`);
  if (chosen===correct) { btn.classList.add('ok'); fb.style.color='var(--olive)'; fb.textContent='✓ ¡Correcto!'; s.score++; }
  else { btn.classList.add('no'); btn.parentElement.querySelectorAll('.qbtn')[correct].classList.add('ok'); fb.style.color='var(--crimson)'; fb.textContent=`✗ Era: ${s.data[s.pos].opts[correct]}`; }
  setTimeout(()=>{ s.pos++; renderQuiz(idx); }, 1300);
}
function resetQuiz(idx) {
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  document.getElementById(`quiz-${idx}`).style.display='block';
  document.getElementById(`score-${idx}`).style.display='none';
  renderQuiz(idx);
}
function toggleVocab(el) {
  const h=el.querySelector('.vhint'), m=el.querySelector('.vmore');
  if (h.style.display==='none'){ h.style.display='block'; m.style.display='none'; }
  else { h.style.display='none'; m.style.display='block'; }
}
initQuiz(0);
</script>
