<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hebreo Bíblico — Introducción + Días 1–10</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Inter:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');
:root {
  --sand:#f7f2e8;
  --clay:#c2873a;
  --clay-l:#fdf3e3;
  --ink:#1c1409;
  --ink2:#4a3520;
  --crimson:#8b1a2a;
  --crimson-l:#fce8eb;
  --olive:#3a5a2a;
  --olive-l:#e6f0e1;
  --stone:#6b5a45;
  --night:#1a1209;
  --night2:#2c1f10;
  --bdr:#d4bc96;
  --wht:#fff;
  --gold:#c9973a;
  --gold-l:#fdf3e3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--sand);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}

/* HEADER */
header{
  background:linear-gradient(160deg,var(--night) 0%,var(--night2) 50%,#3a1a05 100%);
  color:#f7f2e8;
  padding:28px 16px 22px;
  text-align:center;
  border-bottom:3px solid var(--clay);
  position:relative;
  overflow:hidden;
}
header::before{
  content:'בְּרֵאשִׁית';
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Frank Ruhl Libre',serif;
  font-size:9rem;
  color:rgba(255,255,255,.03);
  pointer-events:none;
  white-space:nowrap;
}
header h1{font-family:'Frank Ruhl Libre',serif;font-size:2rem;letter-spacing:.01em;margin-bottom:4px;position:relative}
header .heb-title{font-family:'Frank Ruhl Libre',serif;font-size:1.6rem;color:var(--clay);direction:rtl;margin-bottom:6px;position:relative}
header .sub{font-family:'EB Garamond',serif;font-style:italic;font-size:1rem;color:#d4bc96;position:relative}
header .badges{margin-top:10px;position:relative}
.badge-heb{display:inline-block;background:var(--clay);color:var(--night);border-radius:12px;font-size:11px;font-weight:700;padding:2px 10px;margin:0 3px;letter-spacing:.05em}

/* NAV */
.lesson-nav{display:flex;overflow-x:auto;background:#ede5d5;border-bottom:2px solid var(--bdr);gap:2px;padding:4px 4px 0;scrollbar-width:none}
.lesson-nav::-webkit-scrollbar{display:none}
.lnav-btn{flex-shrink:0;padding:9px 14px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;border-radius:4px 4px 0 0}
.lnav-btn.active{color:var(--crimson);border-bottom-color:var(--crimson);background:var(--sand)}
.lnav-btn:hover:not(.active){background:#e0d5c0}

/* INNER TABS */
.inner-tabs{display:flex;border-bottom:1px solid var(--bdr);background:#f0e8d8;overflow-x:auto;scrollbar-width:none}
.inner-tabs::-webkit-scrollbar{display:none}
.itab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.itab.active{color:var(--crimson);border-bottom-color:var(--crimson);background:var(--sand)}

/* PANELS */
.lesson-panel{display:none;padding:16px;max-width:720px;margin:0 auto}
.lesson-panel.active{display:block}
.itab-panel{display:none}
.itab-panel.active{display:block}

/* CARDS */
.card{background:var(--wht);border:1px solid var(--bdr);border-radius:8px;padding:16px;margin-bottom:14px}
.card h3{font-family:'EB Garamond',serif;font-size:1.15rem;color:var(--crimson);margin-bottom:10px;display:flex;align-items:center;gap:7px}

/* TIPS */
.tip{background:var(--clay-l);border-left:4px solid var(--clay);border-radius:0 6px 6px 0;padding:10px 13px;margin:8px 0;font-size:13px}
.tip strong{color:var(--clay)}
.tip-red{background:var(--crimson-l);border-left-color:var(--crimson)}
.tip-red strong{color:var(--crimson)}
.tip-olive{background:var(--olive-l);border-left-color:var(--olive)}
.tip-olive strong{color:var(--olive)}

/* HEBREW TEXT */
.heb{font-family:'Frank Ruhl Libre',serif;direction:rtl;font-size:1.4rem;color:var(--crimson);display:inline-block}
.heb-lg{font-size:2.2rem}
.heb-xl{font-size:2.8rem}

/* ALEPH-BET GRID */
.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px;margin-top:8px}
.ltr-card{background:var(--sand);border:1px solid var(--bdr);border-radius:6px;padding:10px 6px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s}
.ltr-card:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.ltr-card.on{background:var(--clay-l);border-color:var(--clay)}
.ltr-big{font-family:'Frank Ruhl Libre',serif;font-size:2.2rem;color:var(--crimson);display:block;line-height:1.2;direction:rtl}
.ltr-name{font-size:10px;font-weight:700;color:var(--clay);text-transform:uppercase;letter-spacing:.05em}
.ltr-trans{font-size:11px;color:var(--ink2);margin-top:1px}
.ltr-num{font-size:10px;color:#aaa;margin-top:1px}
.ltr-ex{font-size:10px;color:#888;font-style:italic;margin-top:3px;display:none;direction:rtl}
.ltr-card.on .ltr-ex{display:block}

/* TABLES */
.gtable{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.gtable th{background:var(--crimson);color:#fff;padding:7px 10px;text-align:left;font-weight:600}
.gtable td{padding:6px 10px;border-bottom:1px solid #e8d8c0}
.gtable tr:nth-child(even) td{background:#fdf7f0}
.gtable .hcell{font-family:'Frank Ruhl Libre',serif;font-size:1.3rem;color:var(--crimson);direction:rtl;text-align:right}
.gtable .hl{background:#fff8e1!important;font-weight:700}
.rtl-col{direction:rtl;text-align:right}

/* PARADIGM */
.paradigm{display:grid;gap:5px;margin-top:8px}
.para-row{display:grid;grid-template-columns:110px 1fr 1fr;gap:4px;align-items:center;font-size:13px}
.para-lbl{font-weight:600;color:var(--ink2);font-size:12px}
.para-heb{font-family:'Frank Ruhl Libre',serif;font-size:1.2rem;color:var(--crimson);direction:rtl;text-align:right}
.para-esp{color:var(--ink2);font-size:13px}
.para-head{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#aaa;padding-bottom:2px;border-bottom:1px solid var(--bdr)}

/* VOCAB */
.vlist{list-style:none}
.vitem{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #e8d8c0;cursor:pointer}
.vheb{font-family:'Frank Ruhl Libre',serif;font-size:1.4rem;color:var(--crimson);min-width:90px;flex-shrink:0;direction:rtl;text-align:right}
.vtrans{font-size:13px;font-weight:600}
.vhint{font-size:11px;color:#888;font-style:italic;margin-top:1px}
.vmore{font-size:11px;color:var(--clay)}

/* QUIZ */
.qcard{background:var(--wht);border:2px solid var(--bdr);border-radius:10px;padding:18px;margin-bottom:12px;text-align:center}
.qbig{font-family:'Frank Ruhl Libre',serif;font-size:2.6rem;color:var(--crimson);margin-bottom:14px;line-height:1.2;direction:rtl}
.qbig-latin{font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--crimson);margin-bottom:14px;font-style:italic}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qbtn{background:var(--sand);border:2px solid var(--bdr);border-radius:7px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--ink);font-family:'Inter',sans-serif}
.qbtn:hover{border-color:var(--crimson);color:var(--crimson)}
.qbtn.ok{background:var(--olive-l);border-color:var(--olive);color:var(--olive)}
.qbtn.no{background:var(--crimson-l);border-color:var(--crimson);color:var(--crimson)}
.qfb{margin-top:10px;font-size:13px;font-weight:600;min-height:18px}
.qscore{text-align:center;padding:20px;font-weight:700;color:var(--crimson);font-size:1.1rem}

/* VERSE BLOCK */
.vblock{background:linear-gradient(160deg,var(--night) 0%,var(--night2) 60%,#3a1a05 100%);color:#f7f2e8;border-radius:10px;padding:22px 16px;text-align:center;margin-bottom:14px}
.vblock-heb{font-family:'Frank Ruhl Libre',serif;font-size:1.6rem;line-height:2;color:var(--clay);direction:rtl;margin-bottom:10px}
.vblock-trans{font-size:12px;color:#c8b896;font-style:italic;font-family:'EB Garamond',serif}
.vwords{text-align:right;margin-top:14px;direction:rtl}
.vrow{display:flex;justify-content:space-between;flex-direction:row-reverse;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:12px}
.vwh{font-family:'Frank Ruhl Libre',serif;font-size:1.05rem;color:var(--clay)}
.vwe{color:#c8b896;text-align:left}

/* PROGRESS */
.prog-bar{height:5px;background:#ddd;border-radius:3px;margin:6px 0 3px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--clay),var(--crimson));border-radius:3px;transition:width .5s}
.prog-lbl{font-size:11px;color:#aaa}
.note{font-size:11px;color:#999;text-align:center;margin-top:6px;font-style:italic}
p{font-size:14px;margin-bottom:8px}

/* INTRO PAGE */
.intro-hero{background:linear-gradient(160deg,var(--night) 0%,var(--night2) 60%,#3a1a05 100%);border-radius:10px;padding:24px 18px;text-align:center;margin-bottom:16px;color:#f7f2e8}
.intro-hero .big-heb{font-family:'Frank Ruhl Libre',serif;font-size:3.5rem;color:var(--clay);direction:rtl;line-height:1.3;margin-bottom:8px}
.intro-hero p{color:#c8b896;font-family:'EB Garamond',serif;font-style:italic;font-size:1rem;margin:0}
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.feature-box{background:var(--sand);border:1px solid var(--bdr);border-radius:7px;padding:12px;text-align:center}
.feature-icon{font-size:1.5rem;margin-bottom:4px}
.feature-title{font-weight:700;font-size:13px;color:var(--crimson)}
.feature-desc{font-size:11px;color:var(--stone);margin-top:2px}
.diff-list{list-style:none;padding:0}
.diff-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #e8d8c0;font-size:13px}
.diff-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.conj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.conj-box{background:var(--sand);border:1px solid var(--bdr);border-radius:6px;padding:10px 12px}
.conj-box h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--clay);margin-bottom:6px}
.conj-line{display:flex;justify-content:space-between;font-size:13px;padding:2px 0;border-bottom:1px solid #e8d8c0}
.conj-heb{font-family:'Frank Ruhl Libre',serif;font-size:1.1rem;color:var(--crimson);direction:rtl}
.conj-esp{color:var(--ink2);font-size:12px}
</style>
</head>
<body>

<header>
  <div class="heb-title">עִבְרִית בִּבְלִית</div>
  <h1>Hebreo Bíblico</h1>
  <div class="sub">Introducción completa + Días 1–10 · Lo esencial del Antiguo Testamento</div>
  <div class="badges">
    <span class="badge-heb">📜 22 LETRAS</span>
    <span class="badge-heb">RTL DERECHA→IZQUIERDA</span>
    <span class="badge-heb">SIN VOCALES ORIGINALMENTE</span>
  </div>
</header>

<div class="lesson-nav" id="lnav"></div>
<div id="lessons-container"></div>

<script>
const LESSONS = [
// ── INTRODUCCIÓN ──────────────────────────────────────────────
{
  day:0, title:"Introducción al Hebreo Bíblico", subtitle:"¿Qué es, por qué estudiarlo, y en qué se diferencia del griego?",
  isIntro:true,
  tips:[
    {t:'<strong>El hebreo bíblico</strong> es la lengua del Antiguo Testamento (con algunas secciones en arameo: Esdras 4-7, Daniel 2-7 y versículos sueltos). Aproximadamente el 77% de la Biblia fue escrito originalmente en hebreo.'},
    {t:'<strong>No es el mismo que el hebreo moderno.</strong> El hebreo bíblico (o clásico) abarca textos del siglo XII a.C. (cántico de Débora, Jc 5) hasta el siglo II a.C. El hebreo moderno del Estado de Israel es una lengua revivida con vocabulario y pronunciación modernos.'},
    {t:'<strong>El sistema de escritura:</strong> 22 consonantes, sin vocales originalmente. El sistema de puntos vocálicos (nikkud) fue añadido por los masoretas entre los siglos VI y X d.C. para preservar la pronunciación tradicional. Las Biblias académicas lo incluyen; los rollos del Mar Muerto no lo tienen.'},
    {t:'<strong>Por qué estudiarlo:</strong> la Septuaginta (traducción griega del AT que citan Jesús y el NT) no captura toda la riqueza del hebreo. Los juegos de palabras, la poesía, el quiasmo, los significados de los nombres propios, la teología del texto — todo depende del hebreo original.'},
  ],
  features:[
    {icon:'📖',title:'77% de la Biblia',desc:'El AT en hebreo (+ algo de arameo)'},
    {icon:'➡️',title:'Derecha a izquierda',desc:'Se lee y escribe al revés del español'},
    {icon:'🔤',title:'22 consonantes',desc:'Sin letras: las vocales son puntos bajo/sobre ellas'},
    {icon:'⚡',title:'Raíces de 3 letras',desc:'Casi toda la morfología sale de raíces triconsonánticas'},
  ],
  diffs:[
    {icon:'🔁',t:'<strong>Dirección:</strong> el hebreo se escribe y lee de derecha a izquierda. La primera página de una Biblia hebrea es lo que para nosotros sería la última.'},
    {icon:'🔤',t:'<strong>Consonantes y vocales separadas:</strong> en griego, las vocales son letras plenas (α, ε, η, ι, ο, υ, ω). En hebreo, las vocales son signos diacríticos (puntos) añadidos bajo o sobre las consonantes.'},
    {icon:'🌱',t:'<strong>Raíces triconsonánticas:</strong> casi todas las palabras hebreas derivan de una raíz de 3 consonantes. קדשׁ (q-d-sh) da: קָדוֹשׁ (santo), קֹדֶשׁ (santidad), מִקְדָּשׁ (santuario), הִקְדִּישׁ (santificar). Aprender una raíz es aprender docenas de palabras.'},
    {icon:'⏰',t:'<strong>Sistema verbal diferente:</strong> el hebreo no tiene "tiempos" en el sentido español. Tiene dos estados: qatal (acción completada) y yiqtol (acción incompleta/futura). El contexto determina si es pasado, presente o futuro.'},
    {icon:'🎭',t:'<strong>Género gramatical:</strong> como el español, todo sustantivo tiene género masculino o femenino. Los plurales femeninos terminan en ‑וֹת (-ot), los masculinos en ‑ִים (-im).'},
    {icon:'📜',t:'<strong>Sin mayúsculas:</strong> el hebreo no distingue mayúsculas de minúsculas. Un nombre propio y un sustantivo común tienen exactamente el mismo aspecto gráfico.'},
  ],
  vocab:[
    {g:'תּוֹרָה',    t:'Torá, ley, instrucción',          h:'Gn 1:1 — contexto: los primeros 5 libros',     f:'Raíz: י-ר-ה (yarah) = enseñar, instruir'},
    {g:'בְּרֵאשִׁית',t:'en el principio',                  h:'Gn 1:1 — la primera palabra de la Biblia',     f:'ב (en) + רֵאשִׁית (principio/cabeza)'},
    {g:'שָׁלוֹם',   t:'paz, bienestar, integridad',       h:'Nm 6:26 — "וְיָשֵׂם לְךָ שָׁלוֹם"',            f:'Saludo y despedida en hebreo hasta hoy'},
    {g:'אָמֵן',     t:'amén, verdaderamente, así sea',    h:'Dt 27:15 — fórmula de confirmación',           f:'Raíz: א-מ-נ (aman) = ser fiel, firme'},
    {g:'הַלְלוּיָהּ',t:'alabad al Señor (hallelu-Yah)',    h:'Sal 104:35 — primera aparición en el AT',      f:'הַלְלוּ (alabad) + יָהּ (abreviatura de YHWH)'},
    {g:'יהוה',      t:'YHWH — el nombre divino',          h:'Gn 2:4 — primer uso del Tetragrama',           f:'Probablemente relacionado con hayah = ser'},
    {g:'אֱלֹהִים',  t:'Dios (plural de majestad)',         h:'Gn 1:1 — "בְּרֵאשִׁית בָּרָא אֱלֹהִים"',        f:'Plural con verbo singular: énfasis de grandeza'},
    {g:'בָּרָא',    t:'crear (de la nada)',               h:'Gn 1:1 — solo Dios como sujeto en el AT',     f:'Raíz: ב-ר-א — solo divino como sujeto'},
  ],
  quiz:[
    {q:'¿En qué dirección se lee el hebreo?', opts:['izquierda → derecha','derecha → izquierda','arriba → abajo','depende del texto'], ans:1},
    {q:'¿Cuántas consonantes tiene el alef-bet hebreo?', opts:['22','24','26','28'], ans:0},
    {q:'El sistema de puntos vocálicos fue añadido por...', opts:['Moisés','los LXX','los masoretas (s. VI-X d.C.)','los rabinos del s. I'], ans:2},
    {q:'Una raíz triconsonántica hebrea tiene...', opts:['2 consonantes','3 consonantes','4 consonantes','varía'], ans:1},
    {q:'El plural masculino en hebreo termina en...', opts:['-ot','-im','-ah','-el'], ans:1},
    {q:'אֱלֹהִים es gramaticalmente...', opts:['singular','dual','plural','indeclinable'], ans:2},
    {q:'בְּרֵאשִׁית es...', opts:['la última palabra de Gn 1:1','el nombre de Dios en Gn 1','la primera palabra de la Biblia','el verbo de Gn 1:1'], ans:2},
    {q:'La Torá en hebreo significa...', opts:['ley sagrada e inmutable','instrucción/enseñanza','mandamiento','alianza'], ans:1},
  ],
  verse:{heb:'בְּרֵאשִׁית בָּרָא אֱלֹהִים אֵת הַשָּׁמַיִם וְאֵת הָאָרֶץ', esp:'"En el principio creó Dios los cielos y la tierra" — Génesis 1:1',
    words:[['בְּרֵאשִׁית','en el principio (ב + רֵאשִׁית)'],['בָּרָא','creó (qatal 3ª masc. sg.)'],['אֱלֹהִים','Dios (sujeto — nom. plural de majestad)'],['אֵת','partícula de objeto directo (intraducible)'],['הַשָּׁמַיִם','los cielos (ha + shamayim, dual)'],['וְאֵת','y (את con waw conjuntivo)'],['הָאָרֶץ','la tierra (ha + aretz)']],
    insight:'אֵת es la partícula del objeto directo definido en hebreo — no tiene traducción al español pero su presencia indica que lo que sigue es el objeto directo del verbo. Siete palabras en hebreo que contienen toda la teología de la creación: origen (בְּרֵאשִׁית), acción creadora exclusivamente divina (בָּרָא solo tiene a Dios como sujeto), el nombre del creador (אֱלֹהִים), y el alcance total de la creación (שָׁמַיִם וָאָרֶץ = merismo = todo).'
  }
},
// ── DÍA 1 ────────────────────────────────────────────────────
{
  day:1, title:"El Alef-Bet (א–י)", subtitle:"Las primeras 10 letras del alfabeto hebreo",
  letters:[
    {h:'א',name:'Álef',  trans:'(silenciosa)',  num:'1',  ex:'אֱלֹהִים = Dios'},
    {h:'בּ/ב',name:'Bet',trans:'b / v',         num:'2',  ex:'בְּרֵאשִׁית = principio'},
    {h:'גּ/ג',name:'Guímel',trans:'g',          num:'3',  ex:'גּוֹי = nación'},
    {h:'דּ/ד',name:'Dálet',trans:'d',           num:'4',  ex:'דָּבָר = palabra'},
    {h:'ה',name:'He',    trans:'h (aspirada)',   num:'5',  ex:'הַיּוֹם = hoy'},
    {h:'ו',name:'Vav',   trans:'v / w',          num:'6',  ex:'וְ = y (conjunción)'},
    {h:'ז',name:'Zayin', trans:'z',              num:'7',  ex:'זָהָב = oro'},
    {h:'ח',name:'Jet',   trans:'j fuerte',       num:'8',  ex:'חֶסֶד = amor leal'},
    {h:'ט',name:'Tet',   trans:'t enfática',     num:'9',  ex:'טוֹב = bueno'},
    {h:'י',name:'Yod',   trans:'y (consonante)', num:'10', ex:'יהוה = YHWH'},
  ],
  tips:[
    {t:'<strong>Álef (א)</strong> es la primera letra pero es silenciosa: representa una oclusión glotal. Su sonido lo da la vocal que lleva. En posición inicial de palabra siempre hay que leer la vocal, no la letra.'},

{

    {t:'<strong>El qatal se forma</strong> añadiendo sufijos a la raíz verbal. La raíz de 3 consonantes es la base: כ-ת-ב (k-t-b) = escribir. Las desinencias identifican persona, género y número: כָּתַב (él escribió), כָּתְבָה (ella escribió), כָּתַבְתָּ (tú escribiste, masc.).'},
    {t:'<strong>El verbo en hebreo concuerda en género</strong> con el sujeto. Si el sujeto es femenino, el verbo toma desinencia femenina. Esta concordancia de género en el verbo es una de las grandes diferencias con el español.'},

{

  tips:[
    {t:'<strong>El yiqtol</strong> (también llamado imperfecto) expresa una acción vista como incompleta, en proceso, o futura. Prefija a la raíz verbal: יִכְתֹּב = "él escribirá / él escribe / que él escriba". El contexto determina la traducción.'},
    {t:'<strong>El waw consecutivo con yiqtol</strong> (וַיִּ-) es la construcción narrativa más frecuente del AT. Cuando וְ (waw) se añade al yiqtol con dagesh reforzante, el resultado es un pasado narrativo: וַיֹּאמֶר = "y dijo". Es la columna vertebral de toda la narración bíblica.'},
    {t:'<strong>De Génesis a Reyes</strong>, cada escena narrativa está construida con esta fórmula: וַיְהִי... וַיֹּאמֶר... וַיַּרְא... וַיַּעַשׂ... ("y fue... y dijo... y vio... y hizo..."). Reconocer וַיּ- como marcador narrativo te desbloquea la lectura de toda la narrativa hebrea.'},
    {t:'<strong>El yiqtol cohortativo</strong> (1ª persona + ָה final) expresa deseo o intención: אֶכְתְּבָה = "¡déjame escribir!" / "quiero escribir". El jussivo (3ª persona con forma corta) es el equivalente para mandatos: יְהִי אוֹר = "¡que haya luz!".'},

{

  tips:[
    {t:'<strong>Los pronombres personales independientes</strong> en hebreo, como en griego, solo se usan para énfasis. Normalmente el sujeto está incorporado en el verbo. Cuando aparece אֲנִי o אָנֹכִי (yo), הוּא (él), הִיא (ella), hay un énfasis especial.'},

// ── BUILD UI ─────────────────────────────────────────────────
const lnav = document.getElementById('lnav');
const container = document.getElementById('lessons-container');

LESSONS.forEach((lesson, idx) => {
  const btn = document.createElement('button');
  btn.className = 'lnav-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = lesson.day === 0 ? 'Intro' : `Día ${lesson.day}`;
  btn.onclick = () => showLesson(idx);
  lnav.appendChild(btn);
  const panel = document.createElement('div');
  panel.className = 'lesson-panel' + (idx === 0 ? ' active' : '');
  panel.id = `lesson-${idx}`;
  panel.innerHTML = buildLesson(lesson, idx);
  container.appendChild(panel);
});

function showLesson(idx) {
  document.querySelectorAll('.lnav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.lesson-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  initQuiz(idx);
}

function showInnerTab(lIdx, tabName) {
  const panel = document.getElementById(`lesson-${lIdx}`);
  panel.querySelectorAll('.itab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  panel.querySelectorAll('.itab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
}

function buildLesson(lesson, idx) {
  const tabKeys = ['leccion','vocab','quiz','verse'];
  const tabLabels = ['📖 Lección','📚 Vocabulario','✏️ Práctica','✝️ Texto'];
  const pct = lesson.day === 0 ? 0 : (lesson.day/30*100).toFixed(1);
  const progLabel = lesson.day === 0 ? 'Introducción' : `Día ${lesson.day} de 30`;

  let html = `
  <div style="text-align:center;margin-bottom:14px;">
    <div style="font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--crimson);">${lesson.day === 0 ? 'Introducción' : `Día ${lesson.day}`} — ${lesson.title}</div>
    <div style="font-size:12px;color:#888;margin-top:2px;">${lesson.subtitle}</div>
    <div class="prog-bar" style="max-width:300px;margin:8px auto 3px;"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-lbl">${progLabel}</div>
  </div>
  <div class="inner-tabs">
    ${tabLabels.map((t,i)=>`<div class="itab${i===0?' active':''}" data-tab="${tabKeys[i]}" onclick="showInnerTab(${idx},'${tabKeys[i]}')">${t}</div>`).join('')}
  </div>`;

  // LECCIÓN TAB
  html += `<div class="itab-panel active" data-tab="leccion">`;

  // Intro page special
  if (lesson.isIntro) {
    html += `<div class="intro-hero"><div class="big-heb">עִבְרִית בִּבְלִית</div><p>La lengua del pueblo de Dios — el idioma de Moisés, David, Isaías y los Profetas</p></div>`;
    html += `<div class="card"><h3><span>✨</span> ¿Por qué estudiar hebreo bíblico?</h3>`;
    lesson.tips.forEach(t => { html += `<div class="tip">${t.t}</div>`; });
    html += `</div>`;
    html += `<div class="card"><h3><span>⚡</span> Características principales</h3><div class="feature-grid">`;
    lesson.features.forEach(f => { html += `<div class="feature-box"><div class="feature-icon">${f.icon}</div><div class="feature-title">${f.title}</div><div class="feature-desc">${f.desc}</div></div>`; });
    html += `</div></div>`;
    html += `<div class="card"><h3><span>🔀</span> Diferencias clave con el griego</h3><ul class="diff-list">`;
    lesson.diffs.forEach(d => { html += `<li class="diff-item"><span class="diff-icon">${d.icon}</span><span>${d.t}</span></li>`; });
    html += `</ul></div>`;
  } else {
    // Tips
    if (lesson.tips && lesson.tips.length) {
      html += `<div class="card"><h3><span>💡</span> Claves del día</h3>`;
      lesson.tips.forEach(t => { html += `<div class="tip">${t.t}</div>`; });
      html += `</div>`;
    }
    // Letters grid
    if (lesson.letters && lesson.letters.length) {
      html += `<div class="card"><h3><span>🔤</span> Las letras de hoy — toca para ver ejemplo bíblico</h3><div class="alpha-grid">`;
      lesson.letters.forEach(lt => {
        html += `<div class="ltr-card" onclick="this.classList.toggle('on')">
          <span class="ltr-big">${lt.h}</span>
          <div class="ltr-name">${lt.name}</div>
          <div class="ltr-trans">${lt.trans}</div>
          <div class="ltr-num">valor: ${lt.num}</div>
          <div class="ltr-ex">${lt.ex}</div>
        </div>`;
      });
      html += `</div></div>`;
    }
    // Extra content (table or conj)
    if (lesson.extra) {
      const e = lesson.extra;
      if (e.type === 'table') {
        html += `<div class="card"><h3><span>📊</span> ${e.title}</h3>
        <table class="gtable"><thead><tr>${e.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
        e.rows.forEach(r => { html += `<tr>${r.map((c,ci)=>`<td${ci===0?' style="font-weight:600"':''}>${c}</td>`).join('')}</tr>`; });
        html += `</tbody></table></div>`;
      } else if (e.type === 'conj') {
        html += `<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="conj-grid">`;
        e.cols.forEach(col => {
          html += `<div class="conj-box"><h4>${col.title}</h4>`;
          col.rows.forEach(r => { html += `<div class="conj-line"><span class="conj-heb">${r[0]}</span><span class="conj-esp">${r[1]}</span></div>`; });
          html += `</div>`;
        });
        html += `</div></div>`;
      }
    }
  }
  html += `</div>`; // end leccion

  // VOCAB TAB
  html += `<div class="itab-panel" data-tab="vocab"><div class="card"><h3><span>📚</span> Vocabulario del día</h3>
  <p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada palabra para ver más información.</p><ul class="vlist">`;
  lesson.vocab.forEach(v => {
    html += `<li class="vitem" onclick="toggleVocab(this)">
      <div class="vheb">${v.g}</div>
      <div><div class="vtrans">${v.t}</div>
      <div class="vhint" style="display:none;">${v.h} — <em>${v.f}</em></div>
      <div class="vmore">↓ más info</div></div></li>`;
  });
  html += `</ul></div></div>`;

  // QUIZ TAB
  html += `<div class="itab-panel" data-tab="quiz"><div class="card"><h3><span>✏️</span> Práctica — ${lesson.day === 0 ? 'Introducción' : `Día ${lesson.day}`}</h3>
  <div id="quiz-${idx}"></div><div id="score-${idx}" class="qscore" style="display:none;"></div></div></div>`;

  // VERSE TAB
  const v = lesson.verse;
  html += `<div class="itab-panel" data-tab="verse">
  <div class="vblock">
    <div class="vblock-heb">${v.heb}</div>
    <div class="vblock-trans">${v.esp}</div>
    <div class="vwords">`;
  v.words.forEach(w => { html += `<div class="vrow"><span class="vwh">${w[0]}</span><span class="vwe">${w[1]}</span></div>`; });
  html += `</div></div>
  <div class="card"><h3><span>🔍</span> El detalle que las traducciones pierden</h3><p>${v.insight}</p></div>
  </div>`;

  return html;
}

// QUIZ ENGINE
const quizState = {};
function initQuiz(idx) {
  if (quizState[idx]) return;
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  renderQuiz(idx);
}
function renderQuiz(idx) {
  const el = document.getElementById(`quiz-${idx}`);
  const sc = document.getElementById(`score-${idx}`);
  const s = quizState[idx];
  if (!s) return;
  if (s.pos >= s.data.length) {
    el.style.display='none'; sc.style.display='block';
    const pct = Math.round(s.score/s.data.length*100);
    sc.innerHTML = `${pct>=75?'🎉':'📖'} <strong>${s.score}/${s.data.length}</strong> correctas (${pct}%)<br>
    <span style="font-size:13px;color:#888;">${pct>=75?'¡Excelente! Sigue adelante en hebreo.':'El hebreo es exigente — revisa y repite.'}</span>
    <br><button class="qbtn" style="margin-top:10px;" onclick="resetQuiz(${idx})">↺ Repetir</button>`;
    return;
  }
  const q = s.data[s.pos];
  const isHeb = q.q.match(/[\u05D0-\u05FF]/);
  html2 = `<div class="qcard">
    <div style="font-size:11px;color:#aaa;margin-bottom:6px;">${s.pos+1} / ${s.data.length}</div>
    <div class="${isHeb?'qbig':'qbig-latin'}">${q.q}</div>
    <div class="qgrid">${q.opts.map((o,i)=>`<button class="qbtn" onclick="checkQ(${idx},this,${i},${q.ans})">${o}</button>`).join('')}</div>
    <div class="qfb" id="qfb-${idx}"></div>
  </div>`;
  el.innerHTML = html2;
}
function checkQ(idx, btn, chosen, correct) {
  const s = quizState[idx];
  btn.parentElement.querySelectorAll('.qbtn').forEach(b => b.disabled=true);
  const fb = document.getElementById(`qfb-${idx}`);
  if (chosen===correct) { btn.classList.add('ok'); fb.style.color='var(--olive)'; fb.textContent='✓ ¡Correcto!'; s.score++; }
  else { btn.classList.add('no'); btn.parentElement.querySelectorAll('.qbtn')[correct].classList.add('ok'); fb.style.color='var(--crimson)'; fb.textContent=`✗ Era: ${s.data[s.pos].opts[correct]}`; }
  setTimeout(()=>{ s.pos++; renderQuiz(idx); }, 1300);
}
function resetQuiz(idx) {
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  document.getElementById(`quiz-${idx}`).style.display='block';
  document.getElementById(`score-${idx}`).style.display='none';
  renderQuiz(idx);
}
function toggleVocab(el) {
  const h=el.querySelector('.vhint'), m=el.querySelector('.vmore');
  if (h.style.display==='none'){ h.style.display='block'; m.style.display='none'; }
  else { h.style.display='none'; m.style.display='block'; }
}
let html2 = '';
initQuiz(0);
</script>
</body>
</html>
