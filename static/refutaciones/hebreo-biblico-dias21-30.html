<style>

:root {

}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--sand);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}

header h1{font-family:'Frank Ruhl Libre',serif;font-size:1.9rem;letter-spacing:.02em;margin-bottom:2px;position:relative}

header .sub{font-family:'EB Garamond',serif;font-style:italic;font-size:1rem;color:#d4bc96;position:relative}
header .badges{margin-top:8px;position:relative}
.badge-heb{display:inline-block;background:var(--clay);color:var(--night);border-radius:12px;font-size:11px;font-weight:700;padding:2px 10px;margin:0 3px;letter-spacing:.05em}
.lesson-nav{display:flex;overflow-x:auto;background:#ede5d5;border-bottom:2px solid var(--bdr);gap:2px;padding:4px 4px 0;scrollbar-width:none}
.lesson-nav::-webkit-scrollbar{display:none}
.lnav-btn{flex-shrink:0;padding:9px 14px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;border-radius:4px 4px 0 0}

.lnav-btn:hover:not(.active){background:#e0d5c0}

.inner-tabs::-webkit-scrollbar{display:none}

.lesson-panel{display:none;padding:16px;max-width:720px;margin:0 auto}
.lesson-panel.active{display:block}
.itab-panel{display:none}
.itab-panel.active{display:block}
.card{background:var(--wht);border:1px solid var(--bdr);border-radius:8px;padding:16px;margin-bottom:14px}
.card h3{font-family:'EB Garamond',serif;font-size:1.15rem;color:var(--crimson);margin-bottom:10px;display:flex;align-items:center;gap:7px}

.qbtn.ok{background:var(--olive-l);border-color:var(--olive);color:var(--olive)}
.qbtn.no{background:var(--crimson-l);border-color:var(--crimson);color:var(--crimson)}
.qfb{margin-top:10px;font-size:13px;font-weight:600;min-height:18px}
.qscore{text-align:center;padding:20px;font-weight:700;color:var(--crimson);font-size:1.1rem}
.vblock{background:linear-gradient(160deg,var(--night) 0%,#1a0a2a 40%,#2c1005 100%);color:#f7f2e8;border-radius:10px;padding:22px 16px;text-align:center;margin-bottom:14px}

.vblock-trans{font-size:12px;color:#c8b896;font-style:italic;font-family:'EB Garamond',serif}
.vwords{text-align:right;margin-top:14px;direction:rtl}
.vrow{display:flex;justify-content:space-between;flex-direction:row-reverse;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:12px}
.vwh{font-family:'Frank Ruhl Libre',serif;font-size:1.05rem;color:var(--clay)}
.vwe{color:#c8b896;text-align:left}
.prog-bar{height:5px;background:#ddd;border-radius:3px;margin:6px 0 3px}

.prog-lbl{font-size:11px;color:#aaa}
p{font-size:14px;margin-bottom:8px}
.conj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.conj-box{background:var(--sand);border:1px solid var(--bdr);border-radius:6px;padding:10px 12px}
.conj-box h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--clay);margin-bottom:6px}

.conj-heb{font-family:'Frank Ruhl Libre',serif;font-size:1.1rem;color:var(--crimson);direction:rtl}
.conj-esp{color:var(--ink2);font-size:12px}
.finish-banner{background:linear-gradient(135deg,var(--clay),#8b5e1a);color:#fff;border-radius:10px;padding:22px 18px;text-align:center;margin-bottom:16px}
.finish-banner h2{font-family:'Frank Ruhl Libre',serif;font-size:1.8rem;margin-bottom:6px}
.finish-banner .heb-big{font-family:'Frank Ruhl Libre',serif;font-size:2.5rem;direction:rtl;color:#fdf3e3;margin-bottom:6px}
.finish-banner p{color:#fde8c0;font-size:14px;margin:0}
.note{font-size:11px;color:#999;text-align:center;margin-top:6px;font-style:italic}

  tips:[
    {t:'<strong>בְּרִית (berit, alianza)</strong> aparece 286 veces en el AT y es la categoría teológica estructuradora de toda la narrativa bíblica. No es simplemente un "contrato" bilateral — en el mundo antiguo era un vínculo de lealtad asimétrico impuesto por el soberano superior al vasallo.'},
    {t:'<strong>Las fórmulas de alianza</strong> tienen una estructura reconocible en los tratados hetitas de los siglos XIV-XIII a.C.: (1) preámbulo (identificación del soberano); (2) prólogo histórico (actos de gracia previos); (3) estipulaciones; (4) depósito del documento; (5) lista de testigos; (6) bendiciones y maldiciones. Deuteronomio sigue exactamente esta estructura.'},
    {t:'<strong>El vocabulario de la alianza:</strong> כָּרַת בְּרִית = "cortar alianza" (la alianza se "cortaba" con el sacrificio de animales partidos — Gn 15); חֶסֶד = amor leal de alianza; אֱמֶת = fidelidad de alianza; שָׁלוֹם = bienestar integral prometido; קְדֻשָּׁה = santidad como marca del pueblo de la alianza.'},

  verse:{heb:'וְנָתַתִּי אֶת תּוֹרָתִי בְּקִרְבָּם וְעַל לִבָּם אֶכְתְּבֶנָּה וְהָיִיתִי לָהֶם לֵאלֹהִים וְהֵמָּה יִהְיוּ לִי לְעָם', esp:'"Pondré mi torá dentro de ellos y la escribiré en su corazón; y seré yo su Dios y ellos serán mi pueblo" — Jeremías 31:33',
    words:[['וְנָתַתִּי','y pondré (waw + qatal 1ª sg. de נתן — futuro promisorio)'],['אֶת תּוֹרָתִי','mi torá (את + תּוֹרָה + ִי sufijo)'],['בְּקִרְבָּם','dentro de ellos (בְּ + קֶרֶב + ָם sufijo 3ª pl.)'],['וְעַל לִבָּם','y sobre su corazón (וְ + עַל + לֵב + ָם)'],['אֶכְתְּבֶנָּה','la escribiré (yiqtol 1ª sg. + נָּה sufijo fem. = "la")'],['וְהָיִיתִי לָהֶם לֵאלֹהִים','y seré para ellos Dios (fórmula de alianza)'],['וְהֵמָּה יִהְיוּ לִי לְעָם','y ellos serán para mí pueblo (fórmula recíproca)']],

// ── DÍA 22 ──────────────────────────────────────────────────
{

  tips:[
    {t:'<strong>El Salmo 1</strong> es el portal de entrada al Salterio. No tiene título, no es de David — es el umbral. Presenta los dos caminos (דֶּרֶךְ הַצַּדִּיקִים vs. דֶּרֶךְ הָרְשָׁעִים) que estructuran todo el libro de los Salmos y toda la teología sapiencial del AT.'},

{

  tips:[
    {t:'<strong>Los Salmos de ascenso</strong> (שִׁיר הַמַּעֲלוֹת, 120-134) son 15 salmos breves que los peregrinos cantaban al subir a Jerusalén tres veces al año. מַעֲלָה significa "ascenso, escalón, peldaño". Son los más accesibles gramaticalmente de todo el Salterio.'},
    {t:'<strong>Sal 121</strong> usa el participio שֹׁמֵר (guardián) cinco veces en ocho versículos — el martilleo del participio construye la seguridad. El participio hebreo no tiene tiempo: el guardián guarda siempre, en todo tiempo, sin interrupción. La gramática es la teología.'},
    {t:'<strong>Sal 122</strong> usa formas cohortativas y el verbo שָׁלַל (pedir bienestar): "Pedid la שָׁלוֹם de Jerusalén". שָׁאַל שָׁלוֹם es la expresión hebrea de saludo: preguntar por el bienestar. El juego de palabras שָׁאַל שָׁלוֹם יְרוּשָׁלִָם se pierde en traducción.'},
    {t:'<strong>Sal 130</strong> (De profundis) usa מַעֲמַקִּים (abismos, aguas profundas) — el Sheol imaginado como aguas que asfixian. La imagen es marinera: el orante grita desde el fondo del océano. El participio מְצַפֶּה (esperando) al final construye una espera activa, postural — no pasiva.'},
  ],

    {t:'<strong>Ezequiel</strong> tiene el hebreo más difícil y visionario del AT: los querubines (כְּרוּבִים), la rueda dentro de la rueda (אוֹפַן בְּתוֹךְ אוֹפָן), la visión del valle de huesos secos (37). El מֶרְכָּבָה (carro-trono) de Ez 1 se convirtió en el núcleo de la mística judía posterior (merkavah).'},

  tips:[
    {t:'<strong>Proverbios (מִשְׁלֵי)</strong> usa el מָשָׁל — proverbio, parábola, dicho sapiencial — como unidad literaria. La raíz מ-שׁ-ל significa "dominar, gobernar, comparar". El proverbio "domina" la realidad al nombrarla con precisión. Caps. 1-9 son discursos; caps. 10-31 son colecciones de proverbios breves.'},
    {t:'<strong>הֶבֶל הֲבָלִים (Eclesiastés 1:2)</strong> es el superlativo hebreo por excelencia: "vanidad de vanidades" = la más absoluta vanidad. הֶבֶל significa literalmente "vapor, aliento, niebla" — lo que existe brevemente y sin consistencia. El libro de Qohélet explora radicalmente los límites del conocimiento humano y de la teodicea.'},
    {t:'<strong>קֹהֶלֶת (Qohélet)</strong> significa literalmente "el que reúne (la asamblea)" o "el que habla en la asamblea" — un participio Qal femenino usado como nombre propio masculino. Es el nombre del maestro que medita. En los LXX se traduce Ἐκκλησιαστής (el que habla en la ecclesia) — de donde viene "Eclesiastés".'},
    {t:'<strong>La estructura de Proverbios caps. 1-9</strong> está dominada por la figura de la Sabiduría personificada (חָכְמָה) que llama desde las esquinas (8:1-4) y la figura contraria de la Mujer Extraña (אִשָּׁה זָרָה) que seduce. Es una estructura narrativa dual que funciona como introducción al sistema sapiencial.'},

    insight:'הֶבֶל הֲבָלִים: sustantivo + genitivo plural del mismo sustantivo = superlativo semítico. "El vapor de los vapores" = lo más vapor posible. El libro de Qohélet no concluye con nihilismo sino con temor de Dios (12:13). Pero primero obliga al lector a confrontar el límite: "todo" (הַכֹּל) — sin excepciones. La palabra הֶבֶל aparece 38 veces: el libro es una variación sobre un solo tema, como las Variaciones Goldberg de Bach. El final (12:14) no niega los 38 הֶבֶל — los trasciende desde el juicio de Dios.'

    {t:'<strong>El Cantar de los Cantares</strong> (שִׁיר הַשִּׁירִים) es otro superlativo hebreo: "el canto de los cantos" = el más excelso de todos los cantos. Tiene el hebreo más poético, más arcaico y más sensorial del AT. El vocabulario incluye palabras únicas y préstamos de otras lenguas.'},
    {t:'<strong>El género:</strong> poesía de amor con trasfondo de jardín/huerto (גַּן). La imagen del גַּן evoca deliberadamente el Edén (Gn 2:8-15). El Cantar puede leerse como la recuperación del amor del jardín perdido: Adán y Eva en el Edén sin vergüenza (Gn 2:25) reaparece como el amado y la amada en el jardín del Cantar.'},
    {t:'<strong>La voz femenina</strong> del Cantar es prominente y activa: la mujer habla más que el hombre, toma iniciativa, describe su propio deseo. El hebreo distingue claramente el género: las formas verbales de 2ª y 3ª persona femeninas son inconfundibles. La mujer es el sujeto principal, no el objeto.'},
    {t:'<strong>Los adjetivos del Cantar:</strong> שָׁחוֹר (negro/moreno), יָפֶה (hermosa), נָעִים (agradable), אֲדֹמִים (rojizo). El vocabulario de los sentidos: ריח (olor/perfume), קוֹל (voz), עֵינַיִם (ojos), שְׂפָתַיִם (labios), דֹּד (amor/amado). El hebreo sensorial del Cantar es intraducible en su densidad.'},
  ],

    insight:'La fórmula aparece tres veces en el Cantar con variaciones: 2:16 (yo soy de mi amado y mi amado es mío), 6:3 (yo soy de mi amado y mi amado es mío), 7:11 (yo soy de mi amado y hacia mí va su deseo). La progresión es teológica: de la posesión mutua (2:16) a la dirección del deseo (7:11, usando תְּשׁוּקָה — la misma palabra de Gn 3:16). El Cantar deconstruye el juicio del Edén: donde el deseo fue curse (Gn 3:16), aquí es promesa (Cnt 7:11). La gramática posesiva del amor restaura lo que perdió la gramática del pecado.'

    insight:'תְּהַלֵּל es Pi\'el yiqtol — el Pi\'el intensivo del verbo הלל. El Salterio que abrió con אַשְׁרֵי הָאִישׁ (bienaventurado el hombre — singular, masculino, condicional) cierra con כֹּל הַנְּשָׁמָה (todo lo que respira — universal, sin género, sin condición). De uno a todos. De la condición a la totalidad. De la bienaventuranza individual a la alabanza cósmica. El Hebrew Bible que aprendiste a leer en 30 días termina aquí: con un verbo en Pi\'el que ningún ser que respire queda excluido de conjugar.'
  }
}
];

// BUILD UI
const lnav = document.getElementById('lnav');
const container = document.getElementById('lessons-container');

LESSONS.forEach((lesson, idx) => {
  const btn = document.createElement('button');
  btn.className = 'lnav-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = `Día ${lesson.day}`;
  btn.onclick = () => showLesson(idx);
  lnav.appendChild(btn);
  const panel = document.createElement('div');
  panel.className = 'lesson-panel' + (idx === 0 ? ' active' : '');
  panel.id = `lesson-${idx}`;
  panel.innerHTML = buildLesson(lesson, idx);
  container.appendChild(panel);
});

function showLesson(idx) {
  document.querySelectorAll('.lnav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.lesson-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  initQuiz(idx);
}
function showInnerTab(lIdx, tabName) {
  const panel = document.getElementById(`lesson-${lIdx}`);
  panel.querySelectorAll('.itab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  panel.querySelectorAll('.itab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
}

function buildLesson(lesson, idx) {
  const tabKeys = ['leccion','vocab','quiz','verse'];
  const tabLabels = ['📖 Lección','📚 Vocabulario','✏️ Práctica','✝️ Texto'];
  const pct = (lesson.day / 30 * 100).toFixed(1);

  let html = `
  <div style="text-align:center;margin-bottom:14px;">
    <div style="font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--crimson);">Día ${lesson.day} — ${lesson.title}</div>
    <div style="font-size:12px;color:#888;margin-top:2px;">${lesson.subtitle}</div>
    <div class="prog-bar" style="max-width:300px;margin:8px auto 3px;"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-lbl">Día ${lesson.day} de 30${lesson.day===30?' — ¡Curso completo! הַלְלוּ יָהּ 🏆':''}</div>
  </div>
  <div class="inner-tabs">
    ${tabLabels.map((t,i)=>`<div class="itab${i===0?' active':''}" data-tab="${tabKeys[i]}" onclick="showInnerTab(${idx},'${tabKeys[i]}')">${t}</div>`).join('')}
  </div>`;

  html += `<div class="itab-panel active" data-tab="leccion">`;

  if (lesson.day === 30) {
    html += `<div class="finish-banner">
      <div class="heb-big">הַלְלוּ יָהּ</div>
      <h2>¡30 días de hebreo bíblico completados!</h2>
      <p>Del alef-bet al Cantar de los Cantares, del Shemá al Aqedah, del qatal al Pi'el. Ahora el AT habla en su propia voz.</p>
    </div>`;
  }

  if (lesson.tips && lesson.tips.length) {
    html += `<div class="card"><h3><span>💡</span> Claves del día</h3>`;
    lesson.tips.forEach(t => { html += `<div class="tip">${t.t}</div>`; });
    html += `</div>`;
  }

  if (lesson.extra) {
    const e = lesson.extra;
    if (e.type === 'table') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3>
      <table class="gtable"><thead><tr>${e.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
      e.rows.forEach(r => { html += `<tr>${r.map((c,ci)=>`<td${ci===0?' style="font-weight:600"':''}>${c}</td>`).join('')}</tr>`; });
      html += `</tbody></table></div>`;
    } else if (e.type === 'conj') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="conj-grid">`;
      e.cols.forEach(col => {
        html += `<div class="conj-box"><h4>${col.title}</h4>`;
        col.rows.forEach(r => { html += `<div class="conj-line"><span class="conj-heb">${r[0]}</span><span class="conj-esp">${r[1]}</span></div>`; });
        html += `</div>`;
      });
      html += `</div></div>`;
    }
  }
  html += `</div>`;

  html += `<div class="itab-panel" data-tab="vocab"><div class="card"><h3><span>📚</span> Vocabulario del día</h3>
  <p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada palabra para más información.</p><ul class="vlist">`;
  lesson.vocab.forEach(v => {
    html += `<li class="vitem" onclick="toggleVocab(this)">
      <div class="vheb">${v.g}</div>
      <div><div class="vtrans">${v.t}</div>
      <div class="vhint" style="display:none;">${v.h} — <em>${v.f}</em></div>
      <div class="vmore">↓ más info</div></div></li>`;
  });
  html += `</ul></div></div>`;

  html += `<div class="itab-panel" data-tab="quiz"><div class="card"><h3><span>✏️</span> Práctica — Día ${lesson.day}</h3>
  <div id="quiz-${idx}"></div><div id="score-${idx}" class="qscore" style="display:none;"></div></div></div>`;

  const v = lesson.verse;
  html += `<div class="itab-panel" data-tab="verse">
  <div class="vblock">
    <div class="vblock-heb">${v.heb}</div>
    <div class="vblock-trans">${v.esp}</div>
    <div class="vwords">`;
  v.words.forEach(w => { html += `<div class="vrow"><span class="vwh">${w[0]}</span><span class="vwe">${w[1]}</span></div>`; });
  html += `</div></div>
  <div class="card"><h3><span>🔍</span> El detalle que las traducciones pierden</h3><p>${v.insight}</p></div>
  </div>`;

  return html;
}

const quizState = {};
function initQuiz(idx) {
  if (quizState[idx]) return;
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  renderQuiz(idx);
}
function renderQuiz(idx) {
  const el = document.getElementById(`quiz-${idx}`);
  const sc = document.getElementById(`score-${idx}`);
  const s = quizState[idx];
  if (!s) return;
  if (s.pos >= s.data.length) {
    el.style.display='none'; sc.style.display='block';
    const pct = Math.round(s.score/s.data.length*100);
    const isLast = LESSONS[idx].day === 30;
    sc.innerHTML = `${pct>=75?'🎉':'📖'} <strong>${s.score}/${s.data.length}</strong> correctas (${pct}%)<br>
    <span style="font-size:13px;color:#888;">${isLast?'¡30 días de hebreo completados! הַלְלוּ יָהּ 🏆':pct>=75?'¡Excelente! Sigue adelante en el AT.':'El hebreo recompensa la constancia — repasa y vuelve.'}</span>
    <br><button class="qbtn" style="margin-top:10px;" onclick="resetQuiz(${idx})">↺ Repetir</button>`;
    return;
  }
  const q = s.data[s.pos];
  const isHeb = q.q.match(/[\u05D0-\u05FF]/);
  el.innerHTML = `<div class="qcard">
    <div style="font-size:11px;color:#aaa;margin-bottom:6px;">${s.pos+1} / ${s.data.length}</div>
    <div class="${isHeb?'qbig':'qbig-latin'}">${q.q}</div>
    <div class="qgrid">${q.opts.map((o,i)=>`<button class="qbtn" onclick="checkQ(${idx},this,${i},${q.ans})">${o}</button>`).join('')}</div>
    <div class="qfb" id="qfb-${idx}"></div>
  </div>`;
}
function checkQ(idx, btn, chosen, correct) {
  const s = quizState[idx];
  btn.parentElement.querySelectorAll('.qbtn').forEach(b => b.disabled=true);
  const fb = document.getElementById(`qfb-${idx}`);
  if (chosen===correct) { btn.classList.add('ok'); fb.style.color='var(--olive)'; fb.textContent='✓ ¡Correcto!'; s.score++; }
  else { btn.classList.add('no'); btn.parentElement.querySelectorAll('.qbtn')[correct].classList.add('ok'); fb.style.color='var(--crimson)'; fb.textContent=`✗ Era: ${s.data[s.pos].opts[correct]}`; }
  setTimeout(()=>{ s.pos++; renderQuiz(idx); }, 1300);
}
function resetQuiz(idx) {
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  document.getElementById(`quiz-${idx}`).style.display='block';
  document.getElementById(`score-${idx}`).style.display='none';
  renderQuiz(idx);
}
function toggleVocab(el) {
  const h=el.querySelector('.vhint'), m=el.querySelector('.vmore');
  if (h.style.display==='none'){ h.style.display='block'; m.style.display='none'; }
  else { h.style.display='none'; m.style.display='block'; }
}
initQuiz(0);
</script>
</body>
</html>
