<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Griego Koiné — 10 Lecciones</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap');
:root {
  --parch:#f5f0e8; --ink:#1a1209; --ink2:#3d2f1a; --gold:#b8860b; --gold-l:#e8d5a0;
  --azure:#1e3a5f; --azure-l:#dce8f5; --red:#8b1a1a; --grn:#1a4a2e; --grn-l:#d4edda;
  --bdr:#c8b89a; --wht:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--parch);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}

/* HEADER */
header{background:var(--azure);color:#f5f0e8;padding:22px 16px 18px;text-align:center;border-bottom:3px solid var(--gold)}
header h1{font-family:'EB Garamond',serif;font-size:1.9rem;letter-spacing:.02em;margin-bottom:2px}
header .sub{font-family:'EB Garamond',serif;font-style:italic;font-size:1rem;color:var(--gold-l);opacity:.9}

/* LESSON NAV */
.lesson-nav{display:flex;overflow-x:auto;background:#ede8df;border-bottom:2px solid var(--bdr);gap:2px;padding:4px 4px 0;scrollbar-width:none}
.lesson-nav::-webkit-scrollbar{display:none}
.lnav-btn{flex-shrink:0;padding:9px 14px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;border-radius:4px 4px 0 0}
.lnav-btn.active{color:var(--azure);border-bottom-color:var(--azure);background:var(--parch)}
.lnav-btn.done{color:var(--grn)}
.lnav-btn:hover:not(.active){background:#e0d9ce}

/* INNER TABS */
.inner-tabs{display:flex;border-bottom:1px solid var(--bdr);background:#f0ebe1;overflow-x:auto;scrollbar-width:none}
.inner-tabs::-webkit-scrollbar{display:none}
.itab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.itab.active{color:var(--azure);border-bottom-color:var(--azure);background:var(--parch)}

/* CONTENT */
.lesson-panel{display:none;padding:16px;max-width:720px;margin:0 auto}
.lesson-panel.active{display:block}
.itab-panel{display:none}
.itab-panel.active{display:block}

/* CARDS */
.card{background:var(--wht);border:1px solid var(--bdr);border-radius:8px;padding:16px;margin-bottom:14px}
.card h3{font-family:'EB Garamond',serif;font-size:1.15rem;color:var(--azure);margin-bottom:10px;display:flex;align-items:center;gap:7px}

/* ALPHABET GRID */
.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px;margin-top:6px}
.ltr-card{background:var(--parch);border:1px solid var(--bdr);border-radius:6px;padding:9px 6px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s}
.ltr-card:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.ltr-card.on{background:var(--azure-l);border-color:var(--azure)}
.ltr-big{font-family:'EB Garamond',serif;font-size:2rem;color:var(--azure);display:block;line-height:1.2}
.ltr-name{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.05em}
.ltr-snd{font-size:11px;color:var(--ink2);margin-top:1px}
.ltr-ex{font-size:10px;color:#666;font-style:italic;margin-top:3px;display:none}
.ltr-card.on .ltr-ex{display:block}

/* TIP BOX */
.tip{background:var(--azure-l);border-left:4px solid var(--azure);border-radius:0 6px 6px 0;padding:10px 13px;margin:8px 0;font-size:13px}
.tip strong{color:var(--azure)}
.tip-gold{background:#fdf8ec;border-left-color:var(--gold)}
.tip-gold strong{color:var(--gold)}

/* VOCAB */
.vlist{list-style:none}
.vitem{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #ede5d5;cursor:pointer}
.vgrk{font-family:'EB Garamond',serif;font-size:1.25rem;color:var(--azure);min-width:130px;flex-shrink:0}
.vtrans{font-size:13px;font-weight:600}
.vhint{font-size:11px;color:#888;font-style:italic;margin-top:1px}
.vmore{font-size:11px;color:var(--gold)}

/* GRAMMAR TABLE */
.gtable{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.gtable th{background:var(--azure);color:#fff;padding:7px 10px;text-align:left;font-weight:600}
.gtable td{padding:6px 10px;border-bottom:1px solid #e8ddc8}
.gtable tr:nth-child(even) td{background:#f9f5ee}
.gtable .grk{font-family:'EB Garamond',serif;font-size:1.1rem;color:var(--azure)}
.gtable .hl{background:#fff8e1!important;font-weight:700}

/* QUIZ */
.qcard{background:var(--wht);border:2px solid var(--bdr);border-radius:10px;padding:18px;margin-bottom:12px;text-align:center}
.qbig{font-family:'EB Garamond',serif;font-size:2.4rem;color:var(--azure);margin-bottom:14px;line-height:1.2}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qbtn{background:var(--parch);border:2px solid var(--bdr);border-radius:7px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--ink);font-family:'Inter',sans-serif}
.qbtn:hover{border-color:var(--azure);color:var(--azure)}
.qbtn.ok{background:var(--grn-l);border-color:var(--grn);color:var(--grn)}
.qbtn.no{background:#fde8e8;border-color:var(--red);color:var(--red)}
.qfb{margin-top:10px;font-size:13px;font-weight:600;min-height:18px}
.qscore{text-align:center;padding:20px;font-weight:700;color:var(--azure);font-size:1.1rem}

/* VERSE */
.vblock{background:linear-gradient(135deg,var(--azure) 0%,#0d2240 100%);color:#f5f0e8;border-radius:10px;padding:20px 16px;text-align:center;margin-bottom:14px}
.vgrk-big{font-family:'EB Garamond',serif;font-size:1.35rem;line-height:1.9;margin-bottom:10px;color:var(--gold-l)}
.vtrans-small{font-size:12px;color:#c8d8e8;font-style:italic}
.vwords{text-align:left;margin-top:12px}
.vrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:12px}
.vwg{font-family:'EB Garamond',serif;font-size:1rem;color:var(--gold-l)}
.vws{color:#c8d8e8}

/* PARADIGM */
.paradigm{display:grid;gap:6px;margin-top:8px}
.para-row{display:grid;grid-template-columns:90px 1fr 1fr;gap:4px;align-items:center;font-size:13px}
.para-lbl{font-weight:600;color:var(--ink2);font-size:12px}
.para-grk{font-family:'EB Garamond',serif;font-size:1.15rem;color:var(--azure)}
.para-esp{color:var(--ink2)}
.para-head{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#aaa;padding-bottom:2px;border-bottom:1px solid var(--bdr)}

/* PROGRESS */
.prog-bar{height:5px;background:#ddd;border-radius:3px;margin:6px 0 3px}
.prog-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .5s}
.prog-lbl{font-size:11px;color:#aaa}

/* BADGE */
.badge{display:inline-block;background:var(--gold);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 7px;margin-left:5px;vertical-align:middle}
.badge-grn{background:var(--grn)}

/* MISC */
.note{font-size:11px;color:#999;text-align:center;margin-top:6px;font-style:italic}
hr{border:none;border-top:1px solid var(--bdr);margin:12px 0}
p{font-size:14px;margin-bottom:8px}
ul.plain{padding-left:18px;font-size:14px;line-height:2.1}
</style>
</head>

  btn.onclick = () => showLesson(idx);
  lnav.appendChild(btn);

  // Panel
  const panel = document.createElement('div');
  panel.className = 'lesson-panel' + (idx === 0 ? ' active' : '');
  panel.id = `lesson-${idx}`;
  panel.innerHTML = buildLesson(lesson, idx);
  container.appendChild(panel);
});

function showLesson(idx) {
  document.querySelectorAll('.lnav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.lesson-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  // init quiz for this lesson
  initQuiz(idx);
}

function showInnerTab(lessonIdx, tabName) {
  const panel = document.getElementById(`lesson-${lessonIdx}`);
  panel.querySelectorAll('.itab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  panel.querySelectorAll('.itab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
}

function buildLesson(lesson, idx) {
  const tabs = ['📖 Lección','📚 Vocabulario','✏️ Práctica','✝️ Versículo'];
  const tabKeys = ['leccion','vocab','quiz','verse'];
  
  let html = `
  <div style="text-align:center;margin-bottom:14px;">
    <div style="font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--azure);">Día ${lesson.day} — ${lesson.title}</div>
    <div style="font-size:12px;color:#888;margin-top:2px;">${lesson.subtitle}</div>
    <div class="prog-bar" style="max-width:300px;margin:8px auto 3px;"><div class="prog-fill" style="width:${(lesson.day/30*100).toFixed(1)}%"></div></div>
    <div class="prog-lbl">Día ${lesson.day} de 30</div>
  </div>
  <div class="inner-tabs">
    ${tabs.map((t,i)=>`<div class="itab${i===0?' active':''}" data-tab="${tabKeys[i]}" onclick="showInnerTab(${idx},'${tabKeys[i]}')">${t}</div>`).join('')}
  </div>`;

  // LECCION tab
  html += `<div class="itab-panel active" data-tab="leccion">`;

  if (lesson.letters && lesson.letters.length > 0) {
    html += `<div class="card"><h3><span>🔤</span> Las letras de hoy</h3>
    <p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada tarjeta para ver un ejemplo bíblico.</p>
    <div class="alpha-grid">`;
    lesson.letters.forEach((lt,li) => {
      html += `<div class="ltr-card" onclick="this.classList.toggle('on')">
        <span class="ltr-big">${lt.u} ${lt.l}</span>
        <div class="ltr-name">${lt.name}</div>
        <div class="ltr-snd">${lt.snd}</div>
        <div class="ltr-ex">${lt.ex}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  if (lesson.tips && lesson.tips.length > 0) {
    html += `<div class="card"><h3><span>💡</span> Claves del día</h3>`;
    lesson.tips.forEach(tip => {
      html += `<div class="tip">${tip.t}</div>`;
    });
    html += `</div>`;
  }

  // Special content for day 8 (cases table)
  if (lesson.day === 8) {
    html += `<div class="card"><h3><span>📊</span> Declinación de λόγος (2ª declinación masc.)</h3>
    <table class="gtable"><thead><tr><th>Caso</th><th>Singular</th><th>Plural</th><th>Función</th></tr></thead><tbody>
    <tr><td>Nominativo</td><td class="grk">λόγος</td><td class="grk">λόγοι</td><td>sujeto</td></tr>
    <tr><td>Genitivo</td><td class="grk">λόγου</td><td class="grk">λόγων</td><td>"de"</td></tr>
    <tr><td>Dativo</td><td class="grk">λόγῳ</td><td class="grk">λόγοις</td><td>"a / en"</td></tr>
    <tr><td>Acusativo</td><td class="grk">λόγον</td><td class="grk">λόγους</td><td>objeto directo</td></tr>
    <tr><td>Vocativo</td><td class="grk">λόγε</td><td class="grk">λόγοι</td><td>llamado directo</td></tr>
    </tbody></table></div>`;
  }

  // Special content for day 9 (article table)
  if (lesson.day === 9) {
    html += `<div class="card"><h3><span>📊</span> El artículo definido — ὁ / ἡ / τό</h3>
    <table class="gtable"><thead><tr><th>Caso</th><th>Masc.sg</th><th>Neut.sg</th><th>Fem.sg</th><th>Masc.pl</th><th>Neut.pl</th><th>Fem.pl</th></tr></thead><tbody>`;
    ART_TABLE.forEach(row => {
      html += `<tr><td><strong>${row.caso}</strong></td><td class="grk">${row.ms}</td><td class="grk">${row.mn}</td><td class="grk">${row.fs}</td><td class="grk">${row.mp}</td><td class="grk">${row.np}</td><td class="grk">${row.fp}</td></tr>`;
    });
    html += `</tbody></table><div class="note">Aprende esta tabla. Es la clave de toda la gramática nominal griega.</div></div>`;

    html += `<div class="card"><h3><span>📊</span> 1ª declinación — ἀρχή</h3>
    <table class="gtable"><thead><tr><th>Caso</th><th>Singular</th><th>Plural</th></tr></thead><tbody>
    <tr><td>Nominativo</td><td class="grk">ἀρχή</td><td class="grk">ἀρχαί</td></tr>
    <tr><td>Genitivo</td><td class="grk">ἀρχῆς</td><td class="grk">ἀρχῶν</td></tr>
    <tr><td>Dativo</td><td class="grk">ἀρχῇ</td><td class="grk">ἀρχαῖς</td></tr>
    <tr><td>Acusativo</td><td class="grk">ἀρχήν</td><td class="grk">ἀρχάς</td></tr>
    </tbody></table></div>`;
  }

  // Special content for day 10 (verb paradigm)
  if (lesson.day === 10) {
    html += `<div class="card"><h3><span>📊</span> Presente indicativo activo — λύω (desatar)</h3>
    <div class="paradigm">
    <div class="para-row"><div class="para-lbl para-head">Persona</div><div class="para-grk para-head">Griego</div><div class="para-esp para-head">Español</div></div>`;
    PARADIGM_LUOW.forEach(r => {
      html += `<div class="para-row"><div class="para-lbl">${r.lbl}</div><div class="para-grk">${r.grk}</div><div class="para-esp">${r.esp}</div></div>`;
    });
    html += `</div>
    <div class="tip" style="margin-top:12px;"><strong>Desinencias:</strong> -ω, -εις, -ει, -ομεν, -ετε, -ουσι(ν) — memoriza esta secuencia. Sirve para TODOS los verbos regulares en presente.</div>
    </div>`;
  }

  // Day 4 special: diacritics visual
  if (lesson.day === 4) {
    html += `<div class="card"><h3><span>📊</span> Los signos diacríticos en resumen</h3>
    <table class="gtable"><thead><tr><th>Signo</th><th>Nombre</th><th>Ejemplo</th><th>Efecto</th></tr></thead><tbody>
    <tr><td class="grk" style="font-size:1.3rem;">ά</td><td>Agudo</td><td class="grk">ἀρχή</td><td>tono alto en esa sílaba</td></tr>
    <tr><td class="grk" style="font-size:1.3rem;">ὰ</td><td>Grave</td><td class="grk">τὸν κόσμον</td><td>agudo que baja ante otra palabra</td></tr>
    <tr><td class="grk" style="font-size:1.3rem;">ᾶ</td><td>Circunflejo</td><td class="grk">ἀρχῆς</td><td>sílaba larga con tono alto-bajo</td></tr>
    <tr><td class="grk" style="font-size:1.3rem;">᾿</td><td>Espíritu suave</td><td class="grk">ἀρχή</td><td>sin aspiración inicial</td></tr>
    <tr><td class="grk" style="font-size:1.3rem;">῾</td><td>Espíritu áspero</td><td class="grk">ἡμέρα</td><td>aspiración "h" inicial</td></tr>
    <tr><td class="grk" style="font-size:1.3rem;">ᾳ</td><td>Iota suscrita</td><td class="grk">ἀρχῇ</td><td>marca el dativo en 1ª/2ª declin.</td></tr>
    </tbody></table></div>`;
  }

  // Day 6: frequency table
  if (lesson.day === 6) {
    html += `<div class="card"><h3><span>📊</span> Top 10 palabras del NT por frecuencia</h3>
    <table class="gtable"><thead><tr><th>Palabra</th><th>Significado</th><th>Veces</th></tr></thead><tbody>
    <tr><td class="grk">ὁ / ἡ / τό</td><td>el / la / lo</td><td>19.870</td></tr>
    <tr><td class="grk">καί</td><td>y, también</td><td>9.153</td></tr>
    <tr><td class="grk">αὐτός</td><td>él, mismo</td><td>5.597</td></tr>
    <tr><td class="grk">δέ</td><td>pero, y</td><td>2.792</td></tr>
    <tr><td class="grk">ἐν</td><td>en</td><td>2.752</td></tr>
    <tr><td class="grk">εἰμί</td><td>ser, estar</td><td>2.462</td></tr>
    <tr><td class="grk">λέγω</td><td>decir</td><td>2.354</td></tr>
    <tr><td class="grk">εἰς</td><td>hacia, en</td><td>1.768</td></tr>
    <tr><td class="grk">οὐ</td><td>no</td><td>1.606</td></tr>
    <tr><td class="grk">ὅτι</td><td>que, porque</td><td>1.296</td></tr>
    </tbody></table></div>`;
  }

  html += `</div>`; // end leccion panel

  // VOCAB tab
  html += `<div class="itab-panel" data-tab="vocab"><div class="card"><h3><span>📚</span> Vocabulario del día</h3>
  <p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada palabra para ver más información.</p>
  <ul class="vlist">`;
  lesson.vocab.forEach((v,vi) => {
    html += `<li class="vitem" onclick="toggleVocab(this)">
      <div class="vgrk">${v.g}</div>
      <div>
        <div class="vtrans">${v.t}</div>
        <div class="vhint" style="display:none;">${v.h} — <em>${v.f}</em></div>
        <div class="vmore">↓ más info</div>
      </div>
    </li>`;
  });
  html += `</ul></div></div>`;

  // QUIZ tab
  html += `<div class="itab-panel" data-tab="quiz">
    <div class="card"><h3><span>✏️</span> Práctica — Día ${lesson.day}</h3>
    <div id="quiz-${idx}"></div>
    <div id="score-${idx}" class="qscore" style="display:none;"></div>
    </div>
  </div>`;

  // VERSE tab
  const v = lesson.verse;
  html += `<div class="itab-panel" data-tab="verse">
  <div class="vblock">
    <div class="vgrk-big">${v.grk}</div>
    <div class="vtrans-small">${v.esp}</div>
    <div class="vwords">`;
  v.words.forEach(w => {
    html += `<div class="vrow"><span class="vwg">${w[0]}</span><span class="vws">${w[1]}</span></div>`;
  });
  html += `</div></div>
  <div class="card"><h3><span>🔍</span> El detalle que las traducciones pierden</h3>
  <p>${v.insight}</p>
  </div></div>`;

  return html;
}

// ============================================================
// QUIZ ENGINE
// ============================================================
const quizState = {};

function initQuiz(idx) {
  if (quizState[idx]) return; // already init
  quizState[idx] = { pos: 0, score: 0, data: [...LESSONS[idx].quiz].sort(() => Math.random()-0.5) };
  renderQuiz(idx);
}

function renderQuiz(idx) {
  const container = document.getElementById(`quiz-${idx}`);
  const scoreEl = document.getElementById(`score-${idx}`);
  const state = quizState[idx];
  if (!state) return;
  if (state.pos >= state.data.length) {
    container.style.display = 'none';
    scoreEl.style.display = 'block';
    const pct = Math.round(state.score/state.data.length*100);
    scoreEl.innerHTML = `${pct >= 80 ? '🎉' : '📖'} <strong>${state.score}/${state.data.length}</strong> correctas (${pct}%)<br>
    <span style="font-size:13px;color:#888;">${pct>=80?'¡Excelente! Listo para el siguiente día.':'Repasa las letras que fallaste antes de continuar.'}</span>
    <br><button class="qbtn" style="margin-top:10px;" onclick="resetQuiz(${idx})">↺ Repetir</button>`;
    return;
  }
  const q = state.data[state.pos];
  const optHtml = q.opts.map((o,i) => `<button class="qbtn" onclick="checkQ(${idx},this,${i},${q.ans})">${o}</button>`).join('');
  container.innerHTML = `
    <div class="qcard">
      <div style="font-size:11px;color:#aaa;margin-bottom:6px;">${state.pos+1} / ${state.data.length}</div>
      <div class="qbig">${q.q}</div>
      <div class="qgrid">${optHtml}</div>
      <div class="qfb" id="qfb-${idx}"></div>
    </div>`;
}

function checkQ(idx, btn, chosen, correct) {
  const state = quizState[idx];
  const btns = btn.parentElement.querySelectorAll('.qbtn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById(`qfb-${idx}`);
  if (chosen === correct) {
    btn.classList.add('ok');
    fb.style.color = 'var(--grn)';
    fb.textContent = '✓ ¡Correcto!';
    state.score++;
  } else {
    btn.classList.add('no');
    btns[correct].classList.add('ok');
    fb.style.color = 'var(--red)';
    fb.textContent = `✗ Era: ${state.data[state.pos].opts[correct]}`;
  }
  setTimeout(() => { state.pos++; renderQuiz(idx); }, 1300);
}

function resetQuiz(idx) {
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  document.getElementById(`quiz-${idx}`).style.display = 'block';
  document.getElementById(`score-${idx}`).style.display = 'none';
  renderQuiz(idx);
}

function toggleVocab(el) {
  const h = el.querySelector('.vhint');
  const m = el.querySelector('.vmore');
  if (h.style.display === 'none') { h.style.display='block'; m.style.display='none'; }
  else { h.style.display='none'; m.style.display='block'; }
}

// Init first lesson quiz
initQuiz(0);
</script>
