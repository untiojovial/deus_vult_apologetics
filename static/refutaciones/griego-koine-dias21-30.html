// ── DÍA 21 ──────────────────────────────────────────────────
{
  day:21, title:"El modo subjuntivo", subtitle:"La gramática de la posibilidad, el propósito y la exhortación",
  tips:[
    {t:'<strong>El modo indicativo</strong> afirma hechos. El <strong>subjuntivo</strong> expresa posibilidad, propósito, exhortación o condición. En el NT aparece unas 1.858 veces, por lo que es imposible leer el texto griego sin reconocerlo.'},
    {t:'<strong>Cómo se forma:</strong> en el presente, las desinencias del indicativo cambian sus vocales breves (ο/ε) por largas (ω/η): λύω → λύω (igual en 1ª sg.), λύεις → λύῃς, λύει → λύῃ, etc. En el aoristo, augmento desaparece y se añade -σ-: λύσω, λύσῃς, λύσῃ...'},
    {t:'<strong>Cuatro usos principales:</strong> (1) ἵνα + subj. = propósito; (2) ἐάν + subj. = condición eventual; (3) μή + subj. = negación no-factual; (4) subj. exhortativo 1ª pl. = "¡Vayamos!" / "¡Creamos!"'},
    {t:'<strong>La diferencia de tiempos en subjuntivo</strong> no es cronológica sino de aspecto: presente subj. = acción continua; aoristo subj. = acción puntual.'},
  ],
  extra:{type:'conj', title:'Subjuntivo presente activo — λύω',
    cols:[
      {title:'Presente subjuntivo', rows:[['λύω','(que) yo desate'],['λύῃς','(que) tú desates'],['λύῃ','(que) él desate'],['λύωμεν','(que) desatemos'],['λύητε','(que) desatéis'],['λύωσι(ν)','(que) desaten']]},
      {title:'Aoristo subjuntivo', rows:[['λύσω','(que) yo desate (puntual)'],['λύσῃς','(que) tú desates'],['λύσῃ','(que) él desate'],['λύσωμεν','(que) desatemos'],['λύσητε','(que) desatéis'],['λύσωσι(ν)','(que) desaten']]},
    ]
  },
  vocab:[
    {g:'ἵνα ζήσωμεν',  t:'para que vivamos (subj. 1ª pl.)',   h:'1 Jn 4:9',   f:'Propósito de la misión del Hijo'},
    {g:'ἐάν τις',      t:'si alguien (condición eventual)',    h:'Jn 3:3',     f:'"ἐὰν μή τις γεννηθῇ"'},
    {g:'μὴ κρίνετε',   t:'no juzguéis (imp. negativo)',       h:'Mt 7:1',     f:'μή + imperativo = prohibición'},
    {g:'πιστεύσητε',   t:'creáis (aor. subj. 2ª pl.)',        h:'Jn 20:31',   f:'"para que creáis que Jesús es el Cristo"'},

    {g:'ἁγιασθήτω',    t:'santifícese (aor. subj. imp.)',     h:'Mt 6:9',     f:'"Santificado sea tu nombre"'},
    {g:'ἐλθέτω',       t:'venga (aor. subj. imp. 3ª sg.)',    h:'Mt 6:10',    f:'"Venga tu reino"'},
    {g:'γένηται',      t:'hágase (aor. subj. 3ª sg.)',        h:'Mt 6:10',    f:'"Hágase tu voluntad"'},
  ],
  quiz:[
    {q:'λύῃ es modo...', opts:['indicativo','subjuntivo','imperativo','infinitivo'], ans:1},
    {q:'ἵνα + verbo exige modo...', opts:['indicativo','participio','subjuntivo','infinitivo'], ans:2},
    {q:'ἐάν = ...', opts:['cuando (seguro)','si (eventual)','para que','porque'], ans:1},
    {q:'El subj. exhortativo usa la...', opts:['1ª sg.','2ª sg.','1ª pl.','3ª pl.'], ans:2},
    {q:'γεννηθῇ es aoristo subjuntivo...', opts:['activo','medio','pasivo','deponente'], ans:2},
    {q:'La diferencia pres. vs aor. subj. es de...', opts:['tiempo cronológico','aspecto (continuo vs puntual)','persona','número'], ans:1},
    {q:'μή + subjuntivo expresa...', opts:['pregunta','negación no-factual','afirmación','propósito'], ans:1},
    {q:'ἐλθέτω = ...', opts:['él vino','él viene','¡venga! (subj. imp.)','él vendrá'], ans:2},
  ],
  verse:{grk:'ἐλθέτω ἡ βασιλεία σου· γενηθήτω τὸ θέλημά σου', esp:'"Venga tu reino, hágase tu voluntad" — Mateo 6:10',
    words:[['ἐλθέτω','venga (aor. subj. imp. 3ª sg. de ἔρχομαι)'],['ἡ βασιλεία','el reino (nom. fem.)'],['σου','tuyo/de ti (gen.)'],['γενηθήτω','hágase (aor. subj. pas. imp. 3ª sg.)'],['τὸ θέλημα','la voluntad (nom. neutro)'],['σου','tuya']],
    insight:'El Padrenuestro usa subjuntivos imperativos: no "que por favor venga" sino una petición directa y segura. El modo subjuntivo con sentido imperativo es una de las construcciones más frecuentes en la oración bíblica.'
  }
},
// ── DÍA 22 ──────────────────────────────────────────────────
{
  day:22, title:"El modo imperativo", subtitle:"Mandatos, prohibiciones y súplicas en el NT",
  tips:[
    {t:'<strong>El imperativo griego</strong> da órdenes, prohibiciones o súplicas. Tiene formas para 2ª y 3ª persona, singular y plural. La 1ª persona usa el subjuntivo exhortativo ("hagamos").'},
    {t:'<strong>Presente imperativo</strong> = acción continua o repetida: "sigue creyendo", "haced siempre esto". <strong>Aoristo imperativo</strong> = acción puntual: "arrepiéntete", "ven aquí". El aspecto importa.'},
    {t:'<strong>Prohibición:</strong> μή + presente imperativo = "deja de hacer" (acción en curso); μή + aoristo subjuntivo = "nunca empieces a hacer". Esta distinción es teológicamente relevante en pasajes como Juan 20:17.'},
  ],
  extra:{type:'table', title:'Imperativo presente y aoristo activo — λύω',
    headers:['Persona','Presente (continuo)','Aoristo (puntual)','Significado aor.'],
    rows:[
      ['2ª sg.','λῦε','λῦσον','¡desata!'],
      ['3ª sg.','λυέτω','λυσάτω','¡que él desate!'],
      ['2ª pl.','λύετε','λύσατε','¡desatad!'],
      ['3ª pl.','λυέτωσαν','λυσάτωσαν','¡que ellos desaten!'],
    ]
  },
  vocab:[
    {g:'ἀκολούθει μοι',  t:'sígueme (pres. imp. — acción continua)',  h:'Mc 2:14',   f:'"Sigue siguiéndome" — llamado de Leví'},
    {g:'μετανοεῖτε',     t:'arrepentíos (pres. imp. 2ª pl.)',         h:'Mc 1:15',   f:'Acción continua pedida'},
    {g:'πίστευε',        t:'cree (pres. imp. 2ª sg.)',                h:'Jn 14:1',   f:'"No se turbe vuestro corazón; creed"'},

    {g:'ἐγέρθητι',       t:'levántate (aor. imp. pas. 2ª sg.)',       h:'Mc 5:41',   f:'"Talitha koum" — niña, levántate'},
    {g:'δεῦτε',          t:'venid (adverbio con fuerza imperativa)',   h:'Mt 4:19',   f:'"Venid en pos de mí"'},
    {g:'ζητεῖτε',        t:'buscad (pres. imp. 2ª pl.)',              h:'Mt 6:33',   f:'"Buscad primero el reino"'},
  ],
  quiz:[
    {q:'λῦσον es imperativo...', opts:['presente','aoristo','futuro','perfecto'], ans:1},
    {q:'μή + presente imp. = ...', opts:['nunca empieces','deja de hacer','¡haz!','para que hagas'], ans:1},
    {q:'μή + aoristo subj. = ...', opts:['deja de hacer','nunca empieces a hacer','haz continuamente','porque hace'], ans:1},
    {q:'ἀκολούθει = ...', opts:['siguió','sigue siguiéndome (continuo)','seguirá','haberlo seguido'], ans:1},
    {q:'μὴ φοβοῦ significa...', opts:['nunca temas','deja de temer (en curso)','temerás','teme'], ans:1},
    {q:'El imperativo tiene formas para...', opts:['1ª y 2ª persona','2ª y 3ª persona','todas las personas','solo 2ª persona'], ans:1},
    {q:'ζητεῖτε πρῶτον = ...', opts:['buscasteis primero','buscad primero (continuo)','buscaréis primero','habéis buscado'], ans:1},
    {q:'ἐγέρθητι es imperativo...', opts:['activo','medio','pasivo','deponente'], ans:2},
  ],
  verse:{grk:'ζητεῖτε δὲ πρῶτον τὴν βασιλείαν τοῦ θεοῦ', esp:'"Buscad primero el reino de Dios" — Mateo 6:33',
    words:[['ζητεῖτε','buscad (pres. imp. 2ª pl. — acción continua y prioritaria)'],['δέ','pero/y (contraste con la ansiedad del v.31)'],['πρῶτον','primero (adverbio de prioridad)'],['τὴν βασιλείαν','el reino (acusativo — objeto directo)'],['τοῦ θεοῦ','de Dios (genitivo)']],
    insight:'ζητεῖτε es presente imperativo: no "buscad el reino una vez" sino "vivid buscando el reino continuamente". El aspecto del presente da al mandato su carácter de orientación vital permanente.'
  }
},
// ── DÍA 23 ──────────────────────────────────────────────────
{
  day:23, title:"El perfecto de indicativo", subtitle:"El tiempo del efecto permanente: lo que fue y sigue siendo",
  tips:[
    {t:'<strong>El perfecto griego</strong> describe una acción pasada cuyos efectos persisten en el presente. Es el tiempo teológicamente más rico del NT: "está escrito", "ha sido resucitado", "has creído".'},
    {t:'<strong>Se forma con reduplicación:</strong> la primera consonante de la raíz se duplica con ε: λύω → λέλυκα; γράφω → γέγραφα; πιστεύω → πεπίστευκα. Si la raíz empieza por vocal, esa vocal se alarga.'},
    {t:'<strong>γέγραπται</strong> ("está escrito") aparece 65 veces en el NT. Cada vez que Jesús o Pablo citan el AT, usan este perfecto: el texto fue escrito en el pasado y su autoridad permanece ahora.'},
    {t:'<strong>Perfecto pasivo</strong> es especialmente frecuente: πεπλήρωται (se ha cumplido), γεγραμμένον (lo que ha sido escrito), τετέλεσται (ha sido consumado).'},
  ],
  extra:{type:'paradigm', title:'Perfecto indicativo activo — λέλυκα',
    rows:[
      {lbl:'1ª sg.',  grk:'λέλυκα',    esp:'yo he desatado'},
      {lbl:'2ª sg.',  grk:'λέλυκας',   esp:'tú has desatado'},
      {lbl:'3ª sg.',  grk:'λέλυκε(ν)', esp:'él ha desatado'},
      {lbl:'1ª pl.',  grk:'λελύκαμεν', esp:'nosotros hemos desatado'},
      {lbl:'2ª pl.',  grk:'λελύκατε',  esp:'vosotros habéis desatado'},
      {lbl:'3ª pl.',  grk:'λελύκασι',  esp:'ellos han desatado'},
    ],
    note:'Reduplicación λε- + raíz λυ- + sufijo de perfecto -κ- + desinencias -α/-ας/-ε...'
  },
  vocab:[
    {g:'γέγραπται',    t:'está escrito (perf. pas. de γράφω)',     h:'Mt 4:4 — citando Dt 8:3',         f:'65 veces en el NT — la autoridad escritural'},
    {g:'τετέλεσται',   t:'consumado es (perf. pas. de τελέω)',     h:'Jn 19:30',                         f:'La última palabra de Jesús en la cruz'},
    {g:'πεπίστευκα',   t:'he creído (perf. activo de πιστεύω)',    h:'2 Ti 1:12',                        f:'"Sé en quién he creído"'},
    {g:'ἐγήγερται',    t:'ha sido resucitado (perf. pas.)',        h:'1 Co 15:4',                        f:'El corazón del kerigma apostólico'},
    {g:'γέγονεν',      t:'ha sucedido / ha llegado a ser',         h:'Jn 1:3',                           f:'Perfecto de γίνομαι'},
    {g:'ἀπέσταλκεν',   t:'ha enviado (perf. activo de ἀποστέλλω)', h:'Jn 3:17',                         f:'La misión presente del Hijo'},

    {q:'El perfecto se forma con...', opts:['augmento','reduplicación','sigma + augmento','solo desinencias nuevas'], ans:1},
    {q:'τετέλεσται significa...', opts:['se terminará','se estaba terminando','ha sido consumado','terminó'], ans:2},
    {q:'ἐγήγερται = ...', opts:['resucitó','resucitará','ha sido resucitado','resucitaba'], ans:2},
    {q:'λέλυκα: la reduplicación es...', opts:['λε-','λυ-','-κ-','-α'], ans:0},
    {q:'El efecto del perfecto es...', opts:['solo pasado','solo presente','acción pasada con resultado presente','futuro próximo'], ans:2},
    {q:'γέγραπται aparece en el NT...', opts:['12 veces','65 veces','200 veces','8 veces'], ans:1},
    {q:'ἑώρακα = ...', opts:['vi','veía','he visto','veré'], ans:2},
  ],
  verse:{grk:'τετέλεσται', esp:'"Consumado es" — Juan 19:30',
    words:[['τετέλεσται','perfecto pasivo indicativo 3ª sg. de τελέω'],['τελέω','completar, llevar a cabo, cumplir'],['τε-','reduplicación del perfecto'],['τελε-','raíz verbal'],['σται','desinencia pasiva de perfecto 3ª sg.']],
    insight:'Una sola palabra griega que Jesús pronunció desde la cruz. No "ha terminado" en el sentido de "se acabó", sino "ha sido llevado a perfección/cumplimiento". El perfecto indica que la obra sigue válida y activa. Ese es el evangelio en una sola palabra.'

},
// ── DÍA 24 ──────────────────────────────────────────────────
{
  day:24, title:"La 3ª declinación", subtitle:"Los sustantivos irregulares más importantes del NT",

// ── BUILD UI ─────────────────────────────────────────────────
const lnav = document.getElementById('lnav');
const container = document.getElementById('lessons-container');

LESSONS.forEach((lesson, idx) => {
  const btn = document.createElement('button');
  btn.className = 'lnav-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = `Día ${lesson.day}`;
  btn.onclick = () => showLesson(idx);
  lnav.appendChild(btn);
  const panel = document.createElement('div');
  panel.className = 'lesson-panel' + (idx === 0 ? ' active' : '');
  panel.id = `lesson-${idx}`;
  panel.innerHTML = buildLesson(lesson, idx);
  container.appendChild(panel);
});

function showLesson(idx) {
  document.querySelectorAll('.lnav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.lesson-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  initQuiz(idx);
}

function showInnerTab(lIdx, tabName) {
  const panel = document.getElementById(`lesson-${lIdx}`);
  panel.querySelectorAll('.itab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  panel.querySelectorAll('.itab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
}

function buildLesson(lesson, idx) {
  const tabKeys = ['leccion','vocab','quiz','verse'];
  const tabLabels = ['📖 Lección','📚 Vocabulario','✏️ Práctica','✝️ Versículo'];

  let html = `
  <div style="text-align:center;margin-bottom:14px;">
    <div style="font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--azure);">Día ${lesson.day} — ${lesson.title}</div>
    <div style="font-size:12px;color:#888;margin-top:2px;">${lesson.subtitle}</div>
    <div class="prog-bar" style="max-width:300px;margin:8px auto 3px;"><div class="prog-fill" style="width:${(lesson.day/30*100).toFixed(1)}%"></div></div>
    <div class="prog-lbl">Día ${lesson.day} de 30${lesson.day===30?' — ¡Último día! 🎉':''}</div>
  </div>
  <div class="inner-tabs">
    ${tabLabels.map((t,i)=>`<div class="itab${i===0?' active':''}" data-tab="${tabKeys[i]}" onclick="showInnerTab(${idx},'${tabKeys[i]}')">${t}</div>`).join('')}
  </div>`;

  // LECCIÓN
  html += `<div class="itab-panel active" data-tab="leccion">`;

  if (lesson.day === 30) {
    html += `<div class="finish-banner"><h2>🏆 ¡30 días completados!</h2><p>Has recorrido el camino del alfabeto hasta la lectura libre del Nuevo Testamento en griego koiné. Eso es un logro real.</p></div>`;
  }

  if (lesson.tips && lesson.tips.length) {
    html += `<div class="card"><h3><span>💡</span> Claves del día</h3>`;
    lesson.tips.forEach(t => { html += `<div class="tip">${t.t}</div>`; });
    html += `</div>`;
  }

  if (lesson.extra) {
    const e = lesson.extra;
    if (e.type === 'paradigm') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="paradigm">
      <div class="para-row"><div class="para-lbl para-head">Persona</div><div class="para-grk para-head">Griego</div><div class="para-esp para-head">Español</div></div>`;
      e.rows.forEach(r => { html += `<div class="para-row"><div class="para-lbl">${r.lbl}</div><div class="para-grk">${r.grk}</div><div class="para-esp">${r.esp}</div></div>`; });
      html += `</div>`;
      if (e.note) html += `<div class="tip tip-gold" style="margin-top:10px;"><strong>Nota:</strong> ${e.note}</div>`;
      html += `</div>`;
    } else if (e.type === 'table') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3>
      <table class="gtable"><thead><tr>${e.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
      e.rows.forEach(r => { html += `<tr>${r.map((c,ci)=>`<td${ci===0?' style="font-weight:600"':''}>${c}</td>`).join('')}</tr>`; });
      html += `</tbody></table></div>`;
    } else if (e.type === 'conj') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="conj-grid">`;
      e.cols.forEach(col => {
        html += `<div class="conj-box"><h4>${col.title}</h4>`;
        col.rows.forEach(r => { html += `<div class="conj-line"><span class="cg">${r[0]}</span><span class="ce">${r[1]}</span></div>`; });
        html += `</div>`;
      });
      html += `</div></div>`;
    }
  }
  html += `</div>`;

  // VOCAB
  html += `<div class="itab-panel" data-tab="vocab"><div class="card"><h3><span>📚</span> Vocabulario del día</h3>
  <p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada palabra para ver más información.</p><ul class="vlist">`;
  lesson.vocab.forEach(v => {
    html += `<li class="vitem" onclick="toggleVocab(this)">
      <div class="vgrk">${v.g}</div>
      <div><div class="vtrans">${v.t}</div>
      <div class="vhint" style="display:none;">${v.h} — <em>${v.f}</em></div>
      <div class="vmore">↓ más info</div></div></li>`;
  });
  html += `</ul></div></div>`;

  // QUIZ
  html += `<div class="itab-panel" data-tab="quiz"><div class="card"><h3><span>✏️</span> Práctica — Día ${lesson.day}</h3>
  <div id="quiz-${idx}"></div><div id="score-${idx}" class="qscore" style="display:none;"></div></div></div>`;

  // VERSE
  const v = lesson.verse;
  html += `<div class="itab-panel" data-tab="verse">
  <div class="vblock">
    <div class="vgrk-big">${v.grk}</div>
    <div class="vtrans-small">${v.esp}</div>
    <div class="vwords">`;
  v.words.forEach(w => { html += `<div class="vrow"><span class="vwg">${w[0]}</span><span class="vws">${w[1]}</span></div>`; });
  html += `</div></div>
  <div class="card"><h3><span>🔍</span> El detalle que las traducciones pierden</h3><p>${v.insight}</p></div>
  </div>`;

  return html;
}

// ── QUIZ ENGINE ──────────────────────────────────────────────
const quizState = {};
function initQuiz(idx) {
  if (quizState[idx]) return;
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  renderQuiz(idx);
}
function renderQuiz(idx) {
  const el = document.getElementById(`quiz-${idx}`);
  const sc = document.getElementById(`score-${idx}`);
  const s = quizState[idx];
  if (!s) return;
  if (s.pos >= s.data.length) {
    el.style.display='none'; sc.style.display='block';
    const pct = Math.round(s.score/s.data.length*100);
    const isLast = LESSONS[idx].day === 30;
    sc.innerHTML = `${pct>=80?'🎉':'📖'} <strong>${s.score}/${s.data.length}</strong> correctas (${pct}%)<br>
    <span style="font-size:13px;color:#888;">${isLast ? '¡Has completado los 30 días! Χαίρετε 🏆' : pct>=80?'¡Excelente! Sigue adelante.':'Repasa los conceptos antes del siguiente día.'}</span>
    <br><button class="qbtn" style="margin-top:10px;" onclick="resetQuiz(${idx})">↺ Repetir</button>`;
    return;
  }
  const q = s.data[s.pos];
  el.innerHTML = `<div class="qcard">
    <div style="font-size:11px;color:#aaa;margin-bottom:6px;">${s.pos+1} / ${s.data.length}</div>
    <div class="qbig">${q.q}</div>
    <div class="qgrid">${q.opts.map((o,i)=>`<button class="qbtn" onclick="checkQ(${idx},this,${i},${q.ans})">${o}</button>`).join('')}</div>
    <div class="qfb" id="qfb-${idx}"></div>
  </div>`;
}
function checkQ(idx, btn, chosen, correct) {
  const s = quizState[idx];
  btn.parentElement.querySelectorAll('.qbtn').forEach(b => b.disabled=true);
  const fb = document.getElementById(`qfb-${idx}`);
  if (chosen===correct) { btn.classList.add('ok'); fb.style.color='var(--grn)'; fb.textContent='✓ ¡Correcto!'; s.score++; }
  else { btn.classList.add('no'); btn.parentElement.querySelectorAll('.qbtn')[correct].classList.add('ok'); fb.style.color='var(--red)'; fb.textContent=`✗ Era: ${s.data[s.pos].opts[correct]}`; }
  setTimeout(()=>{ s.pos++; renderQuiz(idx); }, 1300);
}
function resetQuiz(idx) {
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  document.getElementById(`quiz-${idx}`).style.display='block';
  document.getElementById(`score-${idx}`).style.display='none';
  renderQuiz(idx);
}
function toggleVocab(el) {
  const h=el.querySelector('.vhint'), m=el.querySelector('.vmore');
  if (h.style.display==='none'){ h.style.display='block'; m.style.display='none'; }
  else { h.style.display='none'; m.style.display='block'; }
}
initQuiz(0);
</script>
</body>
</html>
