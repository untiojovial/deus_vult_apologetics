// ── DÍA 31 ──────────────────────────────────────────────────
{
  day:31, title:"Los verbos -μι: δίδωμι, τίθημι, ἵστημι", subtitle:"Los verbos irregulares más importantes del NT",

    {t:'<strong>Los verbos -μι</strong> son un sistema verbal arcaico que sobrevivió en el griego koiné. En lugar de las desinencias normales (-ω, -εις, -ει), usan un sistema propio con raíces que se repiten por reduplicación. Son irregulares pero muy frecuentes.'},
    {t:'<strong>Los tres pilares:</strong> δίδωμι (dar) — 415 veces en el NT; τίθημι (poner, establecer) — 100 veces; ἵστημι (hacer estar de pie / estar de pie) — 155 veces. Sin conocerlos, no puedes leer Pablo ni Juan con fluidez.'},
    {t:'<strong>La clave práctica:</strong> en el presente, estos verbos tienen reduplicación (δι-δω-μι, τι-θη-μι, ἵσ-τη-μι). En el aoristo activo usan -κα como sufijo en vez de -σα: ἔδωκα (di), ἔθηκα (puse), ἔστησα (hice estar de pie).'},

// ── DÍA 32 ──────────────────────────────────────────────────
{
  day:32, title:"El optativo y las oraciones condicionales", subtitle:"Matices de posibilidad y las cuatro clases de condición",
  tips:[
    {t:'<strong>El modo optativo</strong> es el cuarto modo del griego (indicativo, subjuntivo, imperativo, optativo). Expresa deseo o posibilidad más remota que el subjuntivo. En el NT aparece 68 veces — poco frecuente pero teológicamente significativo.'},
    {t:'<strong>μὴ γένοιτο</strong> es la expresión optativa más famosa del NT: Pablo la usa 14 veces en Romanos y Gálatas. Significa "¡de ninguna manera!" / "¡que no sea así!" — una expresión de horror indignado ante una conclusión errónea.'},
    {t:'<strong>Las 4 clases de condición:</strong> Clase 1 (εἰ + indicativo) = condición asumida como real; Clase 2 (εἰ + indicativo pasado) = contraria a la realidad; Clase 3 (ἐάν + subjuntivo) = eventual/probable; Clase 4 (εἰ + optativo) = posibilidad remota.'},
    {t:'<strong>Para el lector del NT:</strong> la distinción Clase 1 vs Clase 2 es exegéticamente crucial. En Lucas 7:39 el fariseo piensa: "εἰ ἦν προφήτης" (si fuera profeta — Clase 2: en su opinión NO lo es). Jesús sabe que SÍ lo es.'},

  },
  vocab:[

    {g:'εἴθε',         t:'¡ojalá! (partícula optativa de deseo)',  h:'Ga 5:12',                          f:'Expresa deseo ardiente'},
    {g:'εἰ + indicat.','condición de 1ª clase (real)',             h:'Mt 4:3 — "Εἰ υἱὸς εἶ τοῦ θεοῦ"', f:'El diablo asume que Jesús ES Hijo de Dios'},
    {g:'εἰ + imperf.',  t:'condición 2ª clase (irreal en presente)',h:'Jn 11:21 — "εἰ ἦς ὧδε"',         f:'"Si hubieras estado aquí" — Marta, irrealidad'},
    {g:'ἐάν + subj.',  t:'condición 3ª clase (eventual)',          h:'Jn 3:3 — "ἐὰν μή τις γεννηθῇ"',  f:'Posibilidad abierta'},

  quiz:[

    {q:'Condición 1ª clase usa εἰ + ...', opts:['subjuntivo','optativo','indicativo','participio'], ans:2},
    {q:'Condición 2ª clase implica...', opts:['algo probable','algo real','algo contrario a la realidad','algo futuro'], ans:2},

    {q:'En Mt 4:3 "Εἰ υἱὸς εἶ" (1ª clase), el diablo...', opts:['duda que Jesús sea Hijo','asume que Jesús ES Hijo','niega que Jesús sea Hijo','pregunta si Jesús es Hijo'], ans:1},
    {q:'El optativo aparece en el NT aprox...', opts:['8 veces','68 veces','680 veces','6 veces'], ans:1},

// ── DÍA 33 ──────────────────────────────────────────────────
{
  day:33, title:"El infinitivo griego y sus usos", subtitle:"La forma verbal sin persona: propósito, resultado, discurso indirecto",
  tips:[
    {t:'<strong>El infinitivo griego</strong> es una forma verbal que no tiene persona ni número, pero sí tiempo (aspecto) y voz. Puede tener sujeto propio en acusativo y funciona en la oración como sustantivo verbal.'},

    {t:'<strong>El infinitivo con artículo</strong> es un construcción muy elegante del griego: τὸ ζῆν = "el vivir" / "la vida"; τὸ θέλειν = "el querer". El artículo lo sustantiva. Filipenses 1:21 usa esta construcción con un juego teológico intraducible.'},

  verse:{grk:'Ὁ δὲ λόγος τοῦ θεοῦ οὐ δέδεται', esp:'"Pero la palabra de Dios no está encadenada" — 2 Timoteo 2:9',
    words:[['Ὁ δέ','pero el (artículo + partícula de contraste)'],['λόγος','palabra, Verbo (nominativo — sujeto)'],['τοῦ θεοῦ','de Dios (genitivo)'],['οὐ','no (negación de indicativo)'],['δέδεται','está encadenada (perfecto pasivo 3ª sg. de δέω — atar)']],
    insight:'δέδεται es perfecto pasivo: "ha sido encadenada y permanece encadenada" — pero con οὐ lo niega. Pablo escribe desde la cárcel, encadenado (δέδεμαι — mismo verbo, mismo tiempo, primera persona). Él está encadenado; el Λόγος no. El perfecto en negativo expresa que la Palabra nunca ha caído en esa condición ni lo está ahora. Así termina este curso: con el perfecto pasivo negado que llevas 40 días aprendiendo a leer. Οὐ δέδεται.'
  }
}
];

// ── BUILD UI ─────────────────────────────────────────────────
const lnav = document.getElementById('lnav');
const container = document.getElementById('lessons-container');

LESSONS.forEach((lesson, idx) => {
  const btn = document.createElement('button');
  btn.className = 'lnav-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = `Día ${lesson.day}`;
  btn.onclick = () => showLesson(idx);
  lnav.appendChild(btn);
  const panel = document.createElement('div');
  panel.className = 'lesson-panel' + (idx === 0 ? ' active' : '');
  panel.id = `lesson-${idx}`;
  panel.innerHTML = buildLesson(lesson, idx);
  container.appendChild(panel);
});

function showLesson(idx) {
  document.querySelectorAll('.lnav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.lesson-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  initQuiz(idx);
}

function showInnerTab(lIdx, tabName) {
  const panel = document.getElementById(`lesson-${lIdx}`);
  panel.querySelectorAll('.itab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  panel.querySelectorAll('.itab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
}

function buildLesson(lesson, idx) {
  const tabKeys = ['leccion','vocab','quiz','verse'];
  const tabLabels = ['📖 Lección','📚 Vocabulario','✏️ Práctica','✝️ Versículo'];

  let html = `
  <div style="text-align:center;margin-bottom:14px;">
    <div style="font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--azure);">Día ${lesson.day} — ${lesson.title} <span class="adv-badge">AVANZADO</span></div>
    <div style="font-size:12px;color:#888;margin-top:2px;">${lesson.subtitle}</div>
    <div class="prog-bar" style="max-width:300px;margin:8px auto 3px;"><div class="prog-fill" style="width:${(lesson.day/40*100).toFixed(1)}%"></div></div>
    <div class="prog-lbl">Día ${lesson.day} de 40${lesson.day===40?' — ¡Curso completo! 🏆':''}</div>
  </div>
  <div class="inner-tabs">
    ${tabLabels.map((t,i)=>`<div class="itab${i===0?' active':''}" data-tab="${tabKeys[i]}" onclick="showInnerTab(${idx},'${tabKeys[i]}')">${t}</div>`).join('')}
  </div>`;

  html += `<div class="itab-panel active" data-tab="leccion">`;

  if (lesson.tips && lesson.tips.length) {
    html += `<div class="card"><h3><span>💡</span> Claves del día</h3>`;
    lesson.tips.forEach(t => { html += `<div class="tip">${t.t}</div>`; });
    html += `</div>`;
  }

  if (lesson.extra) {
    const e = lesson.extra;
    if (e.type === 'paradigm') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="paradigm">
      <div class="para-row"><div class="para-lbl para-head">Persona</div><div class="para-grk para-head">Griego</div><div class="para-esp para-head">Español</div></div>`;
      e.rows.forEach(r => { html += `<div class="para-row"><div class="para-lbl">${r.lbl}</div><div class="para-grk">${r.grk}</div><div class="para-esp">${r.esp}</div></div>`; });
      html += `</div>`;
      if (e.note) html += `<div class="tip tip-gold" style="margin-top:10px;"><strong>Nota:</strong> ${e.note}</div>`;
      html += `</div>`;
    } else if (e.type === 'table') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3>
      <table class="gtable"><thead><tr>${e.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
      e.rows.forEach(r => { html += `<tr>${r.map((c,ci)=>`<td${ci===0?' style="font-weight:600"':''}>${c}</td>`).join('')}</tr>`; });
      html += `</tbody></table></div>`;
    } else if (e.type === 'conj') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="conj-grid">`;
      e.cols.forEach(col => {
        html += `<div class="conj-box"><h4>${col.title}</h4>`;
        col.rows.forEach(r => { html += `<div class="conj-line"><span class="cg">${r[0]}</span><span class="ce">${r[1]}</span></div>`; });
        html += `</div>`;
      });
      html += `</div></div>`;
    }
  }
  html += `</div>`;

  html += `<div class="itab-panel" data-tab="vocab"><div class="card"><h3><span>📚</span> Vocabulario del día</h3>
  <p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada palabra para ver más información.</p><ul class="vlist">`;
  lesson.vocab.forEach(v => {
    html += `<li class="vitem" onclick="toggleVocab(this)">
      <div class="vgrk">${v.g}</div>
      <div><div class="vtrans">${v.t}</div>
      <div class="vhint" style="display:none;">${v.h} — <em>${v.f}</em></div>
      <div class="vmore">↓ más info</div></div></li>`;
  });
  html += `</ul></div></div>`;

  html += `<div class="itab-panel" data-tab="quiz"><div class="card"><h3><span>✏️</span> Práctica — Día ${lesson.day}</h3>
  <div id="quiz-${idx}"></div><div id="score-${idx}" class="qscore" style="display:none;"></div></div></div>`;

  const v = lesson.verse;
  html += `<div class="itab-panel" data-tab="verse">
  <div class="vblock">
    <div class="vgrk-big">${v.grk}</div>
    <div class="vtrans-small">${v.esp}</div>
    <div class="vwords">`;
  v.words.forEach(w => { html += `<div class="vrow"><span class="vwg">${w[0]}</span><span class="vws">${w[1]}</span></div>`; });
  html += `</div></div>
  <div class="card"><h3><span>🔍</span> El detalle que las traducciones pierden</h3><p>${v.insight}</p></div>
  </div>`;

  return html;
}

const quizState = {};
function initQuiz(idx) {
  if (quizState[idx]) return;
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  renderQuiz(idx);
}
function renderQuiz(idx) {
  const el = document.getElementById(`quiz-${idx}`);
  const sc = document.getElementById(`score-${idx}`);
  const s = quizState[idx];
  if (!s) return;
  if (s.pos >= s.data.length) {
    el.style.display='none'; sc.style.display='block';
    const pct = Math.round(s.score/s.data.length*100);
    const isLast = LESSONS[idx].day === 40;
    sc.innerHTML = `${pct>=75?'🎉':'📖'} <strong>${s.score}/${s.data.length}</strong> correctas (${pct}%)<br>
    <span style="font-size:13px;color:#888;">${isLast?'¡40 días completados! Οὐ δέδεται — la palabra no está encadenada. 🏆':pct>=75?'¡Excelente nivel avanzado!':'Este material es exigente — revisa las notas y repite.'}</span>
    <br><button class="qbtn" style="margin-top:10px;" onclick="resetQuiz(${idx})">↺ Repetir</button>`;
    return;
  }
  const q = s.data[s.pos];
  el.innerHTML = `<div class="qcard">
    <div style="font-size:11px;color:#aaa;margin-bottom:6px;">${s.pos+1} / ${s.data.length}</div>
    <div class="qbig">${q.q}</div>
    <div class="qgrid">${q.opts.map((o,i)=>`<button class="qbtn" onclick="checkQ(${idx},this,${i},${q.ans})">${o}</button>`).join('')}</div>
    <div class="qfb" id="qfb-${idx}"></div>
  </div>`;
}
function checkQ(idx, btn, chosen, correct) {
  const s = quizState[idx];
  btn.parentElement.querySelectorAll('.qbtn').forEach(b => b.disabled=true);
  const fb = document.getElementById(`qfb-${idx}`);
  if (chosen===correct) { btn.classList.add('ok'); fb.style.color='var(--grn)'; fb.textContent='✓ ¡Correcto!'; s.score++; }
  else { btn.classList.add('no'); btn.parentElement.querySelectorAll('.qbtn')[correct].classList.add('ok'); fb.style.color='var(--red)'; fb.textContent=`✗ Era: ${s.data[s.pos].opts[correct]}`; }
  setTimeout(()=>{ s.pos++; renderQuiz(idx); }, 1300);
}
function resetQuiz(idx) {
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  document.getElementById(`quiz-${idx}`).style.display='block';
  document.getElementById(`score-${idx}`).style.display='none';
  renderQuiz(idx);
}
function toggleVocab(el) {
  const h=el.querySelector('.vhint'), m=el.querySelector('.vmore');
  if (h.style.display==='none'){ h.style.display='block'; m.style.display='none'; }
  else { h.style.display='none'; m.style.display='block'; }
}
initQuiz(0);
</script>
</body>
</html>
