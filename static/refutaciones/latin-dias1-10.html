{day:3,title:"La segunda declinación: masculinos en -us y neutros en -um",subtitle:"Dominus, Verbum — la declinación más frecuente del vocabulario teológico",
tips:[
{t:'<strong>La segunda declinación</strong> agrupa masculinos en -us/-er y neutros en -um. Es la más frecuente en el vocabulario teológico: <em>Dominus</em> (Señor), <em>Deus</em> (Dios), <em>Filius</em> (Hijo), <em>Verbum</em> (Verbo), <em>regnum</em> (reino).'},
{t:'<strong>La marca de la 2ª declinación:</strong> el genitivo singular termina en -i. En el diccionario: <em>dominus, -i</em> (masc.) o <em>verbum, -i</em> (neutro).'},
{t:'<strong>Regla de oro de los neutros:</strong> nominativo, acusativo y vocativo son siempre idénticos. El plural de los neutros termina en -a (no confundir con la 1ª declinación).'},
{t:'<strong>Deus</strong> es irregular: el vocativo es <em>Deus</em> (no *Dee). <em>Dominus</em> tiene vocativo regular <em>Domine</em> — de ahí el "Domine" de la liturgia.'},
],

{day:4,title:"El verbo latino: presente de indicativo activo",subtitle:"Las cuatro conjugaciones — el núcleo del sistema verbal",
tips:[
{t:'<strong>El latín tiene cuatro conjugaciones</strong> identificadas por la vocal temática del infinitivo: 1ª (-āre): <em>amare</em>; 2ª (-ēre): <em>monere</em>; 3ª (-ere): <em>legere</em>; 4ª (-īre): <em>audire</em>.'},
{t:'<strong>Las desinencias personales del presente activo</strong> son prácticamente iguales en todas: -o/-m (1ª sg.), -s (2ª sg.), -t (3ª sg.), -mus (1ª pl.), -tis (2ª pl.), -nt (3ª pl.). Lo que varía es la vocal temática.'},
{t:'<strong>El verbo sum (ser/estar)</strong> es completamente irregular pero esencial. Sus formas: sum, es, est, sumus, estis, sunt. Memorízalo de inmediato.'},
{t:'<strong>La 1ª persona del singular</strong> en presente termina en -o: <em>amo, moneo, lego, audio</em>. Esta -o es la desinencia más característica del presente.'},
],

{day:5,title:"La tercera declinación",subtitle:"La más rica y frecuente — la clave del vocabulario teológico",
tips:[
{t:'<strong>La tercera declinación</strong> es la más amplia. Agrupa sustantivos con nominativos muy diferentes: <em>homo</em>, <em>pax</em>, <em>lux</em>, <em>rex</em>, <em>nomen</em>. La clave es el <strong>genitivo singular en -is</strong>.'},
{t:'<strong>La raíz verdadera</strong> se obtiene quitando -is del genitivo: <em>pax, pacis</em> → raíz <em>pac-</em>; <em>homo, hominis</em> → raíz <em>homin-</em>. Conocer la raíz permite construir todas las formas.'},
{t:'<strong>Los neutros de 3ª declinación</strong> tienen nominativo = acusativo = vocativo y el plural en -a: <em>nomen</em> → <em>nomina</em>; <em>corpus</em> → <em>corpora</em>; <em>tempus</em> → <em>tempora</em>.'},
{t:'<strong>Sustantivos esenciales para la teología:</strong> <em>fides</em> (fe), <em>homo</em> (hombre), <em>pax</em> (paz), <em>lux</em> (luz), <em>rex</em> (rey), <em>corpus</em> (cuerpo), <em>mors</em> (muerte).'},
],

insight:'<em>Omnia</em> es el acusativo neutro plural de <em>omnis</em>. <em>Possum</em> = <em>pot-</em> (poder) + <em>sum</em> — "soy capaz". El versículo más citado en el deporte descansa sobre la 3ª declinación y el compuesto de <em>esse</em>. La gramática latina es más fuerte que cualquier traducción: no "puedo hacer cosas" sino "soy-capaz-de todo".'}
},
{day:6,title:"Adjetivos, pronombres y concordancia",subtitle:"La ley fundamental del latín: género, número y caso",
tips:[
{t:'<strong>La ley de concordancia:</strong> el adjetivo concuerda con el sustantivo en género, número y caso — pero NO necesariamente en declinación. Un adjetivo de 1ª/2ª puede modificar un sustantivo de 3ª.'},
{t:'<strong>Los adjetivos de 1ª/2ª declinación</strong> tienen formas masc. en 2ª (bonus), fem. en 1ª (bona) y neutras en 2ª (bonum). <em>vir bonus / femina bona / verbum bonum</em>.'},
{t:'<strong>El pronombre relativo qui/quae/quod</strong> (que, quien) concuerda en género y número con su antecedente pero toma el caso de su propia cláusula. <em>Pater qui es in caelis</em>.'},
{t:'<strong>Los pronombres personales:</strong> ego (yo), tu (tú), nos (nosotros), vos (vosotros). La 3ª persona usa demostrativos: is/ea/id (él/ella/ello).'},
],

{day:7,title:"Imperfecto y perfecto de indicativo activo",subtitle:"Los dos tiempos del pasado: duración vs. acción completada",
tips:[
{t:'<strong>El imperfecto</strong> describe acción continua, repetida o habitual en el pasado. Se forma añadiendo <em>-ba-</em> entre la raíz y las desinencias: <em>amabam, amabas, amabat...</em> La -ba- es la marca inconfundible.'},
{t:'<strong>El perfecto activo</strong> describe una acción ya concluida. Desinencias propias: -i, -isti, -it, -imus, -istis, -erunt. La 1ª sg. siempre en -i: <em>amavi, dixi, vidi, fui</em>.'},
{t:'<strong>El tema de perfecto</strong> varía: alargamiento de vocal (lego→legi), reduplicación (do→dedi), -v- (amo→amavi), -s- (dico→dixi), forma propia (fero→tuli).'},
{t:'<strong>La distinción imperfecto/perfecto</strong> es análoga al griego imperfecto/aoristo: el imperfecto pinta el fondo; el perfecto narra los eventos puntuales.'},
],

const lnav=document.getElementById('lnav');
const container=document.getElementById('lessons-container');
LESSONS.forEach((lesson,idx)=>{
  const btn=document.createElement('button');
  btn.className='lnav-btn'+(idx===0?' active':'');
  btn.textContent=lesson.day===0?'Intro':`Día ${lesson.day}`;
  btn.onclick=()=>showLesson(idx);
  lnav.appendChild(btn);
  const panel=document.createElement('div');
  panel.className='lesson-panel'+(idx===0?' active':'');
  panel.id=`lesson-${idx}`;
  panel.innerHTML=buildLesson(lesson,idx);
  container.appendChild(panel);
});
function showLesson(idx){
  document.querySelectorAll('.lnav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.lesson-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  initQuiz(idx);
}
function showInnerTab(lIdx,tabName){
  const panel=document.getElementById(`lesson-${lIdx}`);
  panel.querySelectorAll('.itab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tabName));
  panel.querySelectorAll('.itab-panel').forEach(p=>p.classList.toggle('active',p.dataset.tab===tabName));
}
function buildLesson(lesson,idx){
  const tabKeys=['leccion','vocab','quiz','verse'];
  const tabLabels=['📖 Lección','📚 Vocabulario','✏️ Práctica','📜 Texto'];
  const pct=lesson.day===0?0:(lesson.day/30*100).toFixed(1);
  const progLabel=lesson.day===0?'Introducción':`Día ${lesson.day} de 30`;
  let html=`<div style="text-align:center;margin-bottom:14px;">
    <div style="font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--red);font-style:italic;">${lesson.day===0?'Introductio':`Dies ${lesson.day}`} — ${lesson.title}</div>
    <div style="font-size:12px;color:#888;margin-top:2px;">${lesson.subtitle}</div>
    <div class="prog-bar" style="max-width:300px;margin:8px auto 3px;"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-lbl">${progLabel}</div>
  </div>
  <div class="inner-tabs">
    ${tabLabels.map((t,i)=>`<div class="itab${i===0?' active':''}" data-tab="${tabKeys[i]}" onclick="showInnerTab(${idx},'${tabKeys[i]}')">${t}</div>`).join('')}
  </div>`;
  html+=`<div class="itab-panel active" data-tab="leccion">`;
  if(lesson.isIntro){
    html+=`<div class="intro-hero"><div class="big-lat">Lingua Latina</div><p>La lengua de Roma, Virgilio, Agustín, Tomás de Aquino y la Vulgata de Jerónimo</p></div>`;
    html+=`<div class="card"><h3><span>✨</span> ¿Por qué estudiar latín?</h3>`;
    lesson.tips.forEach(t=>{html+=`<div class="tip">${t.t}</div>`;});
    html+=`</div>`;
    html+=`<div class="card"><h3><span>⚡</span> Características del latín</h3><div class="feature-grid">`;
    lesson.features.forEach(f=>{html+=`<div class="feature-box"><div class="feature-icon">${f.icon}</div><div class="feature-title">${f.title}</div><div class="feature-desc">${f.desc}</div></div>`;});
    html+=`</div></div>`;
    html+=`<div class="card"><h3><span>🔀</span> Diferencias con el español</h3><ul class="diff-list">`;
    lesson.diffs.forEach(d=>{html+=`<li class="diff-item"><span class="diff-icon">${d.icon}</span><span>${d.t}</span></li>`;});
    html+=`</ul></div>`;
  } else {
    if(lesson.tips){html+=`<div class="card"><h3><span>💡</span> Claves del día</h3>`;lesson.tips.forEach(t=>{html+=`<div class="tip">${t.t}</div>`;});html+=`</div>`;}
    if(lesson.extra){
      const e=lesson.extra;
      if(e.type==='table'){
        html+=`<div class="card"><h3><span>📊</span> ${e.title}</h3><table class="gtable"><thead><tr>${e.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
        e.rows.forEach(r=>{html+=`<tr>${r.map((c,ci)=>`<td${ci===0?' style="font-weight:600"':''}>${c}</td>`).join('')}</tr>`;});
        html+=`</tbody></table></div>`;
      }else if(e.type==='paradigm'){
        html+=`<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="paradigm"><div class="para-row"><div class="para-lbl para-head">Caso</div><div class="para-lat para-head">Latino</div><div class="para-esp para-head">Español</div></div>`;
        e.rows.forEach(r=>{html+=`<div class="para-row"><div class="para-lbl">${r.lbl}</div><div class="para-lat">${r.lat}</div><div class="para-esp">${r.esp}</div></div>`;});
        html+=`</div>`;
        if(e.note)html+=`<div class="tip tip-olive" style="margin-top:10px;"><strong>Nota:</strong> ${e.note}</div>`;
        html+=`</div>`;
      }else if(e.type==='conj'){
        html+=`<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="conj-grid">`;
        e.cols.forEach(col=>{
          html+=`<div class="conj-box"><h4>${col.title}</h4>`;
          col.rows.forEach(r=>{html+=`<div class="conj-line"><span class="conj-lat">${r[0]}</span><span class="conj-esp">${r[1]}</span></div>`;});
          html+=`</div>`;
        });
        html+=`</div></div>`;
      }
    }
  }
  html+=`</div>`;
  html+=`<div class="itab-panel" data-tab="vocab"><div class="card"><h3><span>📚</span> Vocabulario del día</h3><p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada entrada para ver más.</p><ul class="vlist">`;
  lesson.vocab.forEach(v=>{
    html+=`<li class="vitem" onclick="toggleVocab(this)"><div class="vlat">${v.g}</div><div><div class="vtrans">${v.t}</div><div class="vhint" style="display:none;">${v.h} — <em>${v.f}</em></div><div class="vmore">↓ más info</div></div></li>`;
  });
  html+=`</ul></div></div>`;
  html+=`<div class="itab-panel" data-tab="quiz"><div class="card"><h3><span>✏️</span> Práctica — ${lesson.day===0?'Introductio':`Dies ${lesson.day}`}</h3><div id="quiz-${idx}"></div><div id="score-${idx}" class="qscore" style="display:none;"></div></div></div>`;
  const v=lesson.verse;
  html+=`<div class="itab-panel" data-tab="verse"><div class="vblock"><div class="vblock-lat">${v.lat}</div><div class="vblock-trans">${v.esp}</div><div class="vwords">`;
  v.words.forEach(w=>{html+=`<div class="vrow"><span class="vwl">${w[0]}</span><span class="vwe">${w[1]}</span></div>`;});
  html+=`</div></div><div class="card"><h3><span>🔍</span> El detalle que las traducciones pierden</h3><p>${v.insight}</p></div></div>`;
  return html;
}
const quizState={};
function initQuiz(idx){
  if(quizState[idx])return;
  quizState[idx]={pos:0,score:0,data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5)};
  renderQuiz(idx);
}
function renderQuiz(idx){
  const el=document.getElementById(`quiz-${idx}`);
  const sc=document.getElementById(`score-${idx}`);
  const s=quizState[idx];
  if(!s)return;
  if(s.pos>=s.data.length){
    el.style.display='none';sc.style.display='block';
    const pct=Math.round(s.score/s.data.length*100);
    sc.innerHTML=`${pct>=75?'🎉':'📖'} <strong>${s.score}/${s.data.length}</strong> correctas (${pct}%)<br><span style="font-size:13px;color:#888;">${pct>=75?'Optime! Adelante.':'Perseverantia vincit — repasa.'}</span><br><button class="qbtn" style="margin-top:10px;" onclick="resetQuiz(${idx})">↺ Repetir</button>`;
    return;
  }
  const q=s.data[s.pos];
  el.innerHTML=`<div class="qcard"><div style="font-size:11px;color:#aaa;margin-bottom:6px;">${s.pos+1} / ${s.data.length}</div><div class="qbig">${q.q}</div><div class="qgrid">${q.opts.map((o,i)=>`<button class="qbtn" onclick="checkQ(${idx},this,${i},${q.ans})">${o}</button>`).join('')}</div><div class="qfb" id="qfb-${idx}"></div></div>`;
}
function checkQ(idx,btn,chosen,correct){
  const s=quizState[idx];
  btn.parentElement.querySelectorAll('.qbtn').forEach(b=>b.disabled=true);
  const fb=document.getElementById(`qfb-${idx}`);
  if(chosen===correct){btn.classList.add('ok');fb.style.color='var(--olive)';fb.textContent='✓ Recte!';s.score++;}
  else{btn.classList.add('no');btn.parentElement.querySelectorAll('.qbtn')[correct].classList.add('ok');fb.style.color='var(--red)';fb.textContent=`✗ Erat: ${s.data[s.pos].opts[correct]}`;}
  setTimeout(()=>{s.pos++;renderQuiz(idx);},1300);
}
function resetQuiz(idx){
  quizState[idx]={pos:0,score:0,data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5)};
  document.getElementById(`quiz-${idx}`).style.display='block';
  document.getElementById(`score-${idx}`).style.display='none';
  renderQuiz(idx);
}
function toggleVocab(el){
  const h=el.querySelector('.vhint'),m=el.querySelector('.vmore');
  if(h.style.display==='none'){h.style.display='block';m.style.display='none';}
  else{h.style.display='none';m.style.display='block';}
}
initQuiz(0);
</script>
