      d.title.toLowerCase().includes(q) ||
      d.cat.toLowerCase().includes(q) ||
      d.v1r.toLowerCase().includes(q) ||
      d.v2r.toLowerCase().includes(q) ||
      d.res.toLowerCase().includes(q) ||
      String(d.id) === q
    );
  });
}

function getCats(items) {
  return [...new Map(items.map(d => [d.cat, {cat: d.cat, icon: d.icon}])).values()];
}

function buildTOC(visible) {
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  const cats = getCats(visible);
  cats.forEach(({cat, icon}) => {
    const items = visible.filter(d => d.cat === cat);
    const catEl = document.createElement('div');
    catEl.className = 'toc-cat-label';
    catEl.textContent = icon + ' ' + cat;
    toc.appendChild(catEl);
    items.forEach(d => {
      const a = document.createElement('a');
      a.className = 'toc-link';
      a.href = '#c' + d.id;
      a.dataset.id = d.id;
      a.innerHTML = `<span class="toc-n">${d.id}</span><span>${d.title}</span>`;
      a.addEventListener('click', e => {
        e.preventDefault();
        const el = document.getElementById('c' + d.id);
        if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
        setActiveTOC(d.id);
        if (window.innerWidth < 940) closeSidebar();
      });
      toc.appendChild(a);
    });
  });
}

function setActiveTOC(id) {
  document.querySelectorAll('.toc-link').forEach(a => {
    a.classList.toggle('active', a.dataset.id == id);
  });
  const active = document.querySelector(`.toc-link[data-id="${id}"]`);
  if (active) active.scrollIntoView({block: 'nearest', behavior: 'smooth'});
}

function buildCards(visible) {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  document.getElementById('resultCount').textContent = `Mostrando ${visible.length} de ${DATA.length}`;

  if (!visible.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p class="empty-text">No se encontraron resultados para esa búsqueda.</p></div>`;
    return;
  }

  const cats = getCats(visible);
  cats.forEach(({cat, icon}) => {
    const items = visible.filter(d => d.cat === cat);

    const heading = document.createElement('div');
    heading.className = 'cat-heading';
    heading.innerHTML = `<span class="cat-icon">${icon}</span><span class="cat-name">${cat}</span><span class="cat-count">${items.length}</span>`;
    container.appendChild(heading);

    items.forEach(d => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = 'c' + d.id;

      const v2text = d.v2t || d.v2text || '';

      card.innerHTML = `
        <div class="card-header">
          <div class="card-num">${d.id}</div>
          <div class="card-title">${d.title}</div>
          <div class="card-chevron">▾</div>
        </div>
        <div class="card-body">
          <div class="verses-grid">
            <div class="verse-box">
              <div class="verse-ref">${d.v1r}</div>
              <div class="verse-text">${d.v1t}</div>
            </div>
            <div class="verse-box">
              <div class="verse-ref">${d.v2r}</div>
              <div class="verse-text">${v2text}</div>
            </div>
          </div>
          <div class="resolution-block">
            <div class="res-label">✦ Resolución</div>
            <p class="res-text">${d.res}</p>
          </div>
          <span class="tag-badge tag-${d.tag}">${d.tl}</span>
        </div>
      `;

      card.querySelector('.card-header').addEventListener('click', () => {
        card.classList.toggle('open');
      });

      container.appendChild(card);
    });
  });
}

function render() {
  const visible = getVisible();
  buildTOC(visible);
  buildCards(visible);
  allExpanded = false;
  document.getElementById('expandBtn').textContent = '▸ Expandir todas';
}

// Search
document.getElementById('searchInput').addEventListener('input', render);

// Filter pills
document.getElementById('filterPills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeFilter = pill.dataset.f;
  render();
});

// Expand / collapse all
document.getElementById('expandBtn').addEventListener('click', () => {
  allExpanded = !allExpanded;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('open', allExpanded));
  document.getElementById('expandBtn').textContent = allExpanded ? '▾ Contraer todas' : '▸ Expandir todas';
});

// Back to top
const backBtn = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backBtn.classList.toggle('visible', window.scrollY > 500);

  // TOC active highlight
  const cards = document.querySelectorAll('.card');
  let current = null;
  cards.forEach(c => {
    if (c.getBoundingClientRect().top < 160) current = c.id.replace('c', '');
  });
  if (current) setActiveTOC(current);
}, {passive: true});

backBtn.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));

// Mobile sidebar
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

document.getElementById('mobileToggle').addEventListener('click', () => {
  sidebar.classList.add('open');
  overlay.classList.add('visible');
});

function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('visible');
}

overlay.addEventListener('click', closeSidebar);

// Initial render
render();
</script>
</body>
</html>
