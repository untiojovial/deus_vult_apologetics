<style>

body{background:var(--sand);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}

header h1{font-family:'Frank Ruhl Libre',serif;font-size:1.9rem;letter-spacing:.02em;margin-bottom:2px;position:relative}

header .badges{margin-top:8px;position:relative}
.badge-heb{display:inline-block;background:var(--clay);color:var(--night);border-radius:12px;font-size:11px;font-weight:700;padding:2px 10px;margin:0 3px;letter-spacing:.05em}

.lesson-panel{display:none;padding:16px;max-width:720px;margin:0 auto}
.lesson-panel.active{display:block}

.conj-box{background:var(--sand);border:1px solid var(--bdr);border-radius:6px;padding:10px 12px}
.conj-box h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--clay);margin-bottom:6px}

.parse-item{font-size:12px;padding:3px 7px;background:#fff;border-radius:4px;border:1px solid #d8c8f0}
.parse-item span{color:var(--purple);font-weight:700}
.root-box{background:#fff8e1;border:1px solid var(--clay);border-radius:8px;padding:12px;margin:10px 0;text-align:center}

.root-esp{font-size:12px;color:var(--stone);margin-top:4px}

// ── DÍA 11 ──────────────────────────────────────────────────
{
  day:11, title:"Las raíces triconsonánticas: el corazón del hebreo", subtitle:"Cómo una raíz de 3 letras genera familias enteras de palabras",
  tips:[
    {t:'<strong>El hebreo funciona por raíces de 3 consonantes</strong> (a veces 2 o 4). Sobre esa raíz se superponen patrones de vocales y prefijos/sufijos para generar sustantivos, verbos, adjetivos y adverbios relacionados semánticamente. Es el sistema más elegante de la lingüística semítica.'},
    {t:'<strong>Ejemplo paradigmático — raíz מ-ל-כ (m-l-k):</strong> מֶלֶךְ (rey), מַלְכָּה (reina), מַלְכוּת (reino/reinado), מָלַךְ (reinar), הִמְלִיךְ (hacer reinar/entronizar), מַמְלָכָה (reino), מֹלֶךְ (el que reina). Una raíz → 7 palabras distintas.'},
    {t:'<strong>Cómo identificar la raíz:</strong> quita prefijos (בְּ לְ מִ הַ וְ), quita sufijos posesivos y de plural (-ִים -וֹת -וֹ -ִי), identifica las 3 consonantes que quedan. Eso es la raíz. El léxico hebreo (BDB o HALOT) organiza todas las palabras por raíz.'},
    {t:'<strong>Las letras débiles:</strong> algunas consonantes se comportan de manera irregular cuando están en la raíz. Las más importantes: א (álef) y ה (he) al final de raíz suelen caer o transformarse. נ (nun) inicial a veces se asimila a la consonante siguiente. ו/י (vav/yod) en posición media suelen convertirse en vocal larga. Estas raíces "débiles" producen formas aparentemente irregulares que en realidad siguen sus propias reglas.'},
  ],
  extra:{type:'table', title:'Familias de palabras a partir de 3 raíces clave',
    headers:['Raíz','Significado base','Sustantivo','Verbo','Adjetivo/Otro'],
    rows:[

      ['שׁלמ','integridad/paz','שָׁלוֹם (paz), שֶׁלֶם (ofrenda de paz)','שִׁלֵּם (pagar/completar)','שָׁלֵם (íntegro)'],
      ['כתב','escribir','כְּתָב (escritura), מִכְתָּב (carta)','כָּתַב (escribir)','כָּתוּב (escrito)'],
      ['ידע','conocer','דַּעַת (conocimiento), מַדָּע (ciencia)','יָדַע (conocer)','יָדוּעַ (conocido)'],
      ['ברך','bendecir','בְּרָכָה (bendición)','בֵּרַךְ (bendecir)','בָּרוּךְ (bendito)'],
    ]
  },
  vocab:[
    {g:'קֹדֶשׁ',    t:'santidad, lo santo, lugar santo',   h:'Éx 3:5 — "אַדְמַת קֹדֶשׁ הוּא"',          f:'Misma raíz que קָדוֹשׁ y מִקְדָּשׁ'},
    {g:'מִקְדָּשׁ',  t:'santuario, lugar santo',             h:'Éx 25:8 — "וְעָשׂוּ לִי מִקְדָּשׁ"',       f:'מ- prefijo + raíz קדשׁ = lugar de santidad'},
    {g:'שָׁלֵם',    t:'íntegro, completo, en paz',          h:'Gn 15:16 — "לֹא שָׁלֵם עֲוֺן הָאֱמֹרִי"', f:'Adjetivo de la raíz שׁלמ'},
    {g:'בְּרָכָה',  t:'bendición',                         h:'Gn 12:2 — "וֶהְיֵה בְּרָכָה"',            f:'Sustantivo fem. de raíz ברך'},
    {g:'דַּעַת',    t:'conocimiento, sabiduría experiencial',h:'Gn 2:9 — "עֵץ הַדַּעַת"',               f:'דַּעַת = conocimiento de raíz ידע'},
    {g:'כָּתוּב',   t:'escrito, lo que está escrito',       h:'Dt 29:20 — "הַכָּתוּב בַּסֵּפֶר הַזֶּה"',  f:'Participio pasivo Qal de כתב'},
    {g:'מַמְלָכָה', t:'reino, realeza',                    h:'Éx 19:6 — "מַמְלֶכֶת כֹּהֲנִים"',         f:'מ- + מלכ + ָה — derivación de cuarto grado'},
    {g:'יְשׁוּעָה',  t:'salvación, liberación',              h:'Éx 15:2 — "וַיְהִי לִי לִישׁוּעָה"',      f:'Raíz ישׁע — misma de Jesús (יֵשׁוּעַ)'},
  ],
  quiz:[
    {q:'¿Cuántas consonantes tiene típicamente una raíz hebrea?', opts:['2','3','4','varía siempre'], ans:1},
    {q:'De la raíz קדשׁ se derivan...', opts:['solo קָדוֹשׁ','קָדוֹשׁ, קֹדֶשׁ, מִקְדָּשׁ, קִדֵּשׁ y más','solo verbos','solo sustantivos'], ans:1},
    {q:'Para encontrar la raíz de מַלְכָּה (reina) debes...', opts:['quitar -ָה y tienes מלכ','añadir ב al inicio','buscar el dagesh','mirar el artículo'], ans:0},

    {q:'¿Qué son las "raíces débiles" en hebreo?', opts:['raíces con significado negativo','raíces con letras que se transforman o caen','raíces de 2 letras solo','raíces arameas'], ans:1},
    {q:'El BDB o HALOT organizan el léxico hebreo por...', opts:['orden alfabético de las palabras completas','orden de frecuencia','raíces triconsonánticas','libros bíblicos'], ans:2},
    {q:'דַּעַת (conocimiento) es sustantivo de la raíz...', opts:['דבר','ידע','רעה','ידה'], ans:1},
  ],
  verse:{heb:'עֵץ הַחַיִּים הִיא לַמַּחֲזִיקִים בָּהּ וְתֹמְכֶיהָ מְאֻשָּׁר', esp:'"Árbol de vida es ella para los que la retienen, y dichosos son los que la sostienen" — Proverbios 3:18',
    words:[['עֵץ הַחַיִּים','árbol de vida (estado constructo)'],['הִיא','ella es (pronombre cópula — refiere a la sabiduría)'],['לַמַּחֲזִיקִים','para los que retienen (לְ + part. pl. Hifil de חזק)'],['בָּהּ','en ella (ב + sufijo 3ª fem. sg.)'],['וְתֹמְכֶיהָ','y los que la sostienen (part. pl. + sufijo)'],['מְאֻשָּׁר','dichoso, bienaventurado (Pual participio)']],
    insight:'מְאֻשָּׁר es el participio del Pual (pasiva del Pi\'el intensivo) de אשׁר — declarado/proclamado feliz. La raíz אשׁר da también אַשְׁרֵי (bienaventurado), la palabra con la que empieza el Salmo 1 y las Bienaventuranzas de Mateo 5. El árbol de vida del Edén (Gn 2:9) reaparece aquí como imagen de la sabiduría: Proverbios dice que encontrar la sabiduría es recuperar el Edén.'
  }
},
// ── DÍA 12 ──────────────────────────────────────────────────
{
  day:12, title:"Los siete binyanim (בִּנְיָנִים)", subtitle:"El sistema de conjugaciones verbales del hebreo bíblico",
  tips:[
    {t:'<strong>Los binyanim</strong> (plural de בִּנְיָן, "construcción") son los 7 patrones verbales del hebreo. Cada uno toma la misma raíz triconsonántica y le da un matiz distinto: activo simple, pasivo simple, intensivo activo, intensivo pasivo, causativo activo, causativo pasivo, reflexivo. Son el corazón de la morfología verbal hebrea.'},
    {t:'<strong>Qal (פָּעַל)</strong> — el más frecuente. Acción simple activa: כָּתַב = "escribió". <strong>Nifal (נִפְעַל)</strong> — pasiva del Qal o reflexiva: נִכְתַּב = "fue escrito". <strong>Pi\'el (פִּיעֵל)</strong> — intensivo/factitivo: כִּתֵּב = "hacer escribir". <strong>Pual (פֻּעַל)</strong> — pasiva del Pi\'el: כֻּתַּב = "fue inscrito intensivamente".'},
    {t:'<strong>Hifil (הִפְעִיל)</strong> — causativo activo: הִכְתִּיב = "hizo escribir, dictó". <strong>Hofal (הֻפְעַל)</strong> — causativo pasivo: הֻכְתַּב = "fue hecho escribir". <strong>Hitpa\'el (הִתְפַּעֵל)</strong> — reflexivo/recíproco: הִתְכַּתֵּב = "escribirse mutuamente".'},
    {t:'<strong>No todos los verbos aparecen en todos los binyanim.</strong> La mayoría de verbos solo tiene Qal + 1 o 2 más. Algunos verbos son defectivos (solo existen en binyanim no-Qal). Lo importante es reconocer cada patrón por sus marcas morfológicas características.'},
  ],
  extra:{type:'table', title:'Los 7 binyanim con la raíz קדשׁ (ser santo)',
    headers:['Binyan','Patrón','Forma de קדשׁ','Significado','Marca característica'],
    rows:[
      ['Qal','פָּעַל','קָדַשׁ','ser/estar santo','sin marcas — forma base'],
      ['Nifal','נִפְעַל','נִקְדַּשׁ','ser santificado','נִ- prefijo'],
      ["Pi'el",'פִּיעֵל','קִדֵּשׁ','santificar (activo intens.)','dagesh en letra media'],
      ['Pual','פֻּעַל','קֻדַּשׁ','ser santificado (intens.)','ּ bajo 1ª + dagesh en 2ª'],
      ['Hifil','הִפְעִיל','הִקְדִּישׁ','hacer santo, consagrar','הִ- prefijo + י largo'],
      ['Hofal','הֻפְעַל','הֻקְדַּשׁ','ser consagrado (caus. pas.)','הֻ- prefijo'],
      ["Hitpa'el",'הִתְפַּעֵל','הִתְקַדֵּשׁ','santificarse a sí mismo','הִתְ- prefijo'],
    ]
  },
  vocab:[

    {g:'דִּבֵּר',   t:'habló (Pi\'el de דבר)',              h:'Gn 1:28 — "וַיְבָרֶךְ אֹתָם אֱלֹהִים"',   f:'Pi\'el intensivo: hablar solemnemente'},

  tips:[
    {t:'<strong>La oración nominal</strong> no tiene verbo: yuxtapone dos sustantivos o un sustantivo y un adjetivo. יהוה מֶלֶךְ = "YHWH (es) rey". יהוה צַדִּיק = "YHWH (es) justo". El verbo "ser" en presente está implícito. Muy frecuente en poesía y salmos.'},
    {t:'<strong>La oración verbal</strong> tiene orden normal V-S-O: el verbo va primero, luego el sujeto, luego el objeto. וַיִּבְרָא אֱלֹהִים אֶת הָאָדָם = "(V)creó (S)Dios (O)al hombre". El sujeto explícito después del verbo es normal, no énfasis.'},
    {t:'<strong>El orden S-V-O existe pero es enfático.</strong> Cuando el sujeto aparece ANTES del verbo sin waw consecutivo, el sujeto está enfatizado: אֱלֹהִים אָמַר = "DIOS dijo (no otro)". Esta inversión del orden es una señal exegética importante.'},
    {t:'<strong>La cláusula relativa</strong> en hebreo usa אֲשֶׁר (que, quien, el cual) o el prefijo שֶׁ- (forma tardía). אֲשֶׁר sin antecedente = "el que / lo que". La construcción es frecuentemente más simple que en español: בְּרֵאשִׁית בָּרָא = "en el principio, cuando creó" (sin pronombre relativo).'},

  tips:[
    {t:'<strong>Job tiene el hebreo más arcaico y difícil del AT.</strong> Contiene más hápax legómena (palabras que aparecen solo una vez en toda la Biblia) que cualquier otro libro. Los lexicógrafos aún debaten el significado de docenas de palabras. Es el libro donde el léxico hebrea reconoce más incertidumbre.'},
    {t:'<strong>El "góel" (גֹּאֵל) en Job 19:25</strong> — "sé que mi Redentor vive" — es uno de los versículos más debatidos del AT. גֹּאֵל (participio de גאל) en el derecho hebreo es el pariente más cercano que rescata al familiar en apuros (ver Rut). Job lo aplica a Dios con un alcance nuevo.'},
    {t:'<strong>La estructura de Job:</strong> prólogo en prosa (caps. 1-2) → debate poético (3-37) → discurso divino desde el torbellino (38-41) → epílogo en prosa (42). El contraste prosa/poesía es intencional: el marco en prosa es "seguro"; la poesía del debate es el territorio de la crisis y la búsqueda.'},
    {t:'<strong>La teología de la retribución</strong> (pecado → sufrimiento, justicia → prosperidad) es la que defienden los amigos de Job y que el libro subvierte. El "problema de Job" no es solo el sufrimiento del inocente: es el colapso del sistema teológico simplista. Dios le dice a Elifaz: "no habéis hablado de mí lo recto" (42:7).'},

// ── BUILD UI ────────────────────────────────────────────────
const lnav = document.getElementById('lnav');
const container = document.getElementById('lessons-container');
let qhtml = '';

LESSONS.forEach((lesson, idx) => {
  const btn = document.createElement('button');
  btn.className = 'lnav-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = `Día ${lesson.day}`;
  btn.onclick = () => showLesson(idx);
  lnav.appendChild(btn);
  const panel = document.createElement('div');
  panel.className = 'lesson-panel' + (idx === 0 ? ' active' : '');
  panel.id = `lesson-${idx}`;
  panel.innerHTML = buildLesson(lesson, idx);
  container.appendChild(panel);
});

function showLesson(idx) {
  document.querySelectorAll('.lnav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.lesson-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  initQuiz(idx);
}
function showInnerTab(lIdx, tabName) {
  const panel = document.getElementById(`lesson-${lIdx}`);
  panel.querySelectorAll('.itab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  panel.querySelectorAll('.itab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
}

function buildLesson(lesson, idx) {
  const tabKeys = ['leccion','vocab','quiz','verse'];
  const tabLabels = ['📖 Lección','📚 Vocabulario','✏️ Práctica','✝️ Texto'];
  const pct = (lesson.day / 30 * 100).toFixed(1);

  let html = `
  <div style="text-align:center;margin-bottom:14px;">
    <div style="font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--crimson);">Día ${lesson.day} — ${lesson.title}</div>
    <div style="font-size:12px;color:#888;margin-top:2px;">${lesson.subtitle}</div>
    <div class="prog-bar" style="max-width:300px;margin:8px auto 3px;"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-lbl">Día ${lesson.day} de 30${lesson.day===20?' — ¡Segunda semana completada! 🎉':''}</div>
  </div>
  <div class="inner-tabs">
    ${tabLabels.map((t,i)=>`<div class="itab${i===0?' active':''}" data-tab="${tabKeys[i]}" onclick="showInnerTab(${idx},'${tabKeys[i]}')">${t}</div>`).join('')}
  </div>`;

  // LECCIÓN
  html += `<div class="itab-panel active" data-tab="leccion">`;
  if (lesson.tips && lesson.tips.length) {
    html += `<div class="card"><h3><span>💡</span> Claves del día</h3>`;
    lesson.tips.forEach(t => { html += `<div class="tip">${t.t}</div>`; });
    html += `</div>`;
  }
  if (lesson.extra) {
    const e = lesson.extra;
    if (e.type === 'table') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3>
      <table class="gtable"><thead><tr>${e.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
      e.rows.forEach(r => { html += `<tr>${r.map((c,ci)=>`<td${ci===0?' style="font-weight:600"':''}>${c}</td>`).join('')}</tr>`; });
      html += `</tbody></table></div>`;
    } else if (e.type === 'conj') {
      html += `<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="conj-grid">`;
      e.cols.forEach(col => {
        html += `<div class="conj-box"><h4>${col.title}</h4>`;
        col.rows.forEach(r => { html += `<div class="conj-line"><span class="conj-heb">${r[0]}</span><span class="conj-esp">${r[1]}</span></div>`; });
        html += `</div>`;
      });
      html += `</div></div>`;
    }
  }
  html += `</div>`;

  // VOCAB
  html += `<div class="itab-panel" data-tab="vocab"><div class="card"><h3><span>📚</span> Vocabulario del día</h3>
  <p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada palabra para más información.</p><ul class="vlist">`;
  lesson.vocab.forEach(v => {
    html += `<li class="vitem" onclick="toggleVocab(this)">
      <div class="vheb">${v.g}</div>
      <div><div class="vtrans">${v.t}</div>
      <div class="vhint" style="display:none;">${v.h} — <em>${v.f}</em></div>
      <div class="vmore">↓ más info</div></div></li>`;
  });
  html += `</ul></div></div>`;

  // QUIZ
  html += `<div class="itab-panel" data-tab="quiz"><div class="card"><h3><span>✏️</span> Práctica — Día ${lesson.day}</h3>
  <div id="quiz-${idx}"></div><div id="score-${idx}" class="qscore" style="display:none;"></div></div></div>`;

  // VERSE
  const v = lesson.verse;
  html += `<div class="itab-panel" data-tab="verse">
  <div class="vblock">
    <div class="vblock-heb">${v.heb}</div>
    <div class="vblock-trans">${v.esp}</div>
    <div class="vwords">`;
  v.words.forEach(w => { html += `<div class="vrow"><span class="vwh">${w[0]}</span><span class="vwe">${w[1]}</span></div>`; });
  html += `</div></div>
  <div class="card"><h3><span>🔍</span> El detalle que las traducciones pierden</h3><p>${v.insight}</p></div>
  </div>`;

  return html;
}

const quizState = {};
function initQuiz(idx) {
  if (quizState[idx]) return;
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  renderQuiz(idx);
}
function renderQuiz(idx) {
  const el = document.getElementById(`quiz-${idx}`);
  const sc = document.getElementById(`score-${idx}`);
  const s = quizState[idx];
  if (!s) return;
  if (s.pos >= s.data.length) {
    el.style.display='none'; sc.style.display='block';
    const pct = Math.round(s.score/s.data.length*100);
    sc.innerHTML = `${pct>=75?'🎉':'📖'} <strong>${s.score}/${s.data.length}</strong> correctas (${pct}%)<br>
    <span style="font-size:13px;color:#888;">${pct>=75?'¡Muy bien! El hebreo intermedio exige rigor.':'Repasa el material — el hebreo recompensa la constancia.'}</span>
    <br><button class="qbtn" style="margin-top:10px;" onclick="resetQuiz(${idx})">↺ Repetir</button>`;
    return;
  }
  const q = s.data[s.pos];
  const isHeb = q.q.match(/[\u05D0-\u05FF]/);
  el.innerHTML = `<div class="qcard">
    <div style="font-size:11px;color:#aaa;margin-bottom:6px;">${s.pos+1} / ${s.data.length}</div>
    <div class="${isHeb?'qbig':'qbig-latin'}">${q.q}</div>
    <div class="qgrid">${q.opts.map((o,i)=>`<button class="qbtn" onclick="checkQ(${idx},this,${i},${q.ans})">${o}</button>`).join('')}</div>
    <div class="qfb" id="qfb-${idx}"></div>
  </div>`;
}
function checkQ(idx, btn, chosen, correct) {
  const s = quizState[idx];
  btn.parentElement.querySelectorAll('.qbtn').forEach(b => b.disabled=true);
  const fb = document.getElementById(`qfb-${idx}`);
  if (chosen===correct) { btn.classList.add('ok'); fb.style.color='var(--olive)'; fb.textContent='✓ ¡Correcto!'; s.score++; }
  else { btn.classList.add('no'); btn.parentElement.querySelectorAll('.qbtn')[correct].classList.add('ok'); fb.style.color='var(--crimson)'; fb.textContent=`✗ Era: ${s.data[s.pos].opts[correct]}`; }
  setTimeout(()=>{ s.pos++; renderQuiz(idx); }, 1300);
}
function resetQuiz(idx) {
  quizState[idx] = { pos:0, score:0, data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5) };
  document.getElementById(`quiz-${idx}`).style.display='block';
  document.getElementById(`score-${idx}`).style.display='none';
  renderQuiz(idx);
}
function toggleVocab(el) {
  const h=el.querySelector('.vhint'), m=el.querySelector('.vmore');
  if (h.style.display==='none'){ h.style.display='block'; m.style.display='none'; }
  else { h.style.display='none'; m.style.display='block'; }
}
initQuiz(0);
</script>
</body>
</html>
