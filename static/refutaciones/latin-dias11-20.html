<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Latín — Días 11–20</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap');
:root {
  --marble:#f8f5f0;--ink:#1a1410;--ink2:#3d2e1e;--gold:#8b6914;--gold-l:#fdf6e3;
  --red:#8b1a1a;--red-l:#fae8e8;--blue:#1a2a5e;--blue-l:#e8ecf8;
  --olive:#3a4a1a;--olive-l:#e8eed8;--stone:#6b5a45;--night:#120e08;
  --bdr:#c8b88a;--wht:#fff;--purple:#4a1a6b;--purple-l:#f0e8f8;
  --teal:#0a3a3a;--teal-l:#d8eeee;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--marble);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}
header{background:linear-gradient(160deg,#120e08 0%,#1e1a08 50%,#1a0808 100%);color:#f8f5f0;padding:22px 16px 18px;text-align:center;border-bottom:3px solid var(--gold);position:relative;overflow:hidden}
header::before{content:'ROMA';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'EB Garamond',serif;font-size:10rem;color:rgba(255,255,255,.03);pointer-events:none;font-weight:700}
header h1{font-family:'EB Garamond',serif;font-size:1.9rem;letter-spacing:.04em;margin-bottom:2px;position:relative}
header .lat-title{font-family:'EB Garamond',serif;font-size:1.4rem;font-style:italic;color:var(--gold);margin-bottom:4px;position:relative}
header .sub{font-family:'EB Garamond',serif;font-style:italic;font-size:1rem;color:#c8b870;position:relative}
header .badges{margin-top:8px;position:relative}
.badge-lat{display:inline-block;background:var(--gold);color:var(--night);border-radius:12px;font-size:11px;font-weight:700;padding:2px 10px;margin:0 3px;letter-spacing:.05em}
.lesson-nav{display:flex;overflow-x:auto;background:#ede5d0;border-bottom:2px solid var(--bdr);gap:2px;padding:4px 4px 0;scrollbar-width:none}
.lesson-nav::-webkit-scrollbar{display:none}
.lnav-btn{flex-shrink:0;padding:9px 14px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;border-radius:4px 4px 0 0}
.lnav-btn.active{color:var(--red);border-bottom-color:var(--red);background:var(--marble)}
.lnav-btn:hover:not(.active){background:#e0d5b8}
.inner-tabs{display:flex;border-bottom:1px solid var(--bdr);background:#f0e8d8;overflow-x:auto;scrollbar-width:none}
.inner-tabs::-webkit-scrollbar{display:none}
.itab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.itab.active{color:var(--red);border-bottom-color:var(--red);background:var(--marble)}
.lesson-panel{display:none;padding:16px;max-width:720px;margin:0 auto}
.lesson-panel.active{display:block}
.itab-panel{display:none}
.itab-panel.active{display:block}
.card{background:var(--wht);border:1px solid var(--bdr);border-radius:8px;padding:16px;margin-bottom:14px}
.card h3{font-family:'EB Garamond',serif;font-size:1.2rem;color:var(--red);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.tip{background:var(--gold-l);border-left:4px solid var(--gold);border-radius:0 6px 6px 0;padding:10px 13px;margin:8px 0;font-size:13px}
.tip strong{color:var(--gold)}
.tip-red{background:var(--red-l);border-left-color:var(--red)}
.tip-red strong{color:var(--red)}
.tip-blue{background:var(--blue-l);border-left-color:var(--blue)}
.tip-blue strong{color:var(--blue)}
.tip-olive{background:var(--olive-l);border-left-color:var(--olive)}
.tip-olive strong{color:var(--olive)}
.tip-purple{background:var(--purple-l);border-left-color:var(--purple)}
.tip-purple strong{color:var(--purple)}
.tip-teal{background:var(--teal-l);border-left-color:var(--teal)}
.tip-teal strong{color:var(--teal)}
.gtable{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.gtable th{background:var(--red);color:#fff;padding:7px 10px;text-align:left;font-weight:600}
.gtable td{padding:6px 10px;border-bottom:1px solid #e8d8b8}
.gtable tr:nth-child(even) td{background:#fdf8f0}
.gtable .lcell{font-family:'EB Garamond',serif;font-size:1.1rem;color:var(--red);font-style:italic}
.gtable .hl{background:#fff8d8!important;font-weight:700}
.vlist{list-style:none}
.vitem{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #e8d8b8;cursor:pointer}
.vlat{font-family:'EB Garamond',serif;font-size:1.2rem;color:var(--red);font-style:italic;min-width:150px;flex-shrink:0}
.vtrans{font-size:13px;font-weight:600}
.vhint{font-size:11px;color:#888;font-style:italic;margin-top:1px}
.vmore{font-size:11px;color:var(--gold)}
.qcard{background:var(--wht);border:2px solid var(--bdr);border-radius:10px;padding:18px;margin-bottom:12px;text-align:center}
.qbig{font-family:'EB Garamond',serif;font-size:1.7rem;color:var(--red);font-style:italic;margin-bottom:14px;line-height:1.4}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qbtn{background:var(--marble);border:2px solid var(--bdr);border-radius:7px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--ink);font-family:'Inter',sans-serif}
.qbtn:hover{border-color:var(--red);color:var(--red)}
.qbtn.ok{background:var(--olive-l);border-color:var(--olive);color:var(--olive)}
.qbtn.no{background:var(--red-l);border-color:var(--red);color:var(--red)}
.qfb{margin-top:10px;font-size:13px;font-weight:600;min-height:18px}
.qscore{text-align:center;padding:20px;font-weight:700;color:var(--red);font-size:1.1rem}
.vblock{background:linear-gradient(160deg,#120e08 0%,#1e1a08 50%,#1a0808 100%);color:#f8f5f0;border-radius:10px;padding:22px 16px;text-align:center;margin-bottom:14px}
.vblock-lat{font-family:'EB Garamond',serif;font-size:1.4rem;font-style:italic;line-height:1.9;color:var(--gold);margin-bottom:10px;letter-spacing:.02em}
.vblock-trans{font-size:12px;color:#c8b870;font-style:italic;font-family:'EB Garamond',serif}
.vwords{text-align:left;margin-top:12px}
.vrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:12px}
.vwl{font-family:'EB Garamond',serif;font-size:1.05rem;color:var(--gold);font-style:italic}
.vwe{color:#c8b870;text-align:right}
.paradigm{display:grid;gap:5px;margin-top:8px}
.para-row{display:grid;grid-template-columns:100px 1fr 1fr;gap:4px;align-items:center;font-size:13px}
.para-lbl{font-weight:600;color:var(--ink2);font-size:12px}
.para-lat{font-family:'EB Garamond',serif;font-size:1.1rem;color:var(--red);font-style:italic}
.para-esp{color:var(--ink2);font-size:13px}
.para-head{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#aaa;padding-bottom:2px;border-bottom:1px solid var(--bdr)}
.conj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.conj-box{background:var(--marble);border:1px solid var(--bdr);border-radius:6px;padding:10px 12px}
.conj-box h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gold);margin-bottom:6px}
.conj-line{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #e8d8b8}
.conj-lat{font-family:'EB Garamond',serif;font-size:1.05rem;color:var(--red);font-style:italic}
.conj-esp{color:var(--ink2);font-size:12px}
.prog-bar{height:5px;background:#ddd;border-radius:3px;margin:6px 0 3px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:3px;transition:width .5s}
.prog-lbl{font-size:11px;color:#aaa}
p{font-size:14px;margin-bottom:8px}
.note{font-size:11px;color:#999;text-align:center;margin-top:6px;font-style:italic}
</style>
</head>

const LESSONS = [
{
  day:11,title:"La cuarta y quinta declinación",subtitle:"Las menos frecuentes pero con vocabulario teológico esencial",
  tips:[
    {t:'<strong>La cuarta declinación</strong> agrupa sustantivos cuyo genitivo singular termina en -us. El nominativo singular de los masculinos también termina en -us, lo que los hace confundibles con la 2ª declinación — pero el genitivo -us (no -i) los distingue. Los más importantes: <em>spiritus</em> (espíritu), <em>sensus</em> (sentido), <em>adventus</em> (venida/adviento), <em>cantus</em> (canto), <em>fructus</em> (fruto).'},
    {t:'<strong>La quinta declinación</strong> es la más pequeña. Genitivo en -ei. Solo dos sustantivos son comunes: <em>dies</em> (día, masc.) y <em>res</em> (cosa, asunto, fem.). Sin embargo, <em>fides</em> (fe) a veces se trata aquí aunque técnicamente es 5ª/3ª mixta. <em>res publica</em> = "la cosa pública" = república.'},
    {t:'<strong>Spiritus</strong> es la 4ª declinación más importante para la teología. <em>Spiritus Sanctus</em> (nominativo), <em>Spiritu Sancto</em> (ablativo — como en "conceptus de Spiritu Sancto"), <em>Spiritus</em> puede ser genitivo o nominativo — el contexto lo determina.'},

    {g:'res, rei',         t:'cosa, asunto, realidad (5ª decl., f.)',h:'Res publica / In re — en cuanto al asunto',    f:'→ "real", "república", "res" (cosa)'},

  }

{
  day:12,title:"El infinitivo y las oraciones de infinitivo",subtitle:"Accusativus cum infinitivo — la construcción más latina",
  tips:[
    {t:'<strong>El infinitivo latino</strong> tiene seis formas: presente activo (-are/-ere/-ere/-ire), presente pasivo (-ari/-eri/-i/-iri), perfecto activo (-isse), perfecto pasivo (participio perfecto pasivo + esse), futuro activo (participio futuro activo + esse), futuro pasivo (supino + iri).'},
    {t:'<strong>El Accusativus cum Infinitivo (AcI)</strong> es la construcción latina de discurso indirecto más frecuente. Donde el español dice "digo que él viene", el latín dice "digo <em>él</em> (acusativo) <em>venir</em> (infinitivo)": <em>Dico eum venire</em>. El sujeto del infinitivo va en acusativo.'},
    {t:'<strong>El tiempo del infinitivo</strong> es relativo al verbo principal: el infinitivo presente indica simultaneidad ("digo que viene"); el infinitivo perfecto indica anterioridad ("digo que vino"); el infinitivo futuro indica posterioridad ("digo que vendrá").'},
    {t:'<strong>Verba sentiendi et declarandi</strong> (verbos de percepción y declaración) introducen el AcI: <em>dico</em> (digo), <em>puto</em> (pienso), <em>credo</em> (creo), <em>scio</em> (sé), <em>video</em> (veo), <em>audio</em> (oigo). El AcI es la piedra angular de la sintaxis latina compleja.'},
  ],
  extra:{type:'table',title:'El Accusativus cum Infinitivo — ejemplos teológicos',
    headers:['Latín (AcI)','Análisis','Traducción','Fuente'],
    rows:[

      ['Dico eum venturum esse','eum=acus.; venturum esse=inf. fut.','Digo que él vendrá','Profecía en estilo indirecto'],
      ['Credimus Verbum carnem factum esse','Verbum=acus.; factum esse=inf. perf. pas.','Creemos que el Verbo se hizo carne','Jn 1:14 (estilo)'],
      ['Audio prophetas dixisse','prophetas=acus.; dixisse=inf. perf.','Oigo que los profetas dijeron','Introducción profética'],
    ]
  },
  vocab:[
    {g:'dicere (dico)',    t:'decir, afirmar (3ª conj.)',           h:'Dico vobis — os digo; Amen dico vobis',         f:'→ "decir", "dicción", "dictar", "veredicto"'},
    {g:'credere (credo)',  t:'creer, confiar en (3ª conj.)',        h:'Credo in unum Deum — el Credo',                 f:'→ "creer", "credo", "crédito", "credencial"'},
    {g:'putare (puto)',    t:'pensar, creer, calcular (1ª conj.)',  h:'Puto ergo sum (adaptación cartesiana)',          f:'→ "reputar", "computar", "disputar"'},
    {g:'scire (scio)',     t:'saber (4ª conj.)',                    h:'Scio cui credidi — 2 Ti 1:12',                  f:'→ "ciencia", "omnisciente", "consciente"'},
    {g:'esse',            t:'ser, existir (infinitivo de sum)',     h:'Deus esse — que Dios es',                       f:'La forma más usada en el AcI'},
    {g:'videri',          t:'parecer, ser visto (inf. pres. pas.)', h:'Non id quod videtur esse — lo que parece ser',  f:'Diferente a videre (ver) — videri = parecer'},
    {g:'fieri',           t:'llegar a ser, hacerse (inf. de fio)',  h:'Verbum caro fieri — que el Verbo se hace carne',f:'fio es el pasivo de facio — hacer'},
    {g:'manere (maneo)',  t:'permanecer, quedarse (2ª conj.)',      h:'Manet in nobis — permanece en nosotros',        f:'→ "manantial", "permanecer", "mansión"'},
  ],
  quiz:[
    {q:'En "Credo Deum esse", Deum es...', opts:['nominativo sujeto','acusativo sujeto del AcI','dativo','vocativo'], ans:1},
    {q:'El AcI se usa después de verbos de...', opts:['movimiento','percepción y declaración','mandato','deseo únicamente'], ans:1},

    {q:'"manere" da en español...', opts:['mañana','manantial y permanecer','mano','manera'], ans:1},
  ],
  verse:{lat:'Scio enim cui credidi et certus sum quia potens est depositum meum servare in illum diem.',esp:'"Porque sé en quién he creído y estoy cierto de que es poderoso para guardar mi depósito hasta aquel día" — 2 Timoteo 1:12 (Vulgata)',
    words:[['Scio','sé (1ª sg. pres. de scire — 4ª conj.)'],['cui credidi','en quién he creído (dat. relativo + perf. de credere)'],['certus sum','estoy cierto (predicativo: adj. + sum)'],['quia potens est','que es poderoso (quia + indicativo — en la Vulgata)'],['depositum meum servare','guardar mi depósito (AcI implícito: inf. + acus.)'],['in illum diem','hasta aquel día (in + acus. temporal)']],

{

  tips:[
    {t:'<strong>El latín tiene cuatro participios:</strong> (1) Participio Presente Activo (-ans/-ens): <em>amans</em> (amando, el que ama); (2) Participio Perfecto Pasivo (-atus/-itus/-tus): <em>amatus</em> (amado, habiendo sido amado); (3) Participio Futuro Activo (-aturus): <em>amaturus</em> (a punto de amar); (4) Participio Futuro Pasivo / Gerundivo (-andus): <em>amandus</em> (que debe ser amado, digno de ser amado).'},
    {t:'<strong>El Participio Presente Activo (PPA)</strong> se declina como adjetivo de 3ª declinación. <em>Dominus amans</em> = "el Señor que ama". <em>Credentes</em> = "los que creen". En latín eclesiástico forma los participios en -ens que reconocemos en español: <em>omnipotens</em>, <em>excellens</em>, <em>inhaerens</em>.'},
    {t:'<strong>El Participio Perfecto Pasivo (PPP)</strong> es el más frecuente. Se declina como adjetivo de 1ª/2ª declinación. <em>Verbum factum</em> = "el Verbo hecho (carne)". <em>Resurrectus</em> = "el que ha sido resucitado". Junto con <em>esse</em> forma los tiempos perfectos de la voz pasiva.'},
    {t:'<strong>El Ablativo Absoluto</strong> es la construcción participial independiente del latín: sustantivo en ablativo + participio en ablativo, sin relación sintáctica con la oración principal. <em>Deo duce</em> = "siendo Dios el guía / con Dios como guía". <em>Christo regnante</em> = "reinando Cristo".'},

{
  day:14,title:"El futuro de indicativo y el futuro perfecto",subtitle:"Las promesas, profecías y condiciones del latín",
  tips:[
    {t:'<strong>El futuro de indicativo</strong> se forma de dos maneras distintas según la conjugación. 1ª y 2ª conj.: raíz + <em>-bo, -bis, -bit, -bimus, -bitis, -bunt</em>. 3ª y 4ª conj.: raíz + <em>-am, -es, -et, -emus, -etis, -ent</em>. Esta diferencia entre -bo- y -a/e- es crucial para no confundir el futuro de la 3ª/4ª con el presente.'},
    {t:'<strong>El futuro de esse</strong>: <em>ero, eris, erit, erimus, eritis, erunt</em>. Muy frecuente en promesas y profecías latinas. <em>Ero vobiscum</em> = "Estaré con vosotros".'},
    {t:'<strong>El futuro perfecto</strong> indica una acción que habrá sido completada antes de otra acción futura. Se forma: tema de perfecto + <em>-ero, -eris, -erit, -erimus, -eritis, -erint</em>. <em>Si credideris, salvus eris</em> = "Si hubieres creído (fut. perf.), salvo serás (fut.)".'},
    {t:'<strong>El uso condicional del futuro perfecto</strong> — si + futuro perfecto → futuro simple — es la condición real referida al futuro. Es muy frecuente en los textos jurídicos, litúrgicos y bíblicos latinos.'},

{
  day:15,title:"La voz pasiva: presente, imperfecto y perfecto",subtitle:"Cómo el latín expresa que el sujeto recibe la acción",
  tips:[
    {t:'<strong>La voz pasiva del presente e imperfecto</strong> se forma sustituyendo las desinencias activas por las pasivas: -or, -ris, -tur, -mur, -mini, -ntur. <em>Amor</em> (soy amado), <em>amaris</em> (eres amado), <em>amatur</em> (es amado), <em>amamur</em> (somos amados), <em>amamini</em> (sois amados), <em>amantur</em> (son amados).'},
    {t:'<strong>El agente en la voz pasiva</strong> se expresa con <em>a/ab + ablativo</em> (agente personal) o con ablativo solo sin preposición (instrumento o causa): <em>amatur a Deo</em> = "es amado por Dios"; <em>vulneratus gladio</em> = "herido por/con una espada".'},
    {t:'<strong>El perfecto pasivo</strong> se forma con el PPP (participio perfecto pasivo) + el verbo <em>esse</em>: <em>amatus sum</em> (fui amado / he sido amado), <em>amatus es</em> (fuiste amado), <em>amatus est</em> (fue amado). El PPP concuerda en género, número y caso con el sujeto.'},
    {t:'<strong>Los verbos deponentes</strong> tienen forma pasiva pero significado activo — igual que los deponentes griegos y hebreos. <em>Loquor</em> (hablo), <em>sequor</em> (sigo), <em>nascor</em> (nazco), <em>morior</em> (muero), <em>patior</em> (padezco). Son muy frecuentes y hay que aprenderlos como vocabulario.'},
  ],

    {t:'<strong>El gerundio</strong> es un sustantivo verbal neutro de 2ª declinación que se declina como <em>verbum</em>. Solo existe en genitivo, dativo, acusativo (con preposición) y ablativo. <em>Causa credendi</em> = "por razón de creer" (gen.); <em>ad credendum</em> = "para creer" (acus. con ad).'},

    {t:'<strong>La perífrasis pasiva obligativa:</strong> gerundivo + <em>esse</em> = "debe ser hecho". <em>Hoc faciendum est</em> = "Esto debe hacerse". El agente va en dativo: <em>Hoc nobis faciendum est</em> = "Esto nos es necesario hacer" / "Debemos hacer esto".'},
    {t:'<strong>Palabras famosas con gerundivo:</strong> <em>agenda</em> (lo que debe ser hecho), <em>amanda</em> (la que debe ser amada), <em>memoranda</em> (lo que debe ser recordado), <em>propaganda</em> (lo que debe ser propagado), <em>legenda</em> (lo que debe ser leído). Todos son gerundivos latinos en uso directo.'},

    {t:'<strong>Agustín de Hipona (354-430)</strong> escribe un latín retórico, emocional, lleno de paradojas y preguntas retóricas. Su obra más accesible: las <em>Confessiones</em>. La primera frase define su estilo: <em>Fecisti nos ad te et inquietum est cor nostrum donec requiescat in te</em> — una cadencia musical inconfundible.'},
    {t:'<strong>Tomás de Aquino (1225-1274)</strong> escribe un latín escolástico: preciso, técnico, silogístico. Cada cuestión de la <em>Summa Theologiae</em> sigue el esquema: <em>Utrum...</em> (¿si acaso...?), <em>Videtur quod...</em> (parece que...), <em>Sed contra...</em> (pero en cambio...), <em>Respondeo dicendum...</em> (respondo que debe decirse...).'},
    {t:'<strong>El vocabulario técnico escolástico</strong> que Tomás usa es en su mayoría latín aristotélico: <em>substantia</em> (sustancia), <em>accidens</em> (accidente), <em>essentia</em> (esencia), <em>existentia</em> (existencia), <em>potentia</em> (potencia), <em>actus</em> (acto). Este vocabulario es la base de toda la teología sistemática occidental.'},
    {t:'<strong>Las <em>Confessiones</em> de Agustín</strong> son la mejor puerta de entrada al latín eclesiástico literario. El vocabulario es bíblico, el estilo es lírico, las frases son musicalmente equilibradas. El libro I cap. 1 es el texto que todo estudiante de latín patrístico debe memorizar.'},

{
  day:19,title:"La sintaxis avanzada: oraciones condicionales y temporales",subtitle:"Si, cum, dum, donec, antequam — la gramática de la temporalidad",
  tips:[
    {t:'<strong>Las oraciones condicionales latinas</strong> tienen tres tipos principales: (1) Real/simple: <em>si + indicativo</em> → indicativo. "Si Deum amas, beatus es" = "Si amas a Dios, eres feliz". (2) Potencial: <em>si + subjuntivo presente/perfecto</em> → subjuntivo presente. "Si Deum ames, beatus sis". (3) Irreal/contraria a hecho: <em>si + subjuntivo imperfecto</em> (presente irreal) o <em>pluscuamperfecto</em> (pasado irreal) → mismo subjuntivo en apódosis.'},
    {t:'<strong>Las oraciones temporales</strong> usan distintas conjunciones según la relación temporal: <em>cum</em> + subjuntivo (cuando, circunstancial); <em>dum</em> + indicativo presente (mientras); <em>donec</em> (hasta que); <em>postquam</em> + perfecto (después de que); <em>antequam/priusquam</em> + subjuntivo (antes de que).'},
    {t:'<strong>Cum historicum</strong> — el uso más frecuente de <em>cum</em> en la narración latina. Con el imperfecto o pluscuamperfecto de subjuntivo describe las circunstancias que rodean la acción principal: <em>Cum Caesar in Galliam venisset, bellum paravit</em> = "Cuando César hubo llegado a la Galia, preparó la guerra".'},
    {t:'<strong>En el latín eclesiástico</strong>, la distinción modal no siempre se mantiene con rigor clásico. La Vulgata (latín más popular) frecuentemente usa indicativo donde el latín clásico pediría subjuntivo. Esta "incorrección" clásica es en realidad fidelidad al griego o al hebreo subyacentes.'},
  ],

{
  day:20,title:"Repaso: lectura del Credo Niceno-Constantinopolitano",subtitle:"El texto dogmático más importante del latín cristiano — análisis completo",
  tips:[
    {t:'<strong>El Credo Niceno-Constantinopolitano</strong> (381 d.C.) es el texto dogmático cristiano más universal. Su latín contiene prácticamente toda la gramática de los días 1-20: 1ª, 2ª y 3ª declinación, participios, infinitivos, subjuntivos, gerundivos, acusativos, ablativos y genitivos. Aprenderlo de memoria es dominar el latín eclesiástico básico.'},
    {t:'<strong>La estructura del Credo:</strong> (1) El Padre (<em>Patrem omnipotentem</em>); (2) El Hijo (<em>Filium Dei unigenitum</em>) — la sección más larga; (3) El Espíritu Santo (<em>Spiritum Sanctum</em>); (4) La Iglesia y los novísimos.'},
    {t:'<strong>El vocabulario técnico del Credo</strong> es la base de toda la cristología: <em>consubstantialem</em> (consustancial), <em>unigenitum</em> (unigénito), <em>ante omnia saecula</em> (antes de todos los siglos), <em>incarnatus</em> (encarnado), <em>passus</em> (que padeció), <em>resurrexit</em> (resucitó), <em>sedet</em> (se sienta).'},
    {t:'<strong>Filioque</strong> — "y del Hijo" — es la adición occidental al Credo (no presente en el texto original griego de 381 d.C.). El Occidente latino añadió <em>qui ex Patre Filioque procedit</em> ("que procede del Padre y del Hijo"). Esta adición unilateral es una de las causas del Cisma de 1054.'},
  ],

const lnav=document.getElementById('lnav');
const container=document.getElementById('lessons-container');
LESSONS.forEach((lesson,idx)=>{
  const btn=document.createElement('button');
  btn.className='lnav-btn'+(idx===0?' active':'');
  btn.textContent=`Día ${lesson.day}`;
  btn.onclick=()=>showLesson(idx);
  lnav.appendChild(btn);
  const panel=document.createElement('div');
  panel.className='lesson-panel'+(idx===0?' active':'');
  panel.id=`lesson-${idx}`;
  panel.innerHTML=buildLesson(lesson,idx);
  container.appendChild(panel);
});

function showLesson(idx){
  document.querySelectorAll('.lnav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.lesson-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  initQuiz(idx);
}
function showInnerTab(lIdx,tabName){
  const panel=document.getElementById(`lesson-${lIdx}`);
  panel.querySelectorAll('.itab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tabName));
  panel.querySelectorAll('.itab-panel').forEach(p=>p.classList.toggle('active',p.dataset.tab===tabName));
}

function buildLesson(lesson,idx){
  const tabKeys=['leccion','vocab','quiz','verse'];
  const tabLabels=['📖 Lección','📚 Vocabulario','✏️ Práctica','📜 Texto'];
  const pct=(lesson.day/30*100).toFixed(1);
  let html=`
  <div style="text-align:center;margin-bottom:14px;">
    <div style="font-family:'EB Garamond',serif;font-size:1.5rem;color:var(--red);font-style:italic;">Dies ${lesson.day} — ${lesson.title}</div>
    <div style="font-size:12px;color:#888;margin-top:2px;">${lesson.subtitle}</div>
    <div class="prog-bar" style="max-width:300px;margin:8px auto 3px;"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-lbl">Día ${lesson.day} de 30${lesson.day===20?' — ¡Segunda semana completada! 🎉':''}</div>
  </div>
  <div class="inner-tabs">
    ${tabLabels.map((t,i)=>`<div class="itab${i===0?' active':''}" data-tab="${tabKeys[i]}" onclick="showInnerTab(${idx},'${tabKeys[i]}')">${t}</div>`).join('')}
  </div>`;

  html+=`<div class="itab-panel active" data-tab="leccion">`;
  if(lesson.tips&&lesson.tips.length){
    html+=`<div class="card"><h3><span>💡</span> Claves del día</h3>`;
    lesson.tips.forEach(t=>{html+=`<div class="tip">${t.t}</div>`;});
    html+=`</div>`;
  }
  if(lesson.extra){
    const e=lesson.extra;
    if(e.type==='table'){
      html+=`<div class="card"><h3><span>📊</span> ${e.title}</h3>
      <table class="gtable"><thead><tr>${e.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
      e.rows.forEach(r=>{html+=`<tr>${r.map((c,ci)=>`<td${ci===0?' style="font-weight:600"':''}>${c}</td>`).join('')}</tr>`;});
      html+=`</tbody></table></div>`;
    }else if(e.type==='conj'){
      html+=`<div class="card"><h3><span>📊</span> ${e.title}</h3><div class="conj-grid">`;
      e.cols.forEach(col=>{
        html+=`<div class="conj-box"><h4>${col.title}</h4>`;
        col.rows.forEach(r=>{html+=`<div class="conj-line"><span class="conj-lat">${r[0]}</span><span class="conj-esp">${r[1]}</span></div>`;});
        html+=`</div>`;
      });
      html+=`</div></div>`;
    }
  }
  html+=`</div>`;

  html+=`<div class="itab-panel" data-tab="vocab"><div class="card"><h3><span>📚</span> Vocabulario del día</h3>
  <p style="font-size:12px;color:#888;margin-bottom:8px;">Toca cada entrada para ver más información.</p><ul class="vlist">`;
  lesson.vocab.forEach(v=>{
    html+=`<li class="vitem" onclick="toggleVocab(this)">
      <div class="vlat">${v.g}</div>
      <div><div class="vtrans">${v.t}</div>
      <div class="vhint" style="display:none;">${v.h} — <em>${v.f}</em></div>
      <div class="vmore">↓ más info</div></div></li>`;
  });
  html+=`</ul></div></div>`;

  html+=`<div class="itab-panel" data-tab="quiz"><div class="card"><h3><span>✏️</span> Práctica — Dies ${lesson.day}</h3>
  <div id="quiz-${idx}"></div><div id="score-${idx}" class="qscore" style="display:none;"></div></div></div>`;

  const v=lesson.verse;
  html+=`<div class="itab-panel" data-tab="verse">
  <div class="vblock">
    <div class="vblock-lat">${v.lat}</div>
    <div class="vblock-trans">${v.esp}</div>
    <div class="vwords">`;
  v.words.forEach(w=>{html+=`<div class="vrow"><span class="vwl">${w[0]}</span><span class="vwe">${w[1]}</span></div>`;});
  html+=`</div></div>
  <div class="card"><h3><span>🔍</span> El detalle que las traducciones pierden</h3><p>${v.insight}</p></div>
  </div>`;
  return html;
}

const quizState={};
function initQuiz(idx){
  if(quizState[idx])return;
  quizState[idx]={pos:0,score:0,data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5)};
  renderQuiz(idx);
}
function renderQuiz(idx){
  const el=document.getElementById(`quiz-${idx}`);
  const sc=document.getElementById(`score-${idx}`);
  const s=quizState[idx];
  if(!s)return;
  if(s.pos>=s.data.length){
    el.style.display='none';sc.style.display='block';
    const pct=Math.round(s.score/s.data.length*100);
    sc.innerHTML=`${pct>=75?'🎉':'📖'} <strong>${s.score}/${s.data.length}</strong> correctas (${pct}%)<br>
    <span style="font-size:13px;color:#888;">${pct>=75?'Optime! Sigue avanzando.':'Perseverantia vincit — repasa y vuelve.'}</span>
    <br><button class="qbtn" style="margin-top:10px;" onclick="resetQuiz(${idx})">↺ Repetir</button>`;
    return;
  }
  const q=s.data[s.pos];
  el.innerHTML=`<div class="qcard">
    <div style="font-size:11px;color:#aaa;margin-bottom:6px;">${s.pos+1} / ${s.data.length}</div>
    <div class="qbig">${q.q}</div>
    <div class="qgrid">${q.opts.map((o,i)=>`<button class="qbtn" onclick="checkQ(${idx},this,${i},${q.ans})">${o}</button>`).join('')}</div>
    <div class="qfb" id="qfb-${idx}"></div>
  </div>`;
}
function checkQ(idx,btn,chosen,correct){
  const s=quizState[idx];
  btn.parentElement.querySelectorAll('.qbtn').forEach(b=>b.disabled=true);
  const fb=document.getElementById(`qfb-${idx}`);
  if(chosen===correct){btn.classList.add('ok');fb.style.color='var(--olive)';fb.textContent='✓ Recte!';s.score++;}
  else{btn.classList.add('no');btn.parentElement.querySelectorAll('.qbtn')[correct].classList.add('ok');fb.style.color='var(--red)';fb.textContent=`✗ Erat: ${s.data[s.pos].opts[correct]}`;}
  setTimeout(()=>{s.pos++;renderQuiz(idx);},1300);
}
function resetQuiz(idx){
  quizState[idx]={pos:0,score:0,data:[...LESSONS[idx].quiz].sort(()=>Math.random()-.5)};
  document.getElementById(`quiz-${idx}`).style.display='block';
  document.getElementById(`score-${idx}`).style.display='none';
  renderQuiz(idx);
}
function toggleVocab(el){
  const h=el.querySelector('.vhint'),m=el.querySelector('.vmore');
  if(h.style.display==='none'){h.style.display='block';m.style.display='none';}
  else{h.style.display='none';m.style.display='block';}
}
initQuiz(0);
</script>
