{{- $src := .Get "src" -}}
{{- $title := .Get "title" | default "Dossier" -}}

<div class="dossier-embed">
  <iframe src="{{ $src }}" title="{{ $title }}" loading="lazy"></iframe>
</div>
<p class="dossier-link">
  <a href="{{ $src }}" target="_blank" rel="noopener">Abrir dossier en ventana completa</a>
</p>
