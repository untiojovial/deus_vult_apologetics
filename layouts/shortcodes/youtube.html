{{- $id := .Get "id" -}}
{{- $title := .Get "title" | default "Video" -}}

<div class="youtube-embed">
  <iframe 
    width="100%" 
    height="480" 
    src="https://www.youtube.com/embed/{{ $id }}" 
    title="{{ $title }}" 
    loading="lazy"
    frameborder="0" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen>
  </iframe>
</div>
